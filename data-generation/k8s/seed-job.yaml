# Kubernetes Job die data-generation in-cluster runt en JSONL files
# publiceert naar de S3 raw zone (`s3a://uwv-raw/...`).
#
# ConfigMaps `data-generation-generators` en `data-generation-scripts` worden
# door scripts/seed.sh aangemaakt vanuit data-generation/. Job gebruikt
# python:3.11-slim en pip-installeert deps; daarna runt load_to_s3.py
# tegen de in-cluster MinIO.
#
# Idempotent: scripts/seed.sh deletet de oude Job vóór apply.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: seed-data-generation
  namespace: uwv-platform
  labels:
    uwv.nl/component: data-generation
    uwv.nl/dev-only: "true"
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 1
  template:
    metadata:
      labels:
        uwv.nl/component: data-generation
    spec:
      restartPolicy: Never
      containers:
        - name: seed
          image: python:3.11-slim
          command: ["bash", "-euo", "pipefail", "-c"]
          args:
            - |
              echo "==> pip install runtime deps"
              pip install --quiet --disable-pip-version-check faker boto3 click urllib3
              echo "==> running load_to_s3.py"
              cd /app
              python load_to_s3.py \
                --count "${COUNT:-10000}" \
                --seed "${SEED:-2026}" \
                --bucket "${S3_BUCKET:-uwv-raw}" \
                --endpoint "${S3_ENDPOINT:-https://minio.uwv-platform.svc.cluster.local:9000}" \
                --insecure
          env:
            - name: COUNT
              value: "10000"
            - name: SEED
              value: "2026"
            - name: S3_BUCKET
              value: "uwv-raw"
            - name: S3_ENDPOINT
              value: "https://minio.uwv-platform.svc.cluster.local:9000"
            - name: S3_REGION
              value: "us-east-1"
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-s3-credentials
                  key: accessKey
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-s3-credentials
                  key: secretKey
            - name: PYTHONPATH
              value: "/app"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: scripts
              mountPath: /app
            - name: generators
              mountPath: /app/generators
      volumes:
        - name: scripts
          configMap:
            name: data-generation-scripts
        - name: generators
          configMap:
            name: data-generation-generators
