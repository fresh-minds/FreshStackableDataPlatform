version: 2

# Bronze sources — geschreven door spark-jobs/streaming_files_to_lakehouse.py.
# Eén tabel per stream-identifier (uwv.<domain>.<entity>); payload is raw JSON envelope.
#
# De `silver`-source verderop is Fabric-only: bedoeld als input voor
# int_klantreis_events wanneer dbt-fabricspark draait. Op Trino blijft int
# refereren naar stg_* views (JSON-extractie uit bronze).

sources:
  - name: bronze
    database: bronze
    schema: uwv
    description: |
      Raw JSONL envelopes uit s3a://uwv-raw/<domain>/<entity>/. Per stream
      één Delta-tabel.
      Schema: `payload (string), stream, source_file, source_ts, ingestion_ts, event_date`.
    loader: spark-streaming
    meta:
      bio_classificatie: vertrouwelijk
      bewaartermijn_jaren: 7

    tables:
      - name: persona_created
        description: "Synthetische personas (BSN, naam, geboortedatum, adres)."
      - name: polisadm_ikv
        description: "Inkomstenverhoudingen — kerneenheid polisadministratie."
      - name: ww_aanvraag
        description: "WW-aanvragen incl. reden einde dienstverband."
      - name: wia_aanvraag
        description: "WIA-aanvragen + arbeidsongeschiktheidspercentage."
      - name: wajong_dossier
        description: "Wajong-dossiers (UC-02 placeholder; minimaal veld-niveau)."
      - name: zw_melding
        description: "Ziektewet-meldingen."
      - name: crm_contact
        description: "Klantcontact-events (kanaal, onderwerp)."
      - name: fez_uitkeringslast
        description: "Geaggregeerde uitkeringslast per wet × maand × regio."
      - name: klanttevredenheid
        description: |
          Klanttevredenheid-meting (CSV-batch upload). Geen JSON-envelope —
          native kolommen (meting_datum, kanaal, doelgroep, score,
          n_respondenten, opmerking) + ingestion_ts, source_file, event_date.
        loader: csv_batch
        meta:
          bio_classificatie: intern
          bewaartermijn_jaren: 5
      - name: focus_billing
        description: |
          FOCUS-billing (UC-12 / FinOps). 49-kolom export volgens FinOps
          Open Cost and Usage Specification 1.x: 39 FOCUS-core kolommen +
          10 oci_* vendor-extensies, aangevuld met audit-kolommen
          (ingestion_ts, source_file, event_date). CSV-batch upload
          via portal. Geen PII; bedragen intern.
        loader: csv_batch
        meta:
          bio_classificatie: intern
          bewaartermijn_jaren: 7

  # ─────────────────────────────────────────────────────────────────
  # Silver source — alleen voor Fabric (uc11 multi-platform demo).
  #
  # Op Trino wordt deze source niet gerefereerd: int_klantreis_events
  # gebruikt {{ ref('stg_*') }} (views op bronze met JSON-extractie).
  # Op Fabric (target.type == 'fabricspark') schakelt int_klantreis_events
  # over op {{ source('silver', X) }} omdat het seed_bronze + silver
  # notebook al flat tabellen schrijft (geen JSON payload).
  #
  # database/schema = lakehouse-naam: non-schema Fabric Lakehouse heeft
  # één namespace; dbt-fabricspark zet database=schema=lakehouse.
  # ─────────────────────────────────────────────────────────────────
  - name: silver
    database: "{{ env_var('FABRIC_LAKEHOUSE_NAME', 'uc11_lakehouse') }}"
    schema: "{{ env_var('FABRIC_LAKEHOUSE_NAME', 'uc11_lakehouse') }}"
    description: |
      Pre-parsed silver Delta-tabellen in het Fabric Lakehouse, geschreven
      door uc11_silver.ipynb (later: dbt staging-equivalent voor Fabric).
      Identifier `silver_<entity>` matcht de tabel in `Tables/`.

    tables:
      - name: persona
        identifier: silver_persona
        description: "Persoon-records (BSN, naam, geboorte, adres). Equivalent van stg_persona."
      - name: polisadm_ikv
        identifier: silver_polisadm_ikv
        description: "Inkomstenverhoudingen. Equivalent van stg_polisadm_ikv."
      - name: ww_aanvraag
        identifier: silver_ww_aanvraag
        description: "WW-aanvragen. Equivalent van stg_ww_aanvraag."
      - name: zw_melding
        identifier: silver_zw_melding
        description: "Ziektewet-meldingen. Equivalent van stg_zw_melding."
      - name: wia_aanvraag
        identifier: silver_wia_aanvraag
        description: "WIA-aanvragen. Equivalent van stg_wia_aanvraag."
      - name: wajong_dossier
        identifier: silver_wajong_dossier
        description: "Wajong-dossiers. Equivalent van stg_wajong_dossier."
      - name: crm_contact
        identifier: silver_crm_contact
        description: "Klantcontact-events. Equivalent van stg_crm_contact."

  # ─────────────────────────────────────────────────────────────────
  # Silver source voor Databricks (Unity Catalog).
  #
  # Tabellen worden geschreven door uc11_silver.ipynb in de Databricks
  # workspace → uwv_databricks.silver.<name>. Schema is dezelfde als de
  # `silver` source voor Fabric, alleen ander adres.
  #
  # int_klantreis_events.sql schakelt naar deze source als target.type ==
  # 'databricks' (zie macro klantreis_entity).
  # ─────────────────────────────────────────────────────────────────
  - name: silver_uc
    database: "{{ env_var('DATABRICKS_CATALOG', 'uwv_databricks') }}"
    schema: silver
    description: |
      Pre-parsed silver Delta-tabellen in Databricks Unity Catalog,
      geschreven door uc11_silver.ipynb. Identifier matcht de tabel-naam
      onder uwv_databricks.silver.*.

    tables:
      - name: persona
        description: "Persoon-records. Equivalent van stg_persona."
      - name: polisadm_ikv
        description: "Inkomstenverhoudingen. Equivalent van stg_polisadm_ikv."
      - name: ww_aanvraag
        description: "WW-aanvragen. Equivalent van stg_ww_aanvraag."
      - name: zw_melding
        description: "Ziektewet-meldingen. Equivalent van stg_zw_melding."
      - name: wia_aanvraag
        description: "WIA-aanvragen. Equivalent van stg_wia_aanvraag."
      - name: wajong_dossier
        description: "Wajong-dossiers. Equivalent van stg_wajong_dossier."
      - name: crm_contact
        description: "Klantcontact-events. Equivalent van stg_crm_contact."
