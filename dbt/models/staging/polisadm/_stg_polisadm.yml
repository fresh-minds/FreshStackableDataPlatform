version: 2

models:
  - name: stg_polisadm_ikv
    description: "IKV's per persoon — kerneenheid polisadministratie."
    config:
      tags: ["staging", "polisadm"]
    meta:
      domain: polisadm
      legal_basis: Wet_SUWI+Wfsv
      doelbinding: ["primair_proces", "kwaliteitscontrole"]
      bio_classificatie: vertrouwelijk
      bewaartermijn_jaren: 30
      eigenaar: data_steward_polisadm
      pii_kolommen: [bsn, lh_nummer]
      risk_tier: laag
    columns:
      - name: ikv_id
        description: "Unieke IKV-id (synthetisch)."
        tests: [not_null, unique]
      - name: bsn
        description: "BSN van werknemer (FK naar stg_persona.bsn)."
        tests:
          - not_null
          - bsn_valid
          - relationships:
              to: ref('stg_persona')
              field: bsn
      - name: lh_nummer
        description: "Loonheffingennummer (9 cijfers + L + 2 cijfers)."
        tests:
          - not_null
          - lh_nummer_valid
      - name: werkgever_naam
        description: "Werkgever (Faker)."
      - name: aanvang_dienstverband
        tests: [not_null]
      - name: loon_bruto_jaar
        description: "Bruto jaarloon in EUR."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 500000
      - name: is_lopend
        description: "True als einde_dienstverband NULL is."
