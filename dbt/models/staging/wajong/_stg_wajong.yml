version: 2

models:
  - name: stg_wajong_dossier
    description: |
      Wajong-dossiers (placeholder, geen art. 9-data in deze referentie).
      Echte Wajong-dossiers gaan in `sensitive` catalog met 4-eyes (UC-02).
    config:
      tags: ["staging", "wajong", "ag"]
    meta:
      domain: ag
      subdomain: wajong
      legal_basis: WIA_art_64+art_9_2h
      doelbinding: ["uitkering", "reintegratie"]
      bio_classificatie: vertrouwelijk
      bewaartermijn_jaren: 7
      eigenaar: divisie_ag
      pii_kolommen: [bsn]
      risk_tier: hoog   # UC-02 hoog-risico AI Act
      placeholder: true
    columns:
      - name: dossier_id
        tests: [not_null, unique]
      - name: bsn
        tests: [not_null, bsn_valid]
      - name: regime
        tests:
          - accepted_values:
              values: [oude_Wajong, Wajong_2010, Wajong_2015]
      - name: arbeidsvermogen
        tests:
          - accepted_values:
              values: [volledig, gedeeltelijk, duurzaam_geen]
