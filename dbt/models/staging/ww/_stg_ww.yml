version: 2

models:
  - name: stg_ww_aanvraag
    description: "WW-aanvragen — getypt uit `bronze.uwv.ww_aanvraag.payload`."
    config:
      tags: ["staging", "ww"]
    meta:
      domain: ww
      legal_basis: WW_art_24_27
      doelbinding: ["uitkering"]
      bio_classificatie: vertrouwelijk
      bewaartermijn_jaren: 7
      eigenaar: divisie_ww
      pii_kolommen: [bsn]
      risk_tier: laag
    columns:
      - name: aanvraag_id
        tests: [not_null, unique]
      - name: bsn
        tests:
          - not_null
          - bsn_valid
      - name: aanvraag_datum
        tests: [not_null]
      - name: reden_einde_dienstverband
        tests:
          - accepted_values:
              values: [ontslag_werkgever, einde_contract, wederzijds_goedvinden, eigen_initiatief]
      - name: status
        tests:
          - accepted_values:
              values: [INGEDIEND, IN_BEHANDELING, TOEGEKEND, AFGEWEZEN]
