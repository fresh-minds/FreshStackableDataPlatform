version: 2

models:
  - name: stg_focus_billing
    description: |
      FOCUS-billing — staging-view op de FinOps Open Cost and Usage Specification
      CSV-export. Eén rij per (sub_account × resource × charge_period × charge).
      Bron: csv_batch via ingest_csv_focus DAG (zie airflow). Geen PII; kosten-
      bedragen zijn intern (concurrent-gevoelig — bio_classificatie: intern).
    config:
      tags: ["staging", "finops"]
    meta:
      domain: finops
      legal_basis: AVG_art_6_1_f
      doelbinding: ["finops", "kostenbeheersing", "capaciteitsplanning"]
      bio_classificatie: intern
      bewaartermijn_jaren: 7
      eigenaar: divisie_finance
      pii_kolommen: []
      risk_tier: laag
    columns:
      - name: billing_account_id
        tests: [not_null]
      - name: billing_period_start
        tests: [not_null]
      - name: billing_month
        description: "Date-truncated to month-start; primaire grain voor UC-12 marts."
        tests: [not_null]
      - name: charge_period_start
        tests: [not_null]
      - name: charge_category
        tests:
          - not_null
          - accepted_values:
              values: [Usage, Purchase, Tax, Credit, Adjustment]
      - name: billing_currency
        description: "ISO 4217 valutacode. MVP gaat uit van homogene valuta per upload."
        tests: [not_null]
      - name: billed_cost
        tests: [not_null]
      - name: effective_cost
        description: "Netto kosten na committed-discounts; primaire metric voor spend-trends."
        tests: [not_null]
      - name: provider
        description: "Lowercased provider-naam (oci|aws|azure|gcp)."
        tests:
          - not_null
          - accepted_values:
              values: [oci, aws, azure, gcp]
      - name: service_name
        tests: [not_null]
      - name: event_date
        tests: [not_null]
