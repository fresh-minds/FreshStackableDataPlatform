version: 2

models:
  - name: stg_persona
    description: |
      Geconformeerde personen — getypte kolommen uit `bronze.uwv.persona_created.payload`.
      BSN's zijn synthetisch (test-bereik 9XXXXXXXX), valideer met `bsn_valid`.
    config:
      tags: ["staging", "persoon"]
    meta:
      domain: persoon
      legal_basis: Wet_SUWI_art_56
      doelbinding: ["primair_proces"]
      bio_classificatie: vertrouwelijk
      bewaartermijn_jaren: 7
      eigenaar: data_office_uwv
      pii_kolommen: [bsn, voornaam, achternaam, geboortedatum, straat, huisnummer, postcode]
      risk_tier: laag

    columns:
      - name: bsn
        description: "Test-BSN (9-prefix), 11-proef-valide."
        tests:
          - not_null
          - unique
          - bsn_valid
      - name: voornaam
        description: "Voornaam (Faker NL-locale)."
      - name: achternaam
        description: "Achternaam."
      - name: geslacht
        description: "M | V | X."
        tests:
          - accepted_values:
              values: ["M", "V", "X"]
      - name: geboortedatum
        description: "Geboortedatum (date)."
        tests:
          - not_null
      - name: postcode
        description: "Postcode (synthetisch)."
      - name: woonplaats
        description: "Woonplaats."
      - name: nationaliteit
        description: "Nationaliteit-code (NL voor referentie)."
