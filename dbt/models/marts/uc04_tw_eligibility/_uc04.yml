version: 2

models:
  - name: mart_uc04_tw_eligibility
    description: |
      Cliënten potentieel rechthebbend op TW-aanvulling.
      Regel-gebaseerd (inkomen < norm), geen profilering.
    config:
      tags: ["marts", "uc04", "ww", "tw"]
    meta:
      domain: ww
      legal_basis: Wet_proactieve_dienstverlening_SZW_2025
      doelbinding: ["proactieve_dienstverlening"]
      bio_classificatie: vertrouwelijk
      bewaartermijn_jaren: 7
      eigenaar: divisie_ww
      pii_kolommen: [bsn]
      risk_tier: laag
      profilering: false
      opt_out_supported: true
      dpia_id: DPIA-UC04-2026-Q2
      cgm_entiteiten: [Uitkering, Inkomen, Huishouden]
    columns:
      - name: bsn
        tests:
          - not_null
          - bsn_valid
      - name: inkomen_maand_eur
        tests: [not_null]
      - name: norm_per_maand_eur
        tests: [not_null]
      - name: gat_per_maand
        description: "Hoeveel onder de norm — positief = rechthebbend."
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
