version: 2

models:
  - name: mart_uc05_client_360
    description: |
      360°-cliëntbeeld voor klantcontact. Alle kolommen aanwezig; OPA-policies
      (fase 9) maskeren BSN/medische velden per rol.
    config:
      tags: ["marts", "uc05", "crm"]
    meta:
      domain: crm
      legal_basis: WIA+WW+Wajong+TW
      doelbinding: ["klantcontact", "behandeling"]
      bio_classificatie: vertrouwelijk
      bewaartermijn_jaren: 7
      eigenaar: divisie_crm
      pii_kolommen: [bsn, voornaam, achternaam, geboortedatum, straat, huisnummer, postcode]
      risk_tier: laag-midden
      human_in_the_loop: true
      toegang_via_OPA_policies: true
      cgm_entiteiten: [Cliënt, Uitkering, Contact, Kanaal]
    columns:
      - name: bsn
        description: "BSN — wordt door OPA gemaskeerd voor `crm_medewerker`."
        tests:
          - not_null
          - unique
          - bsn_valid
      - name: voornaam
        tests: [not_null]
      - name: achternaam
        tests: [not_null]
      - name: geslacht
        tests:
          - accepted_values:
              values: [M, V, X]
      - name: n_lopende_ww
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
      - name: n_lopende_wia
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
