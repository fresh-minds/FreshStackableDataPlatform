version: 2

models:
  - name: mart_uc11_klantreis_events
    description: |
      UC-11 — Integrale Klantreis (event-stream). Eén rij per cliënt-gebeurtenis
      over zeven domeinen (persoon, polisadm, ww, zw, wia, wajong, crm). Gebruikt
      voor tijdlijn-visualisatie in Superset en voor downstream CRM-API. OPA
      maskeert `bsn` / `event_label` / `source_ref_id` per rol; row-filter
      regio_code voor wia_beoordelaar.
    config:
      tags: ["marts", "uc11", "cross", "klantcontact"]
    meta:
      domain: cross
      legal_basis: AVG_art_6_1e
      doelbinding: ["klantcontact", "behandeling", "sturingsinfo"]
      bio_classificatie: vertrouwelijk
      bewaartermijn_jaren: 30      # erft langste van bronnen (polisadm)
      eigenaar: divisie_klantcontact
      pii_kolommen: [bsn, event_label, source_ref_id]
      risk_tier: laag-midden
      human_in_the_loop: true
      toegang_via_OPA_policies: true
      cgm_entiteiten: [Cliënt, IKV, Aanvraag, Beoordeling, Uitkering, Contact, Kanaal]
    columns:
      - name: bsn
        description: "BSN van de cliënt. Wordt door OPA gemaskeerd per rol."
        tests:
          - not_null
          - bsn_valid
      - name: event_seq
        description: "Chronologische volgnummer per BSN (row_number over event_ts)."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1
      - name: event_ts
        tests: [not_null]
      - name: domein
        tests:
          - not_null
          - accepted_values:
              values: [persoon, polisadm, ww, zw, wia, wajong, crm]
      - name: event_type
        tests: [not_null]
      - name: event_label
        description: "Mens-leesbaar label. Gemaskeerd voor rollen zonder full PII."
        tests: [not_null]
      - name: regio_code
        description: "Alleen WIA-events vullen deze. Gebruikt voor row-filter."
      - name: source_ref_id
        description: "Primary key van bron-record. Gemaskeerd voor non-supervisor."

  - name: mart_uc11_klantreis_phases
    description: |
      UC-11 — Integrale Klantreis (fase-reconstructie). Gaps-and-islands over de
      event-stream: één rij per (BSN × fase × periode). Toont hoe een cliënt
      door verschillende UWV-fasen heen is gegaan (werknemer → ziek → wia → ...).
      Lopende fase: `is_lopend = true` en `fase_eind_ts is null`.
    config:
      tags: ["marts", "uc11", "cross", "sturingsinfo"]
    meta:
      domain: cross
      legal_basis: AVG_art_6_1e
      doelbinding: ["klantcontact", "behandeling", "sturingsinfo"]
      bio_classificatie: vertrouwelijk
      bewaartermijn_jaren: 30
      eigenaar: divisie_klantcontact
      pii_kolommen: [bsn]
      risk_tier: laag-midden
      cgm_entiteiten: [Cliënt, Traject, Uitkering, Werkhervatting]
    columns:
      - name: bsn
        tests:
          - not_null
          - bsn_valid
      - name: fase_volgnr
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1
      - name: fase
        tests:
          - not_null
          - accepted_values:
              values:
                - werknemer
                - tussen_dienstverband
                - ziek
                - ww_aanvraag
                - ww_uitkering
                - wia_in_behandeling
                - wga
                - iva
                - wajong_actief
      - name: fase_start_ts
        tests: [not_null]
      - name: duur_dagen
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
      - name: is_lopend
        tests: [not_null]
