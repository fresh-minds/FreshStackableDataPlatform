version: 2

models:
  - name: mart_uc09_effect_panel
    description: |
      Gepseudonimiseerd onderzoekspanel voor UC-09 (re-integratie effectmeting).
      Bevat alleen pseudo-IDs, geen ruwe BSN. Geschikt voor researcher-rol in
      sandbox-zone. Verenigbaar gebruik AVG art. 5 lid 1b.
    config:
      tags: ["marts", "uc09", "ag", "sandbox"]
    meta:
      domain: ag
      legal_basis: art_5_1b_verenigbaar_gebruik
      doelbinding: ["statistisch_onderzoek"]
      bio_classificatie: intern
      bewaartermijn_jaren: 10
      eigenaar: kenniscentrum_uwv
      pii_kolommen: []
      risk_tier: laag
      sandbox_only: true
      pseudonymized: true
      cgm_entiteiten: [Traject, Uitkomst]
    columns:
      - name: bsn_pseudo
        description: "SHA-256-pseudoniem; geen reverse-mapping zonder Sensitive Vault."
        tests: [not_null, unique]
      - name: leeftijd
        tests:
          - dbt_utils.accepted_range:
              min_value: 18
              max_value: 100
      - name: huidige_status
        tests:
          - accepted_values:
              values: [werkend, WW, WIA, overig]
