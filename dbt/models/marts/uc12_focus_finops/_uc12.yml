version: 2

models:
  - name: mart_uc12_focus_spend_monthly
    description: |
      UC-12 — FinOps spend per maand × provider × service-categorie × charge-
      categorie. Primaire trend-mart voor het FinOps-dashboard. Houdt Usage,
      Purchase en Credit gesplitst zodat het dashboard cleane spend-curves kan
      tonen en credits zichtbaar maakt zonder ze in de Usage-bucket te verbergen.
    config:
      tags: ["marts", "uc12", "finops"]
    meta:
      domain: finops
      legal_basis: AVG_art_6_1_f
      doelbinding: ["finops", "kostenbeheersing"]
      bio_classificatie: intern
      bewaartermijn_jaren: 7
      eigenaar: divisie_finance
      pii_kolommen: []
      risk_tier: laag
      cgm_entiteiten: [Kostenpost, Service, Periode]
    columns:
      - name: billing_month
        tests: [not_null]
      - name: provider
        tests:
          - not_null
          - accepted_values:
              values: [oci, aws, azure, gcp]
      - name: charge_category
        tests:
          - not_null
          - accepted_values:
              values: [Usage, Purchase, Tax, Credit, Adjustment]
      - name: effective_cost
        tests: [not_null]

  - name: mart_uc12_focus_service_breakdown
    description: |
      UC-12 — Spend per service-naam × regio × environment × applicatie. Voedt
      de pie-charts en drill-down-tabellen in het UC-12 dashboard. Alleen
      Usage-charges (Purchases en Credits hebben geen logische service/regio-
      attributie). Onbekende tags worden 'unknown' i.p.v. NULL zodat ze
      zichtbaar blijven in groupings.
    config:
      tags: ["marts", "uc12", "finops"]
    meta:
      domain: finops
      legal_basis: AVG_art_6_1_f
      doelbinding: ["finops", "kostenbeheersing", "capaciteitsplanning"]
      bio_classificatie: intern
      bewaartermijn_jaren: 7
      eigenaar: divisie_finance
      pii_kolommen: []
      risk_tier: laag
      cgm_entiteiten: [Service, Regio, Applicatie, Omgeving]
    columns:
      - name: billing_month
        tests: [not_null]
      - name: service_name
        tests: [not_null]
      - name: effective_cost
        tests: [not_null]

  - name: mart_uc12_focus_commitment_utilization
    description: |
      UC-12 — Committed-discount utilization per maand × provider × service-
      categorie. Toont hoeveel van de spend door committed pricing (savings
      plans, reservations) gaat versus on-demand. `commitment_coverage_pct`
      = committed_spend / total_spend; `effective_discount_pct` = savings /
      (savings + spend). Lage coverage % met hoge spend = optimalisatie-kans.
    config:
      tags: ["marts", "uc12", "finops"]
    meta:
      domain: finops
      legal_basis: AVG_art_6_1_f
      doelbinding: ["finops", "kostenbeheersing"]
      bio_classificatie: intern
      bewaartermijn_jaren: 7
      eigenaar: divisie_finance
      pii_kolommen: []
      risk_tier: laag
      cgm_entiteiten: [Commitment, Service, Periode]
    columns:
      - name: billing_month
        tests: [not_null]
      - name: provider
        tests: [not_null]
      - name: commitment_coverage_pct
        description: "Aandeel van Usage-spend onder committed pricing (0–1)."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1
      - name: effective_discount_pct
        tests: [not_null]

  - name: mart_uc12_focus_top_resources
    description: |
      UC-12 — Top-resources per maand op effective_cost. Eén rij per
      (billing_month × resource_id) met `rank_in_month` zodat dashboards
      "top 10/50/100" kunnen filteren via `rank_in_month <= N`. Resources
      zonder ResourceId krijgen een synthetic 'account-level:<sub_account>' key.
    config:
      tags: ["marts", "uc12", "finops"]
    meta:
      domain: finops
      legal_basis: AVG_art_6_1_f
      doelbinding: ["finops", "kostenbeheersing"]
      bio_classificatie: intern
      bewaartermijn_jaren: 7
      eigenaar: divisie_finance
      pii_kolommen: []
      risk_tier: laag
      cgm_entiteiten: [Resource, Service, Periode]
    columns:
      - name: billing_month
        tests: [not_null]
      - name: resource_id
        tests: [not_null]
      - name: effective_cost
        tests: [not_null]
      - name: rank_in_month
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1

  - name: mart_uc12_focus_savings
    description: |
      UC-12 — Savings-mart (list_cost vs effective_cost). Per maand × provider
      × pricing-category × service-categorie. `savings_pct` is een directe KPI;
      `savings_amount` voedt het "totale savings deze maand" big-number. Bij
      Tax/Adjustment kan savings_amount negatief zijn — geen bug.
    config:
      tags: ["marts", "uc12", "finops"]
    meta:
      domain: finops
      legal_basis: AVG_art_6_1_f
      doelbinding: ["finops", "kostenbeheersing"]
      bio_classificatie: intern
      bewaartermijn_jaren: 7
      eigenaar: divisie_finance
      pii_kolommen: []
      risk_tier: laag
      cgm_entiteiten: [Savings, Service, Periode]
    columns:
      - name: billing_month
        tests: [not_null]
      - name: provider
        tests: [not_null]
      - name: list_cost
        tests: [not_null]
      - name: effective_cost
        tests: [not_null]
