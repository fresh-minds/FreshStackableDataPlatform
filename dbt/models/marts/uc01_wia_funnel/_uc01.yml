version: 2

models:
  - name: mart_uc01_wia_funnel_daily
    description: |
      Dagelijks aggregaat WIA-aanvragen — sturingsinformatie zonder PII.
      Bron voor Superset-dashboard "WIA Funnel" (DoD-anchor).
    config:
      tags: ["marts", "uc01", "ag", "sturingsinfo"]
    meta:
      domain: ag
      legal_basis: WIA_art_64
      doelbinding: ["sturingsinfo"]
      bio_classificatie: intern
      bewaartermijn_jaren: 7
      eigenaar: divisie_ag
      pii_kolommen: []
      risk_tier: laag
      cgm_entiteiten: [Aanvraag, Beoordeling]
    columns:
      - name: aanvraag_datum
        tests: [not_null]
      - name: regio_code
        tests:
          - not_null
          - relationships:
              to: ref('cgm_regio_codes')
              field: code
      - name: onderdeel
        tests:
          - accepted_values:
              values: [WGA, IVA]
      - name: status
        tests: [not_null]
      - name: n_aanvragen
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
