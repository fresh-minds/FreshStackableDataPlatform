version: 2

models:
  - name: mart_dq_violations
    description: |
      Cross-UC DQ-violations — 1 rij per (use_case × check). Bron voor
      het Superset DQ-dashboard (detail-tabel + violations-pie). Houdt
      dezelfde semantiek aan als de dbt-tests in _uc*.yml; verschil:
      hier gematerialiseerd zodat een dashboard kan tonen zonder de
      test-runner aan te roepen.
    config:
      tags: ["marts", "dq", "cross_uc"]
    meta:
      domain: governance
      legal_basis: AVG_art_5_1d_juistheid
      doelbinding: ["kwaliteitscontrole"]
      bio_classificatie: intern
      bewaartermijn_jaren: 7
      eigenaar: data_steward_platform
      pii_kolommen: []
      risk_tier: laag
    columns:
      - name: uc_code
        tests: [not_null]
      - name: uc_name
        tests: [not_null]
      - name: check_name
        tests: [not_null]
      - name: severity
        tests:
          - not_null
          - accepted_values:
              values: [critical, high, medium]
      - name: n_violations
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
      - name: n_records
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0

  - name: mart_dq_overview
    description: |
      Cross-UC DQ-samenvatting — 1 rij per use-case. Bron voor
      top-tiles + bar-chart van het Superset DQ-dashboard.
      dq_score_pct = pass-percentage van alle check-evaluaties.
    config:
      tags: ["marts", "dq", "cross_uc"]
    meta:
      domain: governance
      legal_basis: AVG_art_5_1d_juistheid
      doelbinding: ["kwaliteitscontrole"]
      bio_classificatie: intern
      bewaartermijn_jaren: 7
      eigenaar: data_steward_platform
      pii_kolommen: []
      risk_tier: laag
    columns:
      - name: uc_code
        tests: [not_null, unique]
      - name: uc_name
        tests: [not_null]
      - name: n_records
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
      - name: n_checks
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1
      - name: dq_score_pct
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100
      - name: dq_status
        tests:
          - accepted_values:
              values: [groen, geel, oranje, rood]
