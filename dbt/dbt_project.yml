name: uwv_data_platform
version: 0.1.0
config-version: 2

profile: uwv_trino

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
analysis-paths: ["analyses"]

target-path: target
clean-targets:
  - target
  - dbt_packages

# Centrale variabelen — table_format komt uit env, default delta.
# Switching naar iceberg: TABLE_FORMAT=iceberg dbt run.
vars:
  table_format: "{{ env_var('TABLE_FORMAT', 'delta') }}"
  # Zout voor pseudonymize-macro. DEV-only; productie via secret.
  pseudonymize_salt: "{{ env_var('UWV_PSEUDONYMIZE_SALT', 'UWV-DEV-SALT-2026') }}"

# Schemas met expliciete S3-locatie pre-creëren. Stackable's Hive-Metastore
# heeft geen globale `warehouse.dir` config; zonder expliciete schema-locatie
# defaultet HMS naar `file:/stackable/warehouse/...` wat Trino's Delta-Lake-
# connector niet kan schrijven ("No factory for location: file:..."). De
# on-run-start hooks zorgen dat elke schema bestaat MET de juiste S3-bucket.
on-run-start:
  - "CREATE SCHEMA IF NOT EXISTS silver.persoon       WITH (location = 's3a://uwv-silver/persoon/')"
  - "CREATE SCHEMA IF NOT EXISTS silver.polisadm      WITH (location = 's3a://uwv-silver/polisadm/')"
  - "CREATE SCHEMA IF NOT EXISTS silver.ww            WITH (location = 's3a://uwv-silver/ww/')"
  - "CREATE SCHEMA IF NOT EXISTS silver.wia           WITH (location = 's3a://uwv-silver/wia/')"
  - "CREATE SCHEMA IF NOT EXISTS silver.wajong        WITH (location = 's3a://uwv-silver/wajong/')"
  - "CREATE SCHEMA IF NOT EXISTS silver.zw            WITH (location = 's3a://uwv-silver/zw/')"
  - "CREATE SCHEMA IF NOT EXISTS silver.crm           WITH (location = 's3a://uwv-silver/crm/')"
  - "CREATE SCHEMA IF NOT EXISTS silver.fez           WITH (location = 's3a://uwv-silver/fez/')"
  - "CREATE SCHEMA IF NOT EXISTS silver.klantcontact  WITH (location = 's3a://uwv-silver/klantcontact/')"
  - "CREATE SCHEMA IF NOT EXISTS silver.intermediate  WITH (location = 's3a://uwv-silver/intermediate/')"
  - "CREATE SCHEMA IF NOT EXISTS silver.sandbox_uc09  WITH (location = 's3a://uwv-silver/sandbox_uc09/')"
  - "CREATE SCHEMA IF NOT EXISTS silver.seed          WITH (location = 's3a://uwv-silver/seed/')"
  - "CREATE SCHEMA IF NOT EXISTS gold.uc01_wia_funnel    WITH (location = 's3a://uwv-gold/uc01_wia_funnel/')"
  - "CREATE SCHEMA IF NOT EXISTS gold.uc04_tw_eligibility WITH (location = 's3a://uwv-gold/uc04_tw_eligibility/')"
  - "CREATE SCHEMA IF NOT EXISTS gold.uc05_client_360    WITH (location = 's3a://uwv-gold/uc05_client_360/')"
  - "CREATE SCHEMA IF NOT EXISTS gold.uc06_lastprognose  WITH (location = 's3a://uwv-gold/uc06_lastprognose/')"
  - "CREATE SCHEMA IF NOT EXISTS gold.uc07_dq_polisadm   WITH (location = 's3a://uwv-gold/uc07_dq_polisadm/')"
  - "CREATE SCHEMA IF NOT EXISTS gold.uc09_reint_effect  WITH (location = 's3a://uwv-gold/uc09_reint_effect/')"
  - "CREATE SCHEMA IF NOT EXISTS gold.uc11_klantreis     WITH (location = 's3a://uwv-gold/uc11_klantreis/')"
  - "CREATE SCHEMA IF NOT EXISTS gold.uc_klant_tev       WITH (location = 's3a://uwv-gold/uc_klant_tev/')"
  - "CREATE SCHEMA IF NOT EXISTS gold.dq_overview        WITH (location = 's3a://uwv-gold/dq_overview/')"
  - "CREATE SCHEMA IF NOT EXISTS gold.seed               WITH (location = 's3a://uwv-gold/seed/')"

# ----------------------------------------------------------------------
# Model-config per laag.
#   staging  -> catalog `silver`,    schema = domein (ww, wia, ...)
#   intermediate -> catalog `silver`, schema = `intermediate`
#   marts    -> catalog `gold`,      schema = uc-id
#
# Table-format (delta vs iceberg) wordt niet hier gehard-codeerd; modellen
# gebruiken `properties=table_format_properties()` via de macro.
# ----------------------------------------------------------------------
models:
  uwv_data_platform:
    +on_table_exists: replace

    staging:
      +database: silver
      +materialized: view
      persona:
        +schema: persoon
      polisadm:
        +schema: polisadm
      ww:
        +schema: ww
      wia:
        +schema: wia
      wajong:
        +schema: wajong
      zw:
        +schema: zw
      crm:
        +schema: crm
      fez:
        +schema: fez
      klantcontact:
        +schema: klantcontact

    intermediate:
      +database: silver
      +schema: intermediate
      +materialized: view

    marts:
      +database: gold
      +materialized: table
      uc01_wia_funnel:
        +schema: uc01_wia_funnel
      uc04_tw_eligibility:
        +schema: uc04_tw_eligibility
      uc05_client_360:
        +schema: uc05_client_360
      uc06_lastprognose:
        +schema: uc06_lastprognose
      uc07_dq_polisadm:
        +schema: uc07_dq_polisadm
      uc09_reint_effect:
        +schema: uc09_reint_effect
      uc11_klantreis:
        +schema: uc11_klantreis
      uc_klant_tev:
        +schema: uc_klant_tev
      dq_overview:
        +schema: dq_overview

# ----------------------------------------------------------------------
# Seeds
# ----------------------------------------------------------------------
seeds:
  uwv_data_platform:
    +database: silver
    +schema: seed
    +quote_columns: false
    cgm_uitkering_typen:
      +column_types:
        code: varchar(8)
        beschrijving: varchar(200)
        wet: varchar(8)
    cgm_wet_codes:
      +column_types:
        code: varchar(8)
        naam: varchar(80)
        omschrijving: varchar(400)
    cgm_regio_codes:
      +column_types:
        code: varchar(4)
        naam: varchar(80)
        provincie: varchar(40)
    tw_normen_2026:
      +column_types:
        huishoud_type: varchar(40)
        norm_per_maand_eur: integer
    scenario_inputs:
      +column_types:
        scenario_id: varchar(40)
        beschrijving: varchar(200)
        parameter: varchar(80)
        waarde: varchar(40)
