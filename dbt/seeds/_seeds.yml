version: 2

seeds:
  - name: cgm_uitkering_typen
    description: "CGM-referentie: typen uitkeringen per wet."
    columns:
      - name: code
        tests: [not_null, unique]
      - name: wet
        tests: [not_null]

  - name: cgm_wet_codes
    description: "CGM-referentie: codetabel sociale-zekerheidswetten."
    columns:
      - name: code
        tests: [not_null, unique]

  - name: cgm_regio_codes
    description: "CGM-referentie: 9 mock-regiocodes (AMS, RTM, ...)."
    columns:
      - name: code
        tests: [not_null, unique]
      - name: naam
        tests: [not_null]

  - name: tw_normen_2026
    description: "TW-normen per huishoudtype 2026 (synthetische bedragen voor UC-04)."
    columns:
      - name: huishoud_type
        tests: [not_null, unique]
      - name: norm_per_maand_eur
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 500
              max_value: 5000

  - name: scenario_inputs
    description: "Scenario-parameters voor UC-06 lastprognose-engine."
    columns:
      - name: scenario_id
        tests: [not_null, unique]
