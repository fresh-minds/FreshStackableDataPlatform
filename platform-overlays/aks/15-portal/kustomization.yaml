apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../platform/15-portal
patches:
  - target:
      kind: Ingress
      name: portal
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: platform.eu-sovereigndataplatform.com
      - op: replace
        path: /spec/rules/0/host
        value: platform.eu-sovereigndataplatform.com
  # OAuth2-proxy ConfigMap is rewritten per mode (full config replacement
  # because the .cfg is a single multi-line string and JSON-patch can't
  # do substring substitution).
  - path: configmap-oauth2-proxy-aks.yaml
    target:
      kind: ConfigMap
      name: portal-oauth2-proxy-config
