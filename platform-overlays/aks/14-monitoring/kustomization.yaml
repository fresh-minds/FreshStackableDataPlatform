apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../platform/14-monitoring
patches:
  - target:
      kind: Ingress
      name: prometheus
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: prometheus.eu-sovereigndataplatform.com
      - op: replace
        path: /spec/rules/0/host
        value: prometheus.eu-sovereigndataplatform.com
