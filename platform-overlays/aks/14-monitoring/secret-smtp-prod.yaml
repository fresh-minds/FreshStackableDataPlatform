# Strategic-merge patch op het Secret. Vervangt alleen de SMTP-velden;
# Slack-/PagerDuty-keys uit de base blijven staan. Voor productie hoort
# dit via External Secrets Operator + Vault te gaan; tot die er is patcht
# de operator hier de placeholders door de echte SMTP-credentials.
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-receivers
  namespace: uwv-monitoring
stringData:
  smtp_username: "alertmanager@uwv.nl"
  smtp_password: "REPLACE_WITH_RELAY_PASSWORD"
