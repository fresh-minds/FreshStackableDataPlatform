apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../platform/11-airflow
patches:
  - target:
      kind: Ingress
      name: airflow
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: airflow.eu-sovereigndataplatform.com
      - op: replace
        path: /spec/rules/0/host
        value: airflow.eu-sovereigndataplatform.com
  # AirflowCluster OIDC redirect — see ../patches/airflowcluster-aks.yaml
  - path: patches/airflowcluster.yaml
    target:
      group: airflow.stackable.tech
      kind: AirflowCluster
      name: uwv-airflow
