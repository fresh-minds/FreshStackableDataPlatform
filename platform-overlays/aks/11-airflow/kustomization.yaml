# AKS overlay for platform/11-airflow.
# Platform-level ingress on airflow.uwv-platform.local stays put for
# in-cluster routing; public AKS ingress is `airflow-public` in
# infrastructure/azure/public-ingresses.yaml.
#
# This overlay only flips AirflowCluster's BASE_URL so Flask's OAuth
# redirect_uri (and X-Forwarded-Host proxy_fix) builds URLs that match
# what the browser sees on https://airflow.eu-sovereigndataplatform.com.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../platform/11-airflow
patches:
  - path: patches/airflowcluster.yaml
    target:
      group: airflow.stackable.tech
      kind: AirflowCluster
      name: uwv-airflow
