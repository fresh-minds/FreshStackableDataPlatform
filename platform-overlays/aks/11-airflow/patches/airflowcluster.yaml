# AKS patch for AirflowCluster — switch BASE_URL to the public hostname so
# Flask's OAuth redirect_uri (and X-Forwarded-Host proxy_fix) builds URLs
# that match what the browser sees on https://airflow.${PLATFORM_DOMAIN}.
- op: replace
  path: /spec/webservers/envOverrides/AIRFLOW__WEBSERVER__BASE_URL
  value: "https://airflow.eu-sovereigndataplatform.com"
- op: replace
  path: /spec/schedulers/envOverrides/AIRFLOW__WEBSERVER__BASE_URL
  value: "https://airflow.eu-sovereigndataplatform.com"
