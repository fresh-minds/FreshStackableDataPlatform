# AKS overlay for platform/08-spark.
# No `spark-public` entry in infrastructure/azure/public-ingresses.yaml so
# this overlay owns AKS public access to the Spark driver UI. cert-manager
# annotation flipped to letsencrypt-prod for a real public cert.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../platform/08-spark
patches:
  - target:
      kind: Ingress
      name: spark
    patch: |-
      - op: replace
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
        value: letsencrypt-prod
      - op: replace
        path: /spec/tls/0/hosts/0
        value: spark.eu-sovereigndataplatform.com
      - op: replace
        path: /spec/rules/0/host
        value: spark.eu-sovereigndataplatform.com
