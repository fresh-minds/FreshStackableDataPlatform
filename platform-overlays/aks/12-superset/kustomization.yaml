apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../platform/12-superset
patches:
  - target:
      kind: Ingress
      name: superset
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: superset.eu-sovereigndataplatform.com
      - op: replace
        path: /spec/rules/0/host
        value: superset.eu-sovereigndataplatform.com
  - target:
      group: superset.stackable.tech
      kind: SupersetCluster
      name: uwv-superset
    patch: |-
      - op: replace
        path: /spec/nodes/configOverrides/superset_config.py/WEBSERVER_BASE_URL
        value: '"https://superset.eu-sovereigndataplatform.com"'
