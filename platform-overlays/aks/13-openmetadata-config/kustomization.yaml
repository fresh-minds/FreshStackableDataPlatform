apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../platform/13-openmetadata-config
patches:
  - target:
      kind: Ingress
      name: opensearch
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: opensearch.eu-sovereigndataplatform.com
      - op: replace
        path: /spec/rules/0/host
        value: opensearch.eu-sovereigndataplatform.com
