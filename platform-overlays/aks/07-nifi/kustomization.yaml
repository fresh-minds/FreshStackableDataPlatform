# AKS overlay for platform/07-nifi.
# Chart/platform-level ingress on nifi.uwv-platform.local stays put for
# in-cluster routing; public AKS ingress is `nifi-public` in
# infrastructure/azure/public-ingresses.yaml.
#
# This overlay only adjusts NiFi's host-header allowlist so requests
# arriving via the .com ingress aren't rejected by NiFi's strict check.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../platform/07-nifi
patches:
  - target:
      group: nifi.stackable.tech
      kind: NifiCluster
      name: uwv-nifi
    patch: |-
      - op: replace
        path: /spec/clusterConfig/hostHeaderCheck/additionalAllowedHosts/0
        value: "nifi.eu-sovereigndataplatform.com"
