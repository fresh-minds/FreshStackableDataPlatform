# JSON6902 patch — voegt een 2e emailConfigs-entry toe aan de bestaande
# email-uwv-alerts receiver. Alertmanager probeert ELKE entry: dus elke
# alert gaat naar zowel MailHog (entry #0) als naar de Azure-relay (deze
# nieuwe entry).
#
# `authUsername` formaat voor Entra-ID-auth op ACS Email SMTP (per MS Learn
# /azure/communication-services/concepts/email/email-smtp-authentication-
# microsoft-entra):
#
#   <ACS-resource-name>.<Entra-Application-Id>.<Entra-Tenant-Id>
#
# Voor deze setup:
#   uwv-acs.<entra-app-client-id>.fedcef2f-0c85-40dd-8f55-e23143dcb367
#
# De `<entra-app-client-id>`-placeholder wordt ingevuld door
# scripts/azure/setup-acs-email-test.sh — zowel in CLI-modus als in
# portal-modus.
#
# Het `smtp_password_acs` Secret-key wordt door dat script imperatief
# in het k8s-Secret gezet — bewust NIET in code want het is een
# Entra-app-client-secret.
- op: add
  path: /spec/receivers/0/emailConfigs/-
  value:
    to: karel.goense@freshminds.nl
    from: DoNotReply@660f5bc2-28eb-4e35-8445-9e64d6cfe5ca.azurecomm.net
    smarthost: smtp.azurecomm.net:587
    requireTLS: true
    authUsername: "PLACEHOLDER_FILLED_BY_setup-acs-email-test.sh"
    authPassword:
      name: alertmanager-receivers
      key: smtp_password_acs
    sendResolved: true
    headers:
      - key: Subject
        value: '[ACS-test {{ .Status | toUpper }}] {{ .CommonLabels.alertname }} ({{ .CommonLabels.severity }})'
