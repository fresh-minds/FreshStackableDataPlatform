# dbt-profiles voor in-cluster Cosmos KubernetesExecutionMode runs.
#
# Cosmos 1.6 met TrinoCertificateProfileMapping injecteert geen profiles.yml
# in de Kubernetes-task-pod (alleen voor ExecutionMode.LOCAL). Daarom bakken
# we een statisch profiel in de image; Trino-host komt via cluster-DNS,
# auth via static-user `smoketest` (cluster heeft `authentication: []`,
# dus method=none wat alleen X-Trino-User stuurt).
#
# Voor lokale `dbt` runs gebruik je profiles.yml.template in dbt/.
uwv_trino:
  target: dev
  outputs:
    dev:
      type: trino
      method: none
      user: smoketest
      host: uwv-trino-coordinator.uwv-platform.svc.cluster.local
      # 8443 is hardgecodeerd: TRINO_PORT mag niet via env worden overschreven
      # (sommige Trino-clients/Cosmos zetten 'm op 443).
      port: 8443
      http_scheme: https
      # cert=false → geen TLS-verify. OK voor in-cluster dev (cert-manager
      # self-signed CA niet aanwezig in dbt-image). Productie injecteert
      # /etc/ssl/uwv-platform-ca.crt via volume + extraLoad-config.
      cert: false
      database: silver
      schema: dbt_default
      threads: 4
      session_properties: {}

    # Fabric Lakehouse target voor de uc11 multi-platform demo (gold-marts
    # via dbt-fabricspark). Wordt aangeroepen door uc11_fabric DAG; SP-creds
    # komen uit K8s Secret 'uc11-multiplatform-creds'.
    fabric_dev:
      type: fabricspark
      method: livy
      authentication: ServicePrincipal
      tenant_id: "{{ env_var('FABRIC_TENANT_ID') }}"
      client_id: "{{ env_var('FABRIC_CLIENT_ID') }}"
      client_secret: "{{ env_var('FABRIC_CLIENT_SECRET') }}"
      workspaceid: "{{ env_var('FABRIC_WORKSPACE_ID') }}"
      lakehouseid: "{{ env_var('FABRIC_LAKEHOUSE_ID') }}"
      lakehouse: "{{ env_var('FABRIC_LAKEHOUSE_NAME', 'uc11_lakehouse') }}"
      endpoint: "{{ env_var('FABRIC_ENDPOINT', 'https://api.fabric.microsoft.com/v1') }}"
      schema: "{{ env_var('FABRIC_SCHEMA', 'uc11_lakehouse') }}"
      spark_config:
        name: "dbt-uwv-uc11"
      threads: 4
      connect_retries: 5
      connect_timeout: 60
      retry_all: true
