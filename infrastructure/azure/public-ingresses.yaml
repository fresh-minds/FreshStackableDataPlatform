# Public-DNS Ingresses for the UWV reference platform on AKS.
#
# Domain: eu-sovereigndataplatform.com (Azure DNS in ai-trial-rg).
# Apex A record points at the static Public IP `uwv-platform-ingress-pip`
# (20.56.116.97) bound to the ingress-nginx Service. All sub-domains are
# CNAMEs to apex.
#
# TLS: real Let's Encrypt certs via the `letsencrypt-prod` ClusterIssuer
# (DNS-01 challenge through Azure DNS — see letsencrypt-issuer.yaml).
# No more browser warnings; cookie domains are set on .eu-sovereigndataplatform.com.
#
# Architecture in this file:
#   - One Cert + Ingress per service (keycloak, grafana, openmetadata,
#     minio, minio-console/UI, superset, airflow, prometheus,
#     alertmanager).
#   - dbt-docs subdomain redirects to /dbt-docs.html on the portal so the
#     portal stays the single source of truth for serving the static bundle.
#
# The Astro portal (platform-landing Deployment + platform-public Ingress)
# moved to platform-overlays/aks/15-portal/ so it sits next to its k3d
# sibling under platform/15-portal/.
---
# ============================================================================
# CERTS + INGRESSES per service.
# All certs use the letsencrypt-prod ClusterIssuer; cert-manager auto-renews.
#
# NB: the platform-landing portal (Deployment + Service + nginx config) AND
# its public Ingress + Certificate have moved to
# platform-overlays/aks/15-portal/ — the AKS portal now lives next to its
# k3d sibling under platform/15-portal/ via the standard mode overlay.
# ============================================================================
# --- Keycloak ---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: keycloak-public-tls
  namespace: uwv-auth
spec:
  secretName: keycloak-public-tls
  issuerRef: { name: letsencrypt-prod, kind: ClusterIssuer }
  commonName: keycloak.eu-sovereigndataplatform.com
  dnsNames: [keycloak.eu-sovereigndataplatform.com]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak-public
  namespace: uwv-auth
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts: [keycloak.eu-sovereigndataplatform.com]
      secretName: keycloak-public-tls
  rules:
    - host: keycloak.eu-sovereigndataplatform.com
      http: { paths: [{ path: /, pathType: Prefix, backend: { service: { name: keycloak, port: { number: 80 } } } }] }
---
