# Note: Alertmanager intentionally disabled in helm-overrides for AKS
# (alertmanager.enabled=false in prometheus-stack values). The DNS CNAME
# and Ingress are intentionally absent here. Re-enable in
# infrastructure/helm/prometheus-stack/values.yaml + add an Ingress block
# back if you start using it.
---
# --- MinIO Console (UI) ---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: minio-public-tls
  namespace: uwv-platform
spec:
  secretName: minio-public-tls
  issuerRef: { name: letsencrypt-prod, kind: ClusterIssuer }
  commonName: minio.eu-sovereigndataplatform.com
  dnsNames: [minio.eu-sovereigndataplatform.com]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio-public
  namespace: uwv-platform
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # MinIO console listens on HTTPS:9001 with its own self-signed cert.
    # nginx must speak HTTPS to the backend (not HTTP) and not verify the
    # upstream cert — without this we got HTTP 400 from MinIO ("plain HTTP
    # request was sent to HTTPS port").
    nginx.ingress.kubernetes.io/backend-protocol: HTTPS
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "off"
    # Console streams large responses (logs, browser file list) — disable
    # buffering so they don't time out on the nginx side.
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [minio.eu-sovereigndataplatform.com]
      secretName: minio-public-tls
  rules:
    - host: minio.eu-sovereigndataplatform.com
      http: { paths: [{ path: /, pathType: Prefix, backend: { service: { name: minio-console, port: { number: 9001 } } } }] }
---
# --- MinIO S3 API ---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: minio-api-public-tls
  namespace: uwv-platform
spec:
  secretName: minio-api-public-tls
  issuerRef: { name: letsencrypt-prod, kind: ClusterIssuer }
  commonName: minio-api.eu-sovereigndataplatform.com
  dnsNames: [minio-api.eu-sovereigndataplatform.com]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio-api-public
  namespace: uwv-platform
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # MinIO S3 API listens on HTTPS:9000. Same HTTPS-backend treatment as the
    # console ingress above. Also raise proxy-body-size so large object PUTs
    # aren't rejected by the default 1MB ceiling.
    nginx.ingress.kubernetes.io/backend-protocol: HTTPS
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "off"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [minio-api.eu-sovereigndataplatform.com]
      secretName: minio-api-public-tls
  rules:
    - host: minio-api.eu-sovereigndataplatform.com
      http: { paths: [{ path: /, pathType: Prefix, backend: { service: { name: minio, port: { number: 9000 } } } }] }
---
