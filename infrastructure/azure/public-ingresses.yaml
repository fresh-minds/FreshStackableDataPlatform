# Public-DNS Ingresses for the UWV reference platform on AKS.
#
# Domain: eu-sovereigndataplatform.com (Azure DNS in ai-trial-rg).
# Apex A record points at the static Public IP `uwv-platform-ingress-pip`
# (20.56.116.97) bound to the ingress-nginx Service. All sub-domains are
# CNAMEs to apex.
#
# TLS: real Let's Encrypt certs via the `letsencrypt-prod` ClusterIssuer
# (DNS-01 challenge through Azure DNS — see letsencrypt-issuer.yaml).
# No more browser warnings; cookie domains are set on .eu-sovereigndataplatform.com.
#
# Architecture in this file:
#   1. platform-landing — the Astro portal + oauth2-proxy sidecar; entry
#      point at https://platform.eu-sovereigndataplatform.com/.
#   2. One Cert + Ingress per service (keycloak, grafana, openmetadata,
#      minio, minio-console/UI, superset, airflow, trino, nifi, prometheus,
#      alertmanager).
#   3. dbt-docs subdomain redirects to /dbt-docs.html on the portal so
#      the portal stays the single source of truth for serving the static
#      bundle.
---
# ============================================================================
# 1. PLATFORM LANDING PAGE — Astro portal served from a tarball ConfigMap,
#    fronted by oauth2-proxy for SSO.
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-landing-nginx-conf
  namespace: uwv-platform
data:
  nginx.conf: |
    worker_processes  1;
    error_log  /dev/stderr  warn;
    pid        /tmp/nginx.pid;
    events { worker_connections 1024; }
    http {
      include       /etc/nginx/mime.types;
      default_type  application/octet-stream;
      client_body_temp_path /tmp/client_body;
      proxy_temp_path       /tmp/proxy;
      fastcgi_temp_path     /tmp/fastcgi;
      uwsgi_temp_path       /tmp/uwsgi;
      scgi_temp_path        /tmp/scgi;
      access_log /dev/stdout;
      sendfile on;
      gzip on;
      gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
      resolver kube-dns.kube-system.svc.cluster.local valid=30s;

      server {
        listen 8080 default_server;
        server_name _;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;

        root /usr/share/nginx/html;
        index index.html;

        location = /api/health {
          access_log off;
          return 200 '{"status":"ok"}';
          default_type application/json;
        }

        location ~ ^/api/status/up$ {
          if ($arg_job !~ ^[a-z0-9_-]+$) { return 400; }
          set $prom_host "prometheus-kube-prometheus-prometheus.uwv-monitoring.svc.cluster.local:9090";
          proxy_pass http://$prom_host/api/v1/query?query=up%7Bjob%3D%22$arg_job%22%7D;
          proxy_read_timeout 5s;
          proxy_intercept_errors on;
          error_page 502 503 504 = @prom_unavailable;
        }

        location @prom_unavailable {
          add_header Content-Type "application/json" always;
          return 200 '{"status":"unavailable"}';
        }

        location / {
          try_files $uri $uri/ $uri.html /index.html;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-landing
  namespace: uwv-platform
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: platform-landing }
  template:
    metadata:
      labels: { app: platform-landing }
      annotations:
        portal.uwv-platform/dist-checksum: "init"
    spec:
      initContainers:
        - name: extract-dist
          image: docker.io/library/busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              cd /html
              tar -xzf /dist/portal-dist.tar.gz
              echo "extracted $(find /html -type f | wc -l) files"
          volumeMounts:
            - { name: html, mountPath: /html }
            - { name: dist-tar, mountPath: /dist }
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports: [{ containerPort: 8080 }]
          volumeMounts:
            - { name: html, mountPath: /usr/share/nginx/html, readOnly: true }
            - { name: nginx-conf, mountPath: /etc/nginx/nginx.conf, subPath: nginx.conf, readOnly: true }
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits:   { memory: 96Mi }
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
          args:
            - --config=/etc/oauth2-proxy/oauth2-proxy.cfg
          env:
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom: { secretKeyRef: { name: portal-oauth2-proxy, key: client-secret } }
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom: { secretKeyRef: { name: portal-oauth2-proxy, key: cookie-secret } }
            - name: OAUTH2_PROXY_COOKIE_DOMAINS
              value: ".eu-sovereigndataplatform.com"
            - name: OAUTH2_PROXY_WHITELIST_DOMAINS
              value: ".eu-sovereigndataplatform.com"
            - name: OAUTH2_PROXY_REDIRECT_URL
              value: "https://platform.eu-sovereigndataplatform.com/oauth2/callback"
            - name: OAUTH2_PROXY_OIDC_ISSUER_URL
              value: "https://keycloak.eu-sovereigndataplatform.com/realms/uwv"
            # Base ConfigMap pins login_url to .local (skip_oidc_discovery=true);
            # override the browser-facing URL to .com so the 302 lands on the
            # public domain. Server-side endpoints (redeem/profile/validate/jwks)
            # stay in-cluster via the CoreDNS hosts-override.
            - name: OAUTH2_PROXY_LOGIN_URL
              value: "https://keycloak.eu-sovereigndataplatform.com/realms/uwv/protocol/openid-connect/auth"
            - name: OAUTH2_PROXY_REVERSE_PROXY
              value: "true"
          ports: [{ containerPort: 4180 }]
          readinessProbe:
            httpGet: { path: /ping, port: 4180 }
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests: { cpu: 10m, memory: 64Mi }
            limits:   { memory: 256Mi }
          volumeMounts:
            - { name: oauth2-proxy-config, mountPath: /etc/oauth2-proxy, readOnly: true }
      volumes:
        - name: html
          emptyDir: {}
        - name: dist-tar
          configMap: { name: platform-landing-dist }
        - name: nginx-conf
          configMap: { name: platform-landing-nginx-conf }
        - name: oauth2-proxy-config
          configMap: { name: portal-oauth2-proxy-config }
---
apiVersion: v1
kind: Service
metadata:
  name: platform-landing
  namespace: uwv-platform
spec:
  selector: { app: platform-landing }
  ports: [{ port: 80, targetPort: 4180 }]
---
# ============================================================================
# 2. CERTS + INGRESSES per service.
#    All certs use the letsencrypt-prod ClusterIssuer; cert-manager auto-renews.
# ============================================================================
# --- platform (apex + www) ---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: platform-public-tls
  namespace: uwv-platform
spec:
  secretName: platform-public-tls
  issuerRef: { name: letsencrypt-prod, kind: ClusterIssuer }
  commonName: platform.eu-sovereigndataplatform.com
  dnsNames:
    - platform.eu-sovereigndataplatform.com
    - eu-sovereigndataplatform.com
    - www.eu-sovereigndataplatform.com
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-public
  namespace: uwv-platform
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - platform.eu-sovereigndataplatform.com
        - eu-sovereigndataplatform.com
        - www.eu-sovereigndataplatform.com
      secretName: platform-public-tls
  rules:
    - host: platform.eu-sovereigndataplatform.com
      http: { paths: [{ path: /, pathType: Prefix, backend: { service: { name: platform-landing, port: { number: 80 } } } }] }
    - host: eu-sovereigndataplatform.com
      http: { paths: [{ path: /, pathType: Prefix, backend: { service: { name: platform-landing, port: { number: 80 } } } }] }
    - host: www.eu-sovereigndataplatform.com
      http: { paths: [{ path: /, pathType: Prefix, backend: { service: { name: platform-landing, port: { number: 80 } } } }] }
---
