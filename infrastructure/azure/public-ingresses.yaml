# --- OpenMetadata (data catalog) ---
# Plain HTTP backend on :8585. OpenMetadata has its own login screen that
# integrates with Keycloak via OIDC client `openmetadata` (server-side
# token exchange against keycloak.eu-sovereigndataplatform.com — Java
# truststore is loaded from /etc/uwv-ca/ca.crt which now contains the
# Mozilla public-root bundle, so LE certs validate).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: openmetadata-public-tls
  namespace: uwv-meta
spec:
  secretName: openmetadata-public-tls
  issuerRef: { name: letsencrypt-prod, kind: ClusterIssuer }
  commonName: openmetadata.eu-sovereigndataplatform.com
  dnsNames: [openmetadata.eu-sovereigndataplatform.com]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openmetadata-public
  namespace: uwv-meta
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    # OM 1.5 Dropwizard returns HTTP 404 + SPA shell for non-/ paths. The
    # SPA still mounts and React Router picks up the path — so /signin,
    # /callback, /explore all work in the browser even though the status
    # is 404. Tried error_page rewriting here but it interferes with real
    # /api/* 404s. Leave the 404 status; the SPA handles it correctly.
spec:
  ingressClassName: nginx
  tls:
    - hosts: [openmetadata.eu-sovereigndataplatform.com]
      secretName: openmetadata-public-tls
  rules:
    - host: openmetadata.eu-sovereigndataplatform.com
      http: { paths: [{ path: /, pathType: Prefix, backend: { service: { name: openmetadata, port: { number: 8585 } } } }] }
---
