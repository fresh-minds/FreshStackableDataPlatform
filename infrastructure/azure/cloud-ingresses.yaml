# Superset
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: superset-cloud-tls
  namespace: uwv-platform
spec:
  secretName: superset-cloud-tls
  issuerRef: { name: uwv-platform-issuer, kind: ClusterIssuer }
  commonName: superset.uwv-platform.cloud
  dnsNames: [superset.uwv-platform.cloud]
  duration: 8760h
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: superset-cloud
  namespace: uwv-platform
  annotations:
    cert-manager.io/cluster-issuer: uwv-platform-issuer
    # Superset reads X-Forwarded-Port to build absolute redirect URLs
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-Forwarded-Port 8443;
spec:
  ingressClassName: nginx
  tls:
    - hosts: [superset.uwv-platform.cloud]
      secretName: superset-cloud-tls
  rules:
    - host: superset.uwv-platform.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: superset, port: { number: 8088 } }
