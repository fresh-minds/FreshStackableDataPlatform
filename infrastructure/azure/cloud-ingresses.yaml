    nginx.ingress.kubernetes.io/backend-protocol: HTTPS
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "off"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [trino.uwv-platform.cloud]
      secretName: trino-cloud-tls
  rules:
    - host: trino.uwv-platform.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: trino, port: { number: 8443 } }
