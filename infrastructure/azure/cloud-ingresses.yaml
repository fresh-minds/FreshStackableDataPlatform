# Cloud-only ingress aliases.
#
# Adds `*.uwv-platform.cloud` hostnames alongside the existing
# `*.uwv-platform.local` ingresses on AKS so it can co-exist with a
# concurrently-running local k3d cluster (which keeps the .local mapping
# pinned to 127.0.0.1 via /etc/hosts).
#
# One cert + Ingress per service (5 services).
# All certs are signed by the same `uwv-platform-issuer` ClusterIssuer
# the platform already uses, so trusting the UWV CA once covers both
# .local and .cloud.
---
# Keycloak
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: keycloak-cloud-tls
  namespace: uwv-auth
spec:
  secretName: keycloak-cloud-tls
  issuerRef:
    name: uwv-platform-issuer
    kind: ClusterIssuer
  commonName: keycloak.uwv-platform.cloud
  dnsNames:
    - keycloak.uwv-platform.cloud
  duration: 8760h
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak-cloud
  namespace: uwv-auth
  annotations:
    cert-manager.io/cluster-issuer: uwv-platform-issuer
spec:
  ingressClassName: nginx
  tls:
    - hosts: [keycloak.uwv-platform.cloud]
      secretName: keycloak-cloud-tls
  rules:
    - host: keycloak.uwv-platform.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port: { number: 80 }
