---
# ---- Platform portal (Astro static site served via nginx) ----
# The original `portal` Deployment used uwv-platform/portal:dev, a locally
# built image with no registry the AKS cluster can pull from. To avoid
# requiring a registry today, we re-use stock nginxinc/nginx-unprivileged
# and inject:
#   1. nginx.conf via ConfigMap (the portal's own config from portal/nginx.conf)
#   2. The built static site (portal/dist/) as a tar.gz inside a binaryData
#      ConfigMap, extracted on pod start by an initContainer.
# scripts/azure/portal-publish.sh re-builds the dist tarball ConfigMap and
# rolls the Deployment.
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-landing-nginx-conf
  namespace: uwv-platform
data:
  nginx.conf: |
    worker_processes  1;
    error_log  /dev/stderr  warn;
    pid        /tmp/nginx.pid;
    events { worker_connections 1024; }
    http {
      include       /etc/nginx/mime.types;
      default_type  application/octet-stream;
      client_body_temp_path /tmp/client_body;
      proxy_temp_path       /tmp/proxy;
      fastcgi_temp_path     /tmp/fastcgi;
      uwsgi_temp_path       /tmp/uwsgi;
      scgi_temp_path        /tmp/scgi;
      access_log /dev/stdout;
      sendfile on;
      gzip on;
      gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
      resolver kube-dns.kube-system.svc.cluster.local valid=30s;

      server {
        listen 8080 default_server;
        server_name _;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;

        root /usr/share/nginx/html;
        index index.html;

        location = /api/health {
          access_log off;
          return 200 '{"status":"ok"}';
          default_type application/json;
        }

        location ~ ^/api/status/up$ {
          if ($arg_job !~ ^[a-z0-9_-]+$) { return 400; }
          set $prom_host "prometheus-kube-prometheus-prometheus.uwv-monitoring.svc.cluster.local:9090";
          proxy_pass http://$prom_host/api/v1/query?query=up%7Bjob%3D%22$arg_job%22%7D;
          proxy_read_timeout 5s;
          proxy_intercept_errors on;
          error_page 502 503 504 = @prom_unavailable;
        }

        location @prom_unavailable {
          add_header Content-Type "application/json" always;
          return 200 '{"status":"unavailable"}';
        }

        location / {
          try_files $uri $uri/ $uri.html /index.html;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-landing
  namespace: uwv-platform
spec:
  replicas: 1
  selector:
    matchLabels: { app: platform-landing }
  template:
    metadata:
      labels: { app: platform-landing }
      # rolling annotation so a portal-publish.sh re-applies ConfigMap +
      # forces the pod to re-extract the tarball even if the Deployment
      # spec is otherwise unchanged.
      annotations:
        portal.uwv-platform/dist-checksum: "init"
    spec:
      initContainers:
        - name: extract-dist
          image: docker.io/library/busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              cd /html
              tar -xzf /dist/portal-dist.tar.gz
              echo "extracted $(find /html -type f | wc -l) files"
          volumeMounts:
            - { name: html, mountPath: /html }
            - { name: dist-tar, mountPath: /dist }
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports: [{ containerPort: 8080 }]
          volumeMounts:
            - { name: html, mountPath: /usr/share/nginx/html, readOnly: true }
            - { name: nginx-conf, mountPath: /etc/nginx/nginx.conf, subPath: nginx.conf, readOnly: true }
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits:   { memory: 96Mi }
      volumes:
        - name: html
          emptyDir: {}
        - name: dist-tar
          configMap:
            name: platform-landing-dist
        - name: nginx-conf
          configMap:
            name: platform-landing-nginx-conf
---
apiVersion: v1
kind: Service
metadata:
  name: platform-landing
  namespace: uwv-platform
spec:
  selector: { app: platform-landing }
  ports: [{ port: 80, targetPort: 8080 }]
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: platform-cloud-tls
  namespace: uwv-platform
spec:
  secretName: platform-cloud-tls
  issuerRef:
    name: uwv-platform-issuer
    kind: ClusterIssuer
  commonName: platform.uwv-platform.cloud
  dnsNames: [platform.uwv-platform.cloud]
  duration: 8760h
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-cloud
  namespace: uwv-platform
  annotations:
    cert-manager.io/cluster-issuer: uwv-platform-issuer
spec:
  ingressClassName: nginx
  tls:
    - hosts: [platform.uwv-platform.cloud]
      secretName: platform-cloud-tls
  rules:
    - host: platform.uwv-platform.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: platform-landing
                port: { number: 80 }
