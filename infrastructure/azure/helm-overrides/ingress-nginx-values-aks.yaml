# ingress-nginx override for AKS.
#
# Base values use hostNetwork=true + service.type=ClusterIP because k3d's
# serverlb routes host:80/443 straight to node ports. AKS has no such
# pass-through — we need a real Azure Standard LB.
#
# We bind the LB to a *static* Public IP (uwv-platform-ingress-pip) reserved
# in the AKS node RG, so the apex A record on the public DNS zone stays
# stable across redeploys. Without this, Azure auto-allocates a new IP each
# time the Service is recreated and DNS would have to be updated.
controller:
  hostNetwork: false
  dnsPolicy: ClusterFirst
  service:
    type: LoadBalancer
    annotations:
      # AKS resolves these to the existing Public IP resource and binds the
      # cluster's outbound LB to it.
      service.beta.kubernetes.io/azure-pip-name: uwv-platform-ingress-pip
      service.beta.kubernetes.io/azure-load-balancer-resource-group: MC_dev-stackable-rg_uwv-platform-aks_westeurope
      # Force LB health probe to TCP. Default for AKS Standard LB on a 443
      # service port is HTTPS GET / — but ingress-nginx returns 404 on /
      # without a Host header, so the probe fails, all backends get marked
      # unhealthy, and the LB silently drops public traffic. TCP probe on
      # the NodePort is the simplest reliable check.
      service.beta.kubernetes.io/port_443_health-probe_protocol: tcp
      service.beta.kubernetes.io/port_80_health-probe_protocol: tcp
