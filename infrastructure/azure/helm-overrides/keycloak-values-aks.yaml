# Keycloak override for AKS — point at bitnamilegacy mirror.
image:
  repository: bitnamilegacy/keycloak

postgresql:
  image:
    repository: bitnamilegacy/postgresql

# AKS Keycloak is its own deployment (different cluster from k3d), so we
# pin KC_HOSTNAME to the .cloud URL with explicit :8443. Browser-emitted
# URLs in login HTML, form actions, redirects, and cookie domain all match
# what the kubectl-port-forward user actually sees. STRICT=false keeps
# requests on the in-cluster .local hostname (used by oauth2-proxy/back-
# channel via the CoreDNS hosts-override) accepted; only public/browser
# URLs are pinned to .cloud.
auth:
  realm: master
  frontendUrl: "https://keycloak.eu-sovereigndataplatform.com"

# AKS Keycloak's frontend URL is now the public DNS hostname on standard 443
# (no port suffix). Browsers using the public DNS get URLs that resolve and
# load straight off the Let's Encrypt-served LB; cookies are set on
# .eu-sovereigndataplatform.com.
extraEnvVars:
  - name: KC_HOSTNAME
    value: "https://keycloak.eu-sovereigndataplatform.com"
  - name: KC_HOSTNAME_STRICT
    value: "false"
  - name: KC_HOSTNAME_STRICT_BACKCHANNEL
    value: "false"
  - name: KC_PROXY_HEADERS
    value: "xforwarded"

# NB: tokens issued here have iss=https://keycloak.eu-sovereigndataplatform.com/
# regardless of whether the call came via the public domain (browser) or the
# in-cluster keycloak Service hostname (apps' backchannel). Apps with .local
# hardcoded as their OIDC issuer config (Superset, Airflow, OpenMetadata) —
# their helm values would need updating to expect the .com iss too. The
# portal works because oauth2-proxy auto-discovers the issuer URL from
# /.well-known/openid-configuration.
