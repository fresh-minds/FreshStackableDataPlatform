# Keycloak override for AKS — point at bitnamilegacy mirror.
image:
  repository: bitnamilegacy/keycloak

postgresql:
  image:
    repository: bitnamilegacy/postgresql

# AKS Keycloak is its own deployment (different cluster from k3d), so we
# pin KC_HOSTNAME to the .cloud URL with explicit :8443. Browser-emitted
# URLs in login HTML, form actions, redirects, and cookie domain all match
# what the kubectl-port-forward user actually sees. STRICT=false keeps
# requests on the in-cluster .local hostname (used by oauth2-proxy/back-
# channel via the CoreDNS hosts-override) accepted; only public/browser
# URLs are pinned to .cloud.
auth:
  realm: master
  frontendUrl: "https://keycloak.uwv-platform.cloud:8443"

extraEnvVars:
  - name: KC_HOSTNAME
    value: "https://keycloak.uwv-platform.cloud:8443"
  - name: KC_HOSTNAME_STRICT
    value: "false"
  - name: KC_HOSTNAME_STRICT_BACKCHANNEL
    value: "false"
  - name: KC_PROXY_HEADERS
    value: "xforwarded"

# NB: tokens issued here have iss=https://keycloak.uwv-platform.cloud:8443/
# regardless of whether the call came via .cloud (browser) or the in-cluster
# .local hostname (apps' backchannel). Apps with .local hardcoded as their
# OIDC issuer config (Superset, Airflow, OpenMetadata) will need their
# helm values updated to expect .cloud iss too — see the cloud-overrides
# for those charts. Until then the iss-claim mismatch will fail SSO on
# those apps even though the portal login works.
