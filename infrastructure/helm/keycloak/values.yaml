# Keycloak — OIDC IdP voor het UWV-platform.
#
# Mock UWV-realm wordt geïmporteerd via realm-uwv.json (ConfigMap).
# Productie: separate instance, MFA verplicht, externe IdP-federatie (DigiD/eHerkenning).
#
# Chart: bitnami/keycloak
#
# Zie postgresql/values.yaml voor uitleg. Zelfde Bitnami-mirror-patch.
global:
  security:
    allowInsecureImages: true

image:
  registry: docker.io
  repository: bitnamilegacy/keycloak

# Auth (DEV ONLY)
auth:
  adminUser: kcadmin
  adminPassword: "uwv-dev-only-CHANGE-ME-2026"

# Externe Postgres (gedeeld) — niet de embedded H2 of bundled PG.
postgresql:
  enabled: false
externalDatabase:
  host: postgres-postgresql.uwv-data.svc.cluster.local
  port: 5432
  user: uwvplatform
  password: "uwv-dev-only-CHANGE-ME-2026"
  database: keycloak

# Productie-mode (vereist EXTERNAL DB)
production: true

# TLS staat aan via ingress (cert-manager); intern http.
tls:
  enabled: false

# Resources
replicaCount: 1
resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# Realm-import bij startup
extraStartupArgs: "--import-realm"

extraVolumes:
  - name: uwv-realm
    configMap:
      name: keycloak-uwv-realm

extraVolumeMounts:
  - name: uwv-realm
    mountPath: /opt/bitnami/keycloak/data/import
    readOnly: true

# Hostname / proxy voor ingress-nginx vóór Keycloak.
# KC_HOSTNAME (browser-visible URL) is mode-specifiek (zie values-{k3d,aks}.yaml).
# Chart-managed ingress.hostname STAYS as keycloak.uwv-platform.local on
# every mode — it's the in-cluster routing target (via /etc/hosts on k3d,
# or CoreDNS hosts-override on AKS). The PUBLIC AKS ingress with the LE cert
# lives in infrastructure/azure/public-ingresses.yaml as `keycloak-public`.
proxy: edge

ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: uwv-platform-issuer
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
  hostname: keycloak.uwv-platform.local
  tls: true
  selfSigned: false  # cert-manager doet de cert

# Service exposure
service:
  type: ClusterIP
  ports:
    http: 80

# Prometheus-metrics aan: Quarkus-based Keycloak exposeert /metrics op de
# HTTP-poort en de Bitnami-chart maakt automatisch een ServiceMonitor aan
# (job=keycloak) die de portal-status-dot voedt.
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
