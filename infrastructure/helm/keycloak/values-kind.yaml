# Keycloak — kind-specific overrides.
# Same shape as k3d: kind's extraPortMappings expose host :8443 → node :443.

extraEnvVars:
  - name: KC_HOSTNAME
    value: "https://keycloak.uwv-platform.local:8443"
  - name: KC_HOSTNAME_STRICT
    value: "false"
  - name: KC_HOSTNAME_STRICT_BACKCHANNEL
    value: "false"
  - name: KC_PROXY_HEADERS
    value: "xforwarded"

ingress:
  hostname: keycloak.uwv-platform.local
