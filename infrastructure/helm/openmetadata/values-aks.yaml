# OpenMetadata — AKS-specific overrides.
#
# - storageClass: managed-csi (AKS default Standard SSD CSI; local-path
#                 doesn't exist on AKS).
# - openmetadata.config.openmetadata.host: 0.0.0.0
#   The chart default is `openmetadata` which DNS-resolves to the OpenMetadata
#   Service's ClusterIP (e.g. 10.0.53.97). The pod can't bind to that — only
#   to its own pod IP or 0.0.0.0. Without this override the OM Deployment
#   crashloops with `BindException: Address not available`.
#   (Note: base values.yaml already sets host=0.0.0.0; this is defensive
#   re-pin for cloud-specific testing.)
# - authentication URLs point at the public Let's Encrypt-served Keycloak.
# - extraInitContainers / extraVolumes / extraVolumeMounts / extraEnvs:
#   base values.yaml imports a uwv-ca-bundle ConfigMap to extend the Java
#   truststore for the self-signed dev CA. AKS uses a real ingress cert
#   (managed by cert-manager + Let's Encrypt), so the import is unnecessary
#   and the ConfigMap doesn't exist on AKS — empty out the lists to avoid
#   the missing-volume failure on pod start.

persistence:
  storageClass: "managed-csi"
  size: 5Gi

openmetadata:
  config:
    openmetadata:
      host: 0.0.0.0

    authentication:
      authority: https://keycloak.eu-sovereigndataplatform.com/realms/uwv
      callbackUrl: https://openmetadata.eu-sovereigndataplatform.com/callback
      publicKeys:
        - http://openmetadata.uwv-meta.svc.cluster.local:8585/api/v1/system/config/jwks
        - https://keycloak.eu-sovereigndataplatform.com/realms/uwv/protocol/openid-connect/certs

      oidcConfiguration:
        discoveryUri: https://keycloak.eu-sovereigndataplatform.com/realms/uwv/.well-known/openid-configuration
        callbackUrl: https://openmetadata.eu-sovereigndataplatform.com/callback
        serverUrl: https://openmetadata.eu-sovereigndataplatform.com

    authorizer:
      principalDomain: eu-sovereigndataplatform.com

ingress:
  hosts:
    - host: openmetadata.eu-sovereigndataplatform.com
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - hosts:
        - openmetadata.eu-sovereigndataplatform.com
      secretName: openmetadata-tls

# No self-signed CA on AKS — Let's Encrypt + default JDK trust store cover it.
extraInitContainers: []
extraVolumes: []
extraVolumeMounts: []
extraEnvs: []
