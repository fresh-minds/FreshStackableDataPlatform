# OpenMetadata — catalog / governance / lineage / DQ.
#
# Wordt in fase 8 geïnstalleerd. Hier alleen de values-template.
# Hergebruikt de gedeelde Postgres (uwv-data) en deelt het OpenSearch-
# cluster met Vector (uwv-meta).
#
# Chart: open-metadata/openmetadata (chart 1.5+)
#
# OIDC / SSO koppeling
# --------------------
# OpenMetadata 1.3+ verwacht de Pac4j OIDC-flow met `clientType: confidential`
# en het complete `oidcConfiguration` block. De client `openmetadata` staat
# in realm-uwv.json (clientId/secret + redirectUris); het secret wordt hier
# uit Kubernetes-secret openmetadata-oidc-client gelezen.
#
# Browser-redirects gaan naar de externe URL (https://keycloak.uwv-platform.local:8443),
# server-side token-exchange ook — daarom mountt de pod het uwv-ca-bundle
# (zelf-signed CA van ingress-nginx) in zijn Java truststore via een
# initContainer (zie `extraInitContainers` onderaan).

# Chart 1.5: alle config zit onder `openmetadata.config.*`, niet `global.*`.
openmetadata:
  config:
    # Chart-default `host: openmetadata` DNS-resolveert naar de Service
    # ClusterIP — een pod kan daar niet aan binden (alleen aan z'n eigen
    # IP of 0.0.0.0). Zonder deze override crasht de container met
    # `BindException: Address not available`.
    openmetadata:
      host: 0.0.0.0

    upgradeMigrationConfigs:
      debug: false

    # Externe Postgres (gedeeld in uwv-data)
    database:
      enabled: true
      host: postgres-postgresql.uwv-data.svc.cluster.local
      port: 5432
      driverClass: org.postgresql.Driver
      dbScheme: postgresql
      databaseName: openmetadata
      auth:
        username: uwvplatform
        password:
          secretRef: mysql-secrets               # chart-template hardcoded naam
          secretKey: openmetadata-mysql-password # idem

    # Externe OpenSearch (gedeeld met Vector)
    elasticsearch:
      enabled: true
      host: opensearch-uwv.uwv-meta.svc.cluster.local
      port: 9200
      scheme: http
      searchType: opensearch

    # OIDC via Keycloak — confidential client met server-side token-exchange.
    # Veld-namen volgen het chart-1.5 schema (schema is strict; oidcType/
    # clientId/clientSecret onder oidcConfiguration mogen niet anders heten).
    authentication:
      clientType: confidential
      provider: custom-oidc
      publicKeys:
        - http://openmetadata.uwv-meta.svc.cluster.local:8585/api/v1/system/config/jwks
        - https://keycloak.uwv-platform.local:8443/realms/uwv/protocol/openid-connect/certs
      authority: https://keycloak.uwv-platform.local:8443/realms/uwv
      clientId: openmetadata
      callbackUrl: https://openmetadata.uwv-platform.local:8443/callback
      responseType: code
      jwtPrincipalClaims:
        - preferred_username
        - email
        - sub
      enableSelfSignup: false

      # Pac4j-config voor confidential client.
      oidcConfiguration:
        enabled: true
        oidcType: Keycloak
        clientId:
          secretRef: openmetadata-oidc-client
          secretKey: clientId
        clientSecret:
          secretRef: openmetadata-oidc-client
          secretKey: clientSecret
        # Discovery via externe URL → discovery-doc bevat dan consistent
        # https://keycloak.uwv-platform.local:8443/... endpoints, zodat
        # auth-redirect (browser) én token-exchange (server) dezelfde
        # issuer-claim respecteren. uwv-ca-bundle moet dus in de pod's
        # Java truststore zitten (zie extraInitContainers verderop).
        discoveryUri: https://keycloak.uwv-platform.local:8443/realms/uwv/.well-known/openid-configuration
        scope: "openid email profile"
        useNonce: true
        preferredJwsAlgorithm: RS256
        responseType: code
        disablePkce: false
        callbackUrl: https://openmetadata.uwv-platform.local:8443/callback
        serverUrl: https://openmetadata.uwv-platform.local:8443
        clientAuthenticationMethod: client_secret_post
        tenant: ""
        maxClockSkew: ""
        tokenValidity: "3600"
        # customParams: chart-schema vraagt string, OM-config-class vraagt
        # LinkedHashMap. `""` faalt de Jackson-coerce; `"{}"` is een geldige
        # JSON-Map-as-string die Jackson wel naar LinkedHashMap omzet.
        customParams: "{}"

    authorizer:
      className: org.openmetadata.service.security.DefaultAuthorizer
      containerRequestFilter: org.openmetadata.service.security.JwtFilter
      initialAdmins:
        - data.steward
        - platform.admin
      principalDomain: uwv-platform.local
      enforcePrincipalDomain: false
      enableSecureSocketConnection: false

    # Airflow-pipelinesserver — geen Airflow geconfigureerd; uit
    pipelineServiceClientConfig:
      enabled: false

# Java truststore-uitbreiding: voeg uwv-platform CA toe zodat OM-pod TLS
# van ingress-nginx (waarachter Keycloak draait) kan verifieren bij de
# server-side token-exchange. Truststore wordt in een emptyDir geschreven
# door een initContainer en daarna door de OM-container ingelezen via
# JAVA_OPTS_APPEND (key/store-pass = changeit; alleen dev).
extraInitContainers:
  - name: import-uwv-ca
    image: eclipse-temurin:17-jre-jammy
    command:
      - sh
      - -c
      - |
        set -eu
        cp "$JAVA_HOME/lib/security/cacerts" /shared-truststore/cacerts
        chmod u+w /shared-truststore/cacerts
        keytool -importcert -noprompt -trustcacerts \
          -keystore /shared-truststore/cacerts \
          -storepass changeit \
          -alias uwv-platform-ca \
          -file /uwv-ca/ca.crt
        echo "uwv-platform CA imported into truststore"
    volumeMounts:
      - name: uwv-ca
        mountPath: /uwv-ca
        readOnly: true
      - name: shared-truststore
        mountPath: /shared-truststore

extraVolumes:
  - name: uwv-ca
    configMap:
      name: uwv-ca-bundle
  - name: shared-truststore
    emptyDir: {}

extraVolumeMounts:
  - name: shared-truststore
    mountPath: /shared-truststore
    readOnly: true

extraEnvs:
  # JAVA_TOOL_OPTIONS wordt door élk java-proces (incl. Dropwizard's
  # entrypoint /openmetadata-start.sh) automatisch toegepast — dit is
  # de standaard manier om extra JVM-args mee te geven zonder image-
  # specifieke env-vars als JAVA_OPTS / JAVA_OPTS_APPEND te gebruiken.
  - name: JAVA_TOOL_OPTIONS
    value: "-Djavax.net.ssl.trustStore=/shared-truststore/cacerts -Djavax.net.ssl.trustStorePassword=changeit"

resources:
  requests:
    cpu: 250m
    memory: 1Gi
  limits:
    cpu: 1
    memory: 2Gi

replicaCount: 1

# Ingress
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: uwv-platform-issuer
  hosts:
    - host: openmetadata.uwv-platform.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - hosts:
        - openmetadata.uwv-platform.local
      secretName: openmetadata-tls

# Persistentie van logs/configs
persistence:
  enabled: true
  storageClass: local-path
  size: 5Gi
