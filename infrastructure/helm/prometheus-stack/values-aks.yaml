# kube-prometheus-stack — AKS-specific overrides.
prometheus:
  prometheusSpec:
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: "managed-csi"

grafana:
  persistence:
    storageClassName: "managed-csi"
  # Chart-managed Grafana ingress stays on .uwv-platform.local; public
  # AKS ingress is in infrastructure/azure/public-ingresses.yaml.
