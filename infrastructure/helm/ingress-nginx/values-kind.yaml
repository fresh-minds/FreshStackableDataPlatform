# ingress-nginx — kind-specific overrides.
#
# kind exposes host ports via `extraPortMappings` in the cluster config
# (kind documentation's standard ingress recipe). The controller binds to
# host ports via hostNetwork — identical shape to k3d but worth a separate
# file for clarity.
controller:
  hostNetwork: true
  hostPort:
    enabled: true
  dnsPolicy: ClusterFirstWithHostNet
  kind: DaemonSet
  service:
    type: NodePort
  # The standard kind ingress recipe pins the controller to nodes that have
  # the ingress-ready label so extraPortMappings actually receives traffic.
  nodeSelector:
    ingress-ready: "true"
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Equal
      effect: NoSchedule
    - key: node-role.kubernetes.io/master
      operator: Equal
      effect: NoSchedule
