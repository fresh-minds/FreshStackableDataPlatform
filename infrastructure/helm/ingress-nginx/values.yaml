# ingress-nginx — controller voor *.uwv-platform.local
#
# Ingress voor Helm-deployed services (Keycloak, OpenMetadata, MinIO Console,
# Grafana). Stackable services gebruiken Stackable's listener-operator;
# beide kunnen naast elkaar bestaan.
#
# Chart: ingress-nginx/ingress-nginx

controller:
  replicaCount: 1

  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi
      # 256Mi limit was te krap: OOMKilled tijdens admission-webhook reloads
      # zodra meerdere ingresses werden aangemaakt (keycloak, superset, etc.)

  # k3d's serverlb routeert naar node-IPs op port 80/443. Met servicelb
  # uitgeschakeld (zie infrastructure/k3d/k3d-cluster.yaml) heeft de
  # LoadBalancer-service geen externe IP. Oplossing: hostNetwork zodat de
  # controller direct op de node bind — k3d serverlb route werkt dan.
  hostNetwork: true
  hostPort:
    enabled: true
  dnsPolicy: ClusterFirstWithHostNet
  kind: DaemonSet

  service:
    type: ClusterIP
    # k3d's loadbalancer mapt host:8080 → node:80 en host:8443 → node:443

  # Snippet-annotations enable: nodig voor X-Forwarded-Port=8443 op
  # Superset/Airflow zodat OAuth redirect_uri de :8443 bevat.
  allowSnippetAnnotations: true

  config:
    use-proxy-protocol: "false"
    proxy-buffer-size: "16k"
    # Voor OpenMetadata WebSocket-support
    proxy-read-timeout: "300"
    proxy-send-timeout: "300"
    # Whitelist-snippet directives die we expliciet nodig hebben.
    annotations-risk-level: "Critical"

  metrics:
    enabled: true
    serviceMonitor:
      enabled: false  # aanzetten zodra Prometheus ServiceMonitor CRD beschikbaar is

  admissionWebhooks:
    enabled: true
    patch:
      enabled: true

defaultBackend:
  enabled: false
