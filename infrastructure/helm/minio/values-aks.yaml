# MinIO — AKS-specific overrides.
#
# Replaces the k3d-only `local-path` storage class with AKS's Premium SSD CSI
# class, and bumps capacity to a more realistic cloud size. Merged on top of
# infrastructure/helm/minio/values.yaml via a second --values flag.

persistence:
  storageClass: "managed-csi-premium"
  size: 100Gi

# Ingress hostnames — override the chart's k3d-shaped defaults with the
# public AKS hostnames (port 443, no :8443 suffix because the Azure LB
# terminates TLS on the standard port).
ingress:
  hosts:
    - minio.eu-sovereigndataplatform.com
  tls:
    - hosts: [minio.eu-sovereigndataplatform.com]
      secretName: minio-tls

consoleIngress:
  hosts:
    - minio-console.eu-sovereigndataplatform.com
  tls:
    - hosts: [minio-console.eu-sovereigndataplatform.com]
      secretName: minio-console-tls

# OIDC URLs visible to the browser must match the public hostname.
environment:
  MINIO_IDENTITY_OPENID_CONFIG_URL: "https://keycloak.eu-sovereigndataplatform.com/realms/uwv/.well-known/openid-configuration"
  MINIO_IDENTITY_OPENID_REDIRECT_URI: "https://minio-console.eu-sovereigndataplatform.com/oauth_callback"
