# MinIO — single-node, single-drive (k3d / scaled-down)
#
# In productie: distributed mode (4+ nodes met EC). Voor referentie volstaat
# een enkele Pod. Buckets worden door bootstrap.sh aangemaakt via mc-job.
#
# Chart: minio/minio

mode: standalone

# Storage — storageClass + size set per-mode in values-{k3d,aks}.yaml.
persistence:
  enabled: true
  accessMode: ReadWriteOnce

# Auth (DEV ONLY — vervangen in productie via Secret)
# Voor reproduceerbaarheid in dev hardcoded; bootstrap waarschuwt expliciet.
rootUser: "uwvadmin"
rootPassword: "uwv-dev-only-CHANGE-ME-2026"

# Resources
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 1Gi

# Buckets aanmaken via een post-install Job (werkt op standalone mode)
buckets:
  - name: uwv-raw
    policy: none
    purge: false
  - name: uwv-bronze
    policy: none
    purge: false
  - name: uwv-silver
    policy: none
    purge: false
  - name: uwv-gold
    policy: none
    purge: false
  - name: uwv-sensitive
    policy: none
    purge: false
  - name: uwv-staging
    policy: none
    purge: false
  - name: uwv-checkpoints
    policy: none
    purge: false
  - name: uwv-meta
    policy: none
    purge: false

# Service exposure
service:
  type: ClusterIP
  port: 9000

consoleService:
  type: ClusterIP
  port: 9001

# Ingress voor MinIO API + Console (UI). Chart-managed; stays on .local
# on every mode (used for in-cluster routing). The PUBLIC AKS access lives
# in infrastructure/azure/public-ingresses.yaml (`minio-public`, `minio-api-public`).
# backend-protocol HTTPS + ssl-verify off omdat tls.enabled=true (zie
# onder) — zonder deze annotaties spreekt nginx-ingress HTTP naar de
# TLS-luisterende MinIO pod = timeout.
ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: uwv-platform-issuer
    nginx.ingress.kubernetes.io/backend-protocol: HTTPS
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "off"
  hosts:
    - minio.uwv-platform.local
  tls:
    - hosts: [minio.uwv-platform.local]
      secretName: minio-tls

consoleIngress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: uwv-platform-issuer
    nginx.ingress.kubernetes.io/backend-protocol: HTTPS
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "off"
  hosts:
    - minio-console.uwv-platform.local
  tls:
    - hosts: [minio-console.uwv-platform.local]
      secretName: minio-console-tls

# In-cluster TLS aan: Trino 469+ vereist TLS voor S3 connections.
# Cert komt uit cert-manager Certificate `minio-tls-internal` (zie
# platform/03-storage/minio-cert.yaml). MinIO chart verwacht keys
# 'public.crt' + 'private.key' — die staan in cert-manager-secret als
# tls.crt/tls.key, dus we hebben een aparte mount-fixup nodig of we
# kopieren ze. Voor referentie: simpele copy via init.
tls:
  enabled: true
  certSecret: "minio-tls-internal-fixed"
  publicCrt: public.crt
  privateKey: private.key

# OIDC SSO via Keycloak voor de MinIO Console.
# Browser-flow: console redirect naar https://keycloak.uwv-platform.local:8443
# (via KC_HOSTNAME). Backend MinIO doet OIDC discovery via dezelfde URL —
# vereist dat de pod keycloak.uwv-platform.local in-cluster kan resolveren
# (zie platform/02-authentication/keycloak-external-svc.yaml + CoreDNS).
# Cert-manager CA is nodig voor TLS-verify; mount via extraVolumes.
#
# CORS — de portal-CSV-upload doet vanuit https://platform.uwv-platform.local:8443
# een AssumeRoleWithWebIdentity + PUT naar https://minio.uwv-platform.local:8443.
# Cross-origin browser-PUT vereist dat MinIO de portal-origin in de CORS-header
# whitelist heeft.
environment:
  MINIO_IDENTITY_OPENID_CONFIG_URL: "https://keycloak.uwv-platform.local:8443/realms/uwv/.well-known/openid-configuration"
  MINIO_IDENTITY_OPENID_CLIENT_ID: "minio"
  MINIO_IDENTITY_OPENID_CLIENT_SECRET: "uwv-dev-only-CHANGE-ME-minio-secret"
  MINIO_IDENTITY_OPENID_DISPLAY_NAME: "Keycloak (UWV)"
  MINIO_IDENTITY_OPENID_CLAIM_NAME: "policy"
  MINIO_IDENTITY_OPENID_REDIRECT_URI: "https://minio-console.uwv-platform.local:8443/oauth_callback"
  MINIO_IDENTITY_OPENID_SCOPES: "openid,profile,email,roles"
  MINIO_API_CORS_ALLOW_ORIGIN: "https://platform.uwv-platform.local:8443,https://platform.uwv-platform.local"
  SSL_CERT_FILE: "/etc/uwv-ca/ca.crt"
  CURL_CA_BUNDLE: "/etc/uwv-ca/ca.crt"

# Named policies — chart maakt deze aan via post-install mc-job
# (`mc admin policy create`). De 'csv-uploader' policy wordt door MinIO
# toegekend aan gebruikers met user-attribute policy=csv-uploader in Keycloak
# (zie infrastructure/helm/keycloak/realm-uwv.json) na een
# AssumeRoleWithWebIdentity STS-call vanuit de portal.
policies:
  - name: csv-uploader
    statements:
      - effect: Allow
        resources:
          - "arn:aws:s3:::uwv-staging/incoming/*"
        actions:
          - "s3:PutObject"
          - "s3:AbortMultipartUpload"
          - "s3:ListMultipartUploadParts"
      # GetBucketLocation MAG geen s3:prefix-conditie hebben (MinIO weigert
      # de policy: "unsupported condition keys '[s3:prefix]' used for action
      # 's3:GetBucketLocation'"). Daarom splitsen we: locate zonder
      # conditie, list mét conditie.
      - effect: Allow
        resources:
          - "arn:aws:s3:::uwv-staging"
        actions:
          - "s3:GetBucketLocation"
      - effect: Allow
        resources:
          - "arn:aws:s3:::uwv-staging"
        actions:
          - "s3:ListBucket"
        # NB: het MinIO chart verwacht `conditions` als LIST van single-key
        # maps met een ruwe-JSON-string als waarde — niet een geneste map.
        # Wrong: { StringLike: { "s3:prefix": [...] } }  (faalt in _helper_policy.tpl
        #                                                op `lt $k $condition_len`
        #                                                — $k is dan een string)
        # Right: - StringLike: |
        #           "s3:prefix": [ "incoming/*" ]
        conditions:
          - StringLike: |
              "s3:prefix": [
                "incoming/*"
              ]

extraVolumes:
  - name: uwv-ca
    configMap:
      name: uwv-ca-bundle
extraVolumeMounts:
  - name: uwv-ca
    mountPath: /etc/uwv-ca
    readOnly: true

# Disable Bitnami-style metrics (chart heeft eigen metrics endpoint)
metrics:
  serviceMonitor:
    enabled: false
