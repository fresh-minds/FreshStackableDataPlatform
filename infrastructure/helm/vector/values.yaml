# Vector — log aggregation in scaled-down k3d.
#
# Vector wordt in fase 8 ingezet (volgens master prompt §5). Hier alleen de
# values-template; bootstrap.sh installeert Vector niet in fase 1.
#
# Vector schrijft logs naar de gedeelde OpenSearch (uit fase 8) zodat
# OpenMetadata-search en logs in één cluster zitten.
#
# Chart: timberio/vector (of vector / vector via OCI)

# Agent-mode: één Vector pod per K8s-node verzamelt container-logs.
role: Agent

# Geen Service nodig voor Agent-mode (push-only naar OpenSearch).
# Zonder dit faalde install op `Service "vector" is invalid: spec.ports`.
service:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

customConfig:
  data_dir: /vector-data-dir

  sources:
    k8s_logs:
      type: kubernetes_logs
      extra_label_selector: "app.kubernetes.io/managed-by!=Helm,!stackable.tech/vector-disabled"

  transforms:
    add_uwv_metadata:
      type: remap
      inputs: [k8s_logs]
      source: |
        .uwv_platform = "uwv-data-platform"
        .uwv_zone = "dev-k3d"

    # Improvements #12 — splits OPA decision-logs af voor 7-jaars-retentie
    # en aparte audit-index (R-AVG-15, R-BIO-20).
    route_audit_logs:
      type: route
      inputs: [add_uwv_metadata]
      route:
        # VRL: binary-operator aan eind van regel; `contains` voor strings,
        # `includes` is alleen voor arrays.
        opa_decisions: |
          (.kubernetes.pod_namespace == "uwv-platform" &&
            contains(string!(.kubernetes.container_name), "opa") &&
            contains(to_string!(.message),"decision_id"))
        trino_audit: |
          (.kubernetes.pod_namespace == "uwv-platform" &&
            contains(string!(.kubernetes.container_name), "trino") &&
            contains(to_string!(.message),"queryId"))

  sinks:
    opensearch_app:
      type: elasticsearch
      inputs:
        - "route_audit_logs._unmatched"
      endpoints:
        - "http://opensearch-uwv.uwv-meta.svc.cluster.local:9200"
      bulk:
        index: "uwv-logs-%Y.%m.%d"
      mode: bulk
      api_version: v8
      compression: gzip
      healthcheck:
        enabled: false

    # Aparte audit-index met 7-jaar-retentie (zie OS ILM uwv-audit-logs).
    opensearch_audit:
      type: elasticsearch
      inputs:
        - "route_audit_logs.opa_decisions"
        - "route_audit_logs.trino_audit"
      endpoints:
        - "http://opensearch-uwv.uwv-meta.svc.cluster.local:9200"
      bulk:
        index: "uwv-logs-audit-%Y.%m.%d"
      mode: bulk
      api_version: v8
      compression: gzip
      healthcheck:
        enabled: false
