# uwv-platform CA-based ClusterIssuer.
#
# De CA-cert + privé-sleutel zitten in het Secret `uwv-platform-ca` in de
# `cert-manager` namespace. Het Secret wordt aangemaakt door
# scripts/bootstrap.sh vanuit ~/.config/uwv-platform/ca/ — een persistente
# CA op de host die *niet* opnieuw wordt gegenereerd bij
# `make clean && make cluster && make bootstrap`. Daardoor blijft de in je
# OS-keychain vertrouwde CA geldig over cluster-wipes heen.
#
# Rotate de CA:  rm -rf ~/.config/uwv-platform/ca/ && make bootstrap && make trust-ca
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: uwv-platform-issuer
spec:
  ca:
    secretName: uwv-platform-ca
