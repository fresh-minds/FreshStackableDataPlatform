# UWV Reference Platform — kind cluster config (CI/E2E parity).
#
# Functionally equivalent to k3d-cluster.yaml: 1 control-plane + 2 workers,
# host ports 8080/8443 forwarded to node ports 80/443, kubelet image GC tuned
# for the bootstrap pod pressure.
#
# The `ingress-ready: "true"` label is matched by
# infrastructure/helm/ingress-nginx/values-kind.yaml's nodeSelector — that's
# how ingress-nginx pins to a single node, and how kind's extraPortMappings
# can deterministically forward host:80/443 to that node's hostPort.
#
# Create:
#   kind create cluster --name uwv-platform --config infrastructure/k3d/kind-cluster.yaml
apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: uwv-platform

nodes:
  - role: control-plane
    labels:
      ingress-ready: "true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 8080
        listenAddress: "127.0.0.1"
        protocol: TCP
      - containerPort: 443
        hostPort: 8443
        listenAddress: "127.0.0.1"
        protocol: TCP
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
  - role: worker
  - role: worker

# Match the k3d image pin where possible (kind pins via the
# kindest/node:v<X.Y.Z> tag; the kubernetes version follows).
# kind v0.24 ships v1.31.4 by default — update as the k3d pin moves.
