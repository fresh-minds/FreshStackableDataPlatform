worker_processes  1;
error_log  /dev/stderr  warn;
pid        /tmp/nginx.pid;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  client_body_temp_path /tmp/client_body;
  proxy_temp_path       /tmp/proxy;
  fastcgi_temp_path     /tmp/fastcgi;
  uwsgi_temp_path       /tmp/uwsgi;
  scgi_temp_path        /tmp/scgi;

  log_format combined_uwv '$remote_addr - $remote_user [$time_local] '
                          '"$request" $status $body_bytes_sent '
                          '"$http_referer" "$http_user_agent"';
  access_log /dev/stdout combined_uwv;

  sendfile        on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

  # Docker embedded DNS (compose service-name resolution).
  resolver 127.0.0.11 valid=30s ipv6=off;

  server {
    listen 8080 default_server;
    server_name _;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'" always;

    root /usr/share/nginx/html;
    index index.html;

    location = /api/health {
      access_log off;
      add_header Cache-Control "no-store" always;
      return 200 '{"status":"ok"}';
      default_type application/json;
    }

    # /api/status/up: in compose-modus geen Prometheus — meld direct unavailable.
    location ~ ^/api/status/up$ {
      add_header Content-Type "application/json" always;
      add_header Cache-Control "no-store" always;
      return 200 '{"status":"unavailable"}';
    }

    # MinIO SSO — niet beschikbaar in compose; nette stub.
    location = /api/minio-sso/login {
      add_header Content-Type "application/json" always;
      return 200 '{"loginStrategy":"form","redirectRules":null,"_error":"compose-no-minio"}';
    }

    # Academy backend (FastAPI sidecar) — service-name `academy` in compose.
    location ~ ^/api/learn/ {
      set $academy_backend "academy:8088";
      proxy_pass http://$academy_backend;
      proxy_set_header Host $host;
      # In compose simuleren we een ingelogde dev-user; oauth2-proxy doet dit
      # in productie. Override door een eigen header te sturen vanaf curl.
      proxy_set_header X-Auth-Request-User "dev.user@uwv-platform.local";
      proxy_read_timeout 10s;
      proxy_intercept_errors on;
      error_page 502 503 504 = @academy_unavailable;
      add_header Cache-Control "no-store" always;
    }

    location @academy_unavailable {
      add_header Content-Type "application/json" always;
      add_header Cache-Control "no-store" always;
      return 503 '{"ok":false,"msg":"academy backend niet beschikbaar"}';
    }

    location / {
      try_files $uri $uri/ $uri.html /index.html;
    }
  }
}
