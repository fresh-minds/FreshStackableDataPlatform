worker_processes  1;
error_log  /dev/stderr  warn;
pid        /tmp/nginx.pid;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # nginx writeable paths zonder root-rechten (image draait als non-root).
  client_body_temp_path /tmp/client_body;
  proxy_temp_path       /tmp/proxy;
  fastcgi_temp_path     /tmp/fastcgi;
  uwsgi_temp_path       /tmp/uwsgi;
  scgi_temp_path        /tmp/scgi;

  log_format combined_uwv '$remote_addr - $remote_user [$time_local] '
                          '"$request" $status $body_bytes_sent '
                          '"$http_referer" "$http_user_agent"';
  access_log /dev/stdout combined_uwv;

  sendfile        on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

  # Prometheus upstream — kube-prometheus-stack chart-naam.
  # Resolver toevoegen zodat nginx niet bij start faalt als de service nog
  # niet bestaat (lazy DNS lookup per request).
  resolver kube-dns.kube-system.svc.cluster.local valid=30s;

  server {
    listen 8080 default_server;
    server_name _;

    # Security headers — minimaal, OPA / WAF doen de rest.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'" always;

    root /usr/share/nginx/html;
    index index.html;

    # Health probe voor smoke test + K8s probes — geen auth nodig.
    location = /api/health {
      access_log off;
      add_header Cache-Control "no-store" always;
      return 200 '{"status":"ok"}';
      default_type application/json;
    }

    # Live status endpoint: vraagt up{job=$job} aan Prometheus.
    # We forwarden NIET de hele Prometheus API — alleen de instant query
    # voor `up`. Beperkt blast radius en input-set.
    location ~ ^/api/status/up$ {
      if ($arg_job !~ ^[a-z0-9_-]+$) { return 400; }
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      set $prom_host "prometheus-kube-prometheus-prometheus.uwv-monitoring.svc.cluster.local:9090";
      proxy_pass http://$prom_host/api/v1/query?query=up%7Bjob%3D%22$arg_job%22%7D;
      proxy_read_timeout 5s;
      proxy_intercept_errors on;
      error_page 502 503 504 = @prom_unavailable;

      # Vorm Prometheus-respons om naar simpele {up: 0|1}.
      # Doe dit client-side; nginx stuurt rauwe response.
      add_header Cache-Control "no-store" always;
    }

    location @prom_unavailable {
      add_header Content-Type "application/json" always;
      return 200 '{"status":"unavailable"}';
    }

    # Statische Astro-output. SPA fallback naar index.html voor onbekende paden.
    location / {
      try_files $uri $uri/ $uri.html /index.html;
    }
  }
}
