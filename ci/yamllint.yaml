---
# yamllint config voor het UWV-platform.
# Strengheid: pragmatisch dev-niveau; geen hard-stop op cosmetische zaken.

extends: default

rules:
  line-length:
    max: 200
    level: warning
  comments:
    min-spaces-from-content: 1
  comments-indentation: disable
  document-start: disable
  truthy:
    allowed-values: ["true", "false", "on", "off", "yes", "no"]
  indentation:
    spaces: 2
    indent-sequences: consistent
  braces:
    forbid: false
    min-spaces-inside: 0
    max-spaces-inside: 1
  brackets:
    forbid: false
    min-spaces-inside: 0
    max-spaces-inside: 1
  # Helm-rendered manifests + hand-aligned configs gebruiken vaak
  # extra spaces na `:` of `,` voor visuele uitlijning van values.
  # Niet substantieel — schakel uit zodat lint niet rood loopt op puur
  # cosmetische whitespace.
  colons: disable
  commas: disable

ignore: |
  **/charts/
  **/build/
  **/templates/
  *.tmpl
