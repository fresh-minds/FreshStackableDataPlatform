# CI: full e2e op een ephemeral cluster. Default kiest k3d (devleeg-laptop
# parity). De DEPLOYMENT_MODE input maakt het ook mogelijk om dezelfde
# workflow tegen een kind-cluster te draaien zonder hercoderen.
#
# LET OP — duur en cost-intensief: ~30 min runtime, ~16GB RAM-intensive.
# Alleen via manual dispatch (Actions-tab → "kind-e2e" → Run workflow).
name: kind-e2e

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Deployment mode to test (k3d|kind)'
        required: false
        default: k3d
        type: choice
        options:
          - k3d
          - kind

jobs:
  e2e:
    runs-on: ubuntu-24.04-large  # 8 CPU, 32 GB
    timeout-minutes: 60
    env:
      DEPLOYMENT_MODE: ${{ inputs.mode }}
    steps:
      - uses: actions/checkout@v4

      - name: Install tooling
        run: |
          case "${DEPLOYMENT_MODE}" in
            k3d)
              curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
              ;;
            kind)
              curl -fsSL -o /usr/local/bin/kind \
                "https://kind.sigs.k8s.io/dl/v0.24.0/kind-linux-amd64"
              chmod +x /usr/local/bin/kind
              ;;
          esac

          # kubectl
          curl -fsSL -o /usr/local/bin/kubectl \
            "https://dl.k8s.io/release/v1.31.5/bin/linux/amd64/kubectl"
          chmod +x /usr/local/bin/kubectl

          # helm
          curl -fsSL -o /tmp/helm.tar.gz https://get.helm.sh/helm-v3.16.3-linux-amd64.tar.gz
          tar -xzf /tmp/helm.tar.gz -C /tmp
          install /tmp/linux-amd64/helm /usr/local/bin/

          # stackablectl
          curl -fsSL -o /usr/local/bin/stackablectl \
            "https://github.com/stackabletech/stackable-cockpit/releases/download/stackablectl-25.7.0/stackablectl-x86_64-unknown-linux-gnu"
          chmod +x /usr/local/bin/stackablectl

          # opa
          curl -fsSL -o /usr/local/bin/opa \
            https://openpolicyagent.org/downloads/v0.69.0/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa

      - name: Doctor (mode-aware tooling check)
        run: bash scripts/doctor.sh --mode="${DEPLOYMENT_MODE}" || true

      - name: Add /etc/hosts
        run: |
          for h in trino keycloak superset airflow nifi minio minio-console openmetadata grafana jupyter; do
            echo "127.0.0.1 ${h}.uwv-platform.local" | sudo tee -a /etc/hosts
          done

      - name: Run e2e
        env:
          # Skip parts as needed via env-flags — handig voor sneller debuggen
          SKIP_CLUSTER: "false"
          SKIP_BOOTSTRAP: "false"
          SKIP_DEPLOY: "false"
          SKIP_SEED: "false"
        run: bash tests/e2e/full-flow-uc01.sh

      - name: Cluster diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -A
          kubectl get events -A --sort-by='.lastTimestamp' | tail -50

  # Cheap fast-feedback job: verify every kustomize overlay still builds.
  # Runs on every push, catches yaml/path regressions <2 min.
  overlays-build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install kubectl
        run: |
          curl -fsSL -o /usr/local/bin/kubectl \
            "https://dl.k8s.io/release/v1.31.5/bin/linux/amd64/kubectl"
          chmod +x /usr/local/bin/kubectl
      - name: Build every platform-overlays/<mode>/* with kustomize
        run: |
          fail=0
          for d in platform-overlays/*/*; do
            if ! kubectl kustomize "$d" >/dev/null 2>&1; then
              echo "::error::kustomize build failed: $d"
              kubectl kustomize "$d" 2>&1 | sed 's/^/  /'
              fail=1
            else
              echo "OK $d"
            fi
          done
          exit "$fail"
