# Full end-to-end test tegen het draaiende AKS cluster.
#
# Aanname: cluster bestaat + alle manifests zijn al gedeployed (via
# aks-cd.yml of `make aks-all`). Deze workflow seeden + valideert,
# maar provisioneert geen infrastructuur.
#
# Stappen (afhankelijk van `flow` input):
#   - smoke       — make aks-smoke (12 tests, ~5 min)
#   - uc11        — bash tests/e2e/uc11-flow.sh (UC-11 gold-pad, ~10 min)
#   - both        — smoke + uc11 (default, ~15 min)
#
# Manual-only — geen auto-trigger. Draai via Actions-tab → "aks-e2e".
#
# Vereiste secret: AZURE_CREDENTIALS.
name: aks-e2e

on:
  workflow_dispatch:
    inputs:
      flow:
        description: 'Welke e2e-flow tegen AKS draaien'
        required: false
        default: both
        type: choice
        options:
          - smoke
          - uc11
          - both

# Eén AKS-e2e tegelijk — uc11 muteert dbt-state en zou interfereren met
# parallelle runs. Niet cancellen, queue liever.
concurrency:
  group: aks-e2e
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

env:
  AKS_RESOURCE_GROUP: dev-stackable-rg
  AKS_CLUSTER_NAME:   uwv-platform-aks

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dbt-trino (voor smoke 04 + uc11 dbt-parse)
        run: pip install --quiet 'dbt-core>=1.10' 'dbt-trino>=1.9' pyyaml

      - name: Install OPA CLI
        run: |
          sudo curl -fsSL -o /usr/local/bin/opa \
            https://github.com/open-policy-agent/opa/releases/latest/download/opa_linux_amd64_static
          sudo chmod +x /usr/local/bin/opa
          opa version

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure login (service principal)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS kubeconfig
        run: |
          az aks get-credentials \
            --resource-group "$AKS_RESOURCE_GROUP" \
            --name "$AKS_CLUSTER_NAME" \
            --overwrite-existing
          kubectl config current-context
          kubectl get nodes -o wide

      - name: Smoke tests (make aks-smoke)
        if: ${{ inputs.flow == 'smoke' || inputs.flow == 'both' }}
        run: make aks-smoke

      - name: UC-11 e2e (tests/e2e/uc11-flow.sh)
        if: ${{ inputs.flow == 'uc11' || inputs.flow == 'both' }}
        env:
          DEPLOYMENT_MODE: aks
          PLATFORM_DOMAIN: eu-sovereigndataplatform.com
        run: bash tests/e2e/uc11-flow.sh

      - name: Dump pod-status bij failure
        if: failure()
        run: |
          echo "::group::Pods across UWV namespaces"
          for ns in uwv-platform uwv-auth uwv-data uwv-meta ingress-nginx; do
            echo "--- $ns ---"
            kubectl -n "$ns" get pods -o wide 2>/dev/null || true
          done
          echo "::endgroup::"
          echo "::group::Recent events (laatste 50)"
          kubectl get events --all-namespaces \
            --sort-by=.lastTimestamp 2>/dev/null \
            | tail -n 50 || true
          echo "::endgroup::"
