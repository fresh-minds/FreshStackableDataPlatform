# AirflowCluster — orchestratie voor dbt-runs, lakehouse-maintenance, seed,
# en OpenMetadata-ingestie.
#
# Architectuur: docs/adr/0007-airflow-pipeline-architecture.md
#
# DB: gedeelde Postgres `uwv-data/postgres-postgresql.uwv-data.svc.cluster.local`
#     database `airflow` (init-script in fase 1 maakt deze aan).
# Auth: OIDC via keycloak-uwv (productie). Voor dev is admin-flow ook open.
#
# Mounts (zie kustomization.yaml configMapGenerator):
#   - /stackable/airflow/dags/  ← airflow-dags     (DAG-aanroepers)
#   - /opt/uwv/airflow/include/ ← airflow-include  (factories + helpers, op PYTHONPATH)
#   - /opt/uwv/airflow/sources/ ← airflow-sources  (YAML source-registry)
#   - /opt/uwv/dbt/             ← dbt-manifest     (manifest.json voor Cosmos)
#
# Cosmos (astronomer-cosmos) wordt door een initContainer pip-geïnstalleerd
# in een emptyDir-volume `/cosmos-pkgs`, dat ook op PYTHONPATH komt.
# Productie: bouw een custom image (infrastructure/airflow/Dockerfile, TODO).
---
apiVersion: airflow.stackable.tech/v1alpha1
kind: AirflowCluster
metadata:
  name: uwv-airflow
  namespace: uwv-platform
spec:
  image:
    productVersion: "2.9.3"
  clusterConfig:
    # 26.3: database/executor/listenerClass uit clusterConfig.
    # Database-config zit in credentialsSecret (zie secret).
    # Executor is nu top-level kubernetesExecutors block.
    loadExamples: false
    exposeConfig: false
    credentialsSecret: airflow-postgres-credentials
    authentication:
      - authenticationClass: keycloak-uwv
        oidc:
          clientCredentialsSecret: airflow-oidc-client

  webservers:
    roleConfig:
      listenerClass: cluster-internal
    # Airflow draait achter TLS-terminating ingress-nginx. De webserver
    # bouwt de OAuth redirect_uri — zonder BASE_URL + proxy-fix wordt
    # dat http://...:8443 → nginx 400 "plain HTTP request was sent to
    # HTTPS port". REQUESTS_CA_BUNDLE/SSL_CERT_FILE zijn voor de OAuth
    # token-exchange naar https://keycloak.uwv-platform.local:8443
    # (cert-manager self-signed CA).
    # NB: airflow.cfg dump op disk toont nog defaults
    # (base_url=http://localhost:8080, enable_proxy_fix=False).
    # `airflow config get-value webserver base_url` geeft echter de
    # ECHTE waarde uit env-vars terug — die overschrijven cfg op runtime.
    envOverrides:
      REQUESTS_CA_BUNDLE: "/etc/uwv-ca/ca.crt"
      SSL_CERT_FILE: "/etc/uwv-ca/ca.crt"
      AIRFLOW__WEBSERVER__BASE_URL: "https://airflow.uwv-platform.local:8443"
      AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX: "True"
      AIRFLOW__WEBSERVER__PROXY_FIX_X_PROTO: "1"
      AIRFLOW__WEBSERVER__PROXY_FIX_X_HOST: "1"
      AIRFLOW__WEBSERVER__PROXY_FIX_X_PORT: "1"
      AIRFLOW__WEBSERVER__PROXY_FIX_X_PREFIX: "1"
      # ADR-0007: include/ + cosmos op PYTHONPATH zodat factory-imports werken.
      # Include zelf + cosmos VOOR system-paths zodat factory-imports voorrang hebben.
      # Stackable's eigen log_config + dags-folder achteraan om defaults te behouden.
      PYTHONPATH: "/opt/uwv/airflow/include:/cosmos-pkgs:/stackable/app/log_config:/stackable/airflow/dags"
      # Stackable 26.3 detecteert executor uit *Executors-block, maar voor onze
      # setup expliciet zetten zodat tasks via KubernetesExecutor een eigen pod krijgen.
      AIRFLOW__CORE__EXECUTOR: "KubernetesExecutor"
      AIRFLOW__KUBERNETES_EXECUTOR__NAMESPACE: "uwv-platform"
      # Geen pod_template_file — laat Airflow de defaults gebruiken; podOverrides
      # in kubernetesExecutors-blok hierboven definiëren de mounts + initContainers.
      UWV_SOURCES_DIR: "/opt/uwv/airflow/sources"
      UWV_DBT_MANIFEST_PATH: "/opt/uwv/dbt/manifest.json"
    # NB: configOverrides voor `webserver_config.py` werkt NIET in
    # Stackable Airflow 26.3 — de operator accepteert de keys in de CRD
    # maar rendert ze niet in de gegenereerde file. Daarom doen we de
    # role-mapping via een subPath-mount bovenop de gegenereerde file
    # (zie webserver-config.yaml ConfigMap + volume mount onderaan
    # roleGroups.default.podOverrides). Dat geeft ons ook ruimte om
    # een custom SECURITY_MANAGER_CLASS te zetten — nodig omdat FAB's
    # default get_oauth_user_info het Keycloak `roles` claim niet leest.
    config:
      logging:
        enableVectorAgent: false
      resources:
        cpu:
          min: "100m"
          max: "500m"
        memory:
          limit: "1Gi"
    roleGroups:
      default:
        replicas: 1
        podOverrides:
          spec:
            # ADR-0007: pip-installeer cosmos in emptyDir die ook door
            # de airflow-container wordt gemount op PYTHONPATH.
            initContainers:
              - name: cosmos-init
                # Match Python-versie van Stackable airflow image (3.9)
                # zodat cp-wheels met C-extensies (msgpack, pyyaml) laden.
                image: python:3.9-slim
                command:
                  - bash
                  - -euo
                  - pipefail
                  - -c
                  - |
                    # Stackable Airflow 2.9.3 image draait op Python 3.9.
                    # Cosmos 1.7+ vereist Python 3.10+, dus pin op 1.6.0.
                    # --no-deps voorkomt dat pip airflow 3.x meeneemt
                    # (wat Python 3.10+ vereist en de system-airflow shadowt).
                    # Stackable Airflow 2.9.3 = Python 3.9 + SQLAlchemy 1.4 +
                    # apache-airflow 2.9.3 (system). Wij installeren cosmos
                    # MET --no-deps zodat we GEEN sqlalchemy/airflow shadow
                    # introduceren die het system kapot maakt.
                    # Trino-driver hoeft hier ook niet — Cosmos LoadMode.DBT_MANIFEST
                    # vereist geen DB-connectie bij parse; trino runs gebeuren in
                    # dbt-trino pods die hun eigen image hebben.
                    pip install --disable-pip-version-check \
                      --target=/cosmos-pkgs --no-deps \
                      "astronomer-cosmos==1.6.0"
                    pip install --disable-pip-version-check \
                      --target=/cosmos-pkgs \
                      "PyYAML==6.0.2" \
                      "msgpack==1.0.8" \
                      "aenum>=3.1"
                    # Defensieve cleanup: nooit airflow/sqlalchemy/jinja/attrs
                    # shadowen — die zitten in system airflow met de juiste versie.
                    cd /cosmos-pkgs
                    for pkg in airflow apache_airflow* airflow_providers_* \
                               sqlalchemy SQLAlchemy* alembic flask werkzeug \
                               jinja2 markupsafe attrs attr deprecated requests \
                               urllib3 certifi charset_normalizer idna; do
                      rm -rf "$pkg" "${pkg}-"*.dist-info "${pkg}.py" 2>/dev/null || true
                    done
                    touch /cosmos-pkgs/.ready
                    echo "cosmos-init done. /cosmos-pkgs contents:"
                    ls /cosmos-pkgs
                volumeMounts:
                  - name: cosmos-pkgs
                    mountPath: /cosmos-pkgs
              # Manifest is gzipped in de ConfigMap (raw is 1.2MB > CM-limiet).
              # Decompress hier zodat de scheduler een klare manifest.json vindt.
              - name: manifest-decompress
                image: busybox:1.36
                command:
                  - sh
                  - -c
                  - |
                    # Cosmos vereist een complete dbt-project layout (dbt_project.yml +
                    # models/ + seeds/ etc) ook bij LoadMode.DBT_MANIFEST. Tarball
                    # van het hele dbt-project zit in dezelfde ConfigMap.
                    if [ -f /dbt-manifest-gz/dbt-project.tar.gz ]; then
                      tar xzf /dbt-manifest-gz/dbt-project.tar.gz -C /dbt-manifest/
                      echo "dbt-project uitgepakt:"
                      ls /dbt-manifest/
                    fi
                    if [ -f /dbt-manifest-gz/manifest.json.gz ]; then
                      gunzip -c /dbt-manifest-gz/manifest.json.gz > /dbt-manifest/manifest.json
                      ls -lh /dbt-manifest/manifest.json
                    else
                      echo "manifest.json.gz nog niet aanwezig — Cosmos draait in fallback-modus"
                      echo '{"nodes":{},"sources":{}}' > /dbt-manifest/manifest.json
                    fi
                volumeMounts:
                  - name: dbt-manifest-gz
                    mountPath: /dbt-manifest-gz
                  - name: dbt-manifest-decompressed
                    mountPath: /dbt-manifest
            containers:
              - name: airflow
                volumeMounts:
                  - name: uwv-ca
                    mountPath: /etc/uwv-ca
                    readOnly: true
                  - name: cosmos-pkgs
                    mountPath: /cosmos-pkgs
                    readOnly: true
                  - name: airflow-include
                    mountPath: /opt/uwv/airflow/include
                    readOnly: true
                  - name: airflow-sources
                    mountPath: /opt/uwv/airflow/sources
                    readOnly: true
                  - name: dbt-manifest-decompressed
                    mountPath: /opt/uwv/dbt
                    readOnly: true
                  - name: airflow-dags
                    mountPath: /stackable/airflow/dags
                    readOnly: true
                  # Vervangt Stackable's gegenereerde webserver_config.py
                  # met onze versie (role-mapping + custom security mgr).
                  # subPath laat /stackable/app/config/log_config.py
                  # intact — alleen deze ene file wordt overlay-gemount.
                  - name: webserver-config
                    mountPath: /stackable/app/config/webserver_config.py
                    subPath: webserver_config.py
                    readOnly: true
            volumes:
              - name: uwv-ca
                configMap:
                  name: uwv-ca-bundle
              - name: cosmos-pkgs
                emptyDir: {}
              - name: airflow-dags
                configMap:
                  name: airflow-dags
              - name: airflow-include
                configMap:
                  name: airflow-include
              - name: airflow-sources
                configMap:
                  name: airflow-sources
              - name: dbt-manifest-gz
                configMap:
                  name: dbt-manifest
                  optional: true
              - name: dbt-manifest-decompressed
                emptyDir: {}     # ontbreekt vóór dbt-manifest-Job; OK
              - name: webserver-config
                configMap:
                  name: airflow-webserver-config

  schedulers:
    envOverrides:
      REQUESTS_CA_BUNDLE: "/etc/uwv-ca/ca.crt"
      SSL_CERT_FILE: "/etc/uwv-ca/ca.crt"
      # Airflow draait achter TLS-terminating ingress-nginx. Zonder deze
      # twee bouwt Flask de OAuth redirect_uri als http://...:8443 →
      # nginx 400 "plain HTTP request was sent to HTTPS port".
      AIRFLOW__WEBSERVER__BASE_URL: "https://airflow.uwv-platform.local:8443"
      AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX: "True"
      AIRFLOW__WEBSERVER__PROXY_FIX_X_PROTO: "1"
      AIRFLOW__WEBSERVER__PROXY_FIX_X_HOST: "1"
      AIRFLOW__WEBSERVER__PROXY_FIX_X_PORT: "1"
      AIRFLOW__WEBSERVER__PROXY_FIX_X_PREFIX: "1"
      # ADR-0007 — zelfde set als webservers; scheduler parseert DAGs en
      # heeft cosmos + sources_loader nodig.
      # Include zelf + cosmos VOOR system-paths zodat factory-imports voorrang hebben.
      # Stackable's eigen log_config + dags-folder achteraan om defaults te behouden.
      PYTHONPATH: "/opt/uwv/airflow/include:/cosmos-pkgs:/stackable/app/log_config:/stackable/airflow/dags"
      # Stackable 26.3 detecteert executor uit *Executors-block, maar voor onze
      # setup expliciet zetten zodat tasks via KubernetesExecutor een eigen pod krijgen.
      AIRFLOW__CORE__EXECUTOR: "KubernetesExecutor"
      AIRFLOW__KUBERNETES_EXECUTOR__NAMESPACE: "uwv-platform"
      # Geen pod_template_file — laat Airflow de defaults gebruiken; podOverrides
      # in kubernetesExecutors-blok hierboven definiëren de mounts + initContainers.
      UWV_SOURCES_DIR: "/opt/uwv/airflow/sources"
      UWV_DBT_MANIFEST_PATH: "/opt/uwv/dbt/manifest.json"
    config:
      logging:
        enableVectorAgent: false
      resources:
        cpu:
          min: "100m"
          max: "1000m"
        memory:
          limit: "1Gi"
    roleGroups:
      default:
        replicas: 1
        podOverrides:
          spec:
            initContainers:
              - name: cosmos-init
                # Match Python-versie van Stackable airflow image (3.9)
                # zodat cp-wheels met C-extensies (msgpack, pyyaml) laden.
                image: python:3.9-slim
                command:
                  - bash
                  - -euo
                  - pipefail
                  - -c
                  - |
                    # Zie webservers-blok hierboven — zelfde Python 3.9 caveat.
                    # Stackable Airflow 2.9.3 = Python 3.9 + SQLAlchemy 1.4 +
                    # apache-airflow 2.9.3 (system). Wij installeren cosmos
                    # MET --no-deps zodat we GEEN sqlalchemy/airflow shadow
                    # introduceren die het system kapot maakt.
                    # Trino-driver hoeft hier ook niet — Cosmos LoadMode.DBT_MANIFEST
                    # vereist geen DB-connectie bij parse; trino runs gebeuren in
                    # dbt-trino pods die hun eigen image hebben.
                    pip install --disable-pip-version-check \
                      --target=/cosmos-pkgs --no-deps \
                      "astronomer-cosmos==1.6.0"
                    pip install --disable-pip-version-check \
                      --target=/cosmos-pkgs \
                      "PyYAML==6.0.2" \
                      "msgpack==1.0.8" \
                      "aenum>=3.1"
                    cd /cosmos-pkgs
                    for pkg in airflow apache_airflow* airflow_providers_* \
                               sqlalchemy SQLAlchemy* alembic flask werkzeug \
                               jinja2 markupsafe attrs attr deprecated requests \
                               urllib3 certifi charset_normalizer idna; do
                      rm -rf "$pkg" "${pkg}-"*.dist-info "${pkg}.py" 2>/dev/null || true
                    done
                    touch /cosmos-pkgs/.ready
                    echo "cosmos-init done. /cosmos-pkgs contents:"
                    ls /cosmos-pkgs
                volumeMounts:
                  - name: cosmos-pkgs
                    mountPath: /cosmos-pkgs
              - name: manifest-decompress
                image: busybox:1.36
                command:
                  - sh
                  - -c
                  - |
                    # Cosmos vereist een complete dbt-project layout (dbt_project.yml +
                    # models/ + seeds/ etc) ook bij LoadMode.DBT_MANIFEST. Tarball
                    # van het hele dbt-project zit in dezelfde ConfigMap.
                    if [ -f /dbt-manifest-gz/dbt-project.tar.gz ]; then
                      tar xzf /dbt-manifest-gz/dbt-project.tar.gz -C /dbt-manifest/
                      echo "dbt-project uitgepakt:"
                      ls /dbt-manifest/
                    fi
                    if [ -f /dbt-manifest-gz/manifest.json.gz ]; then
                      gunzip -c /dbt-manifest-gz/manifest.json.gz > /dbt-manifest/manifest.json
                      ls -lh /dbt-manifest/manifest.json
                    else
                      echo "manifest.json.gz nog niet aanwezig — Cosmos draait in fallback-modus"
                      echo '{"nodes":{},"sources":{}}' > /dbt-manifest/manifest.json
                    fi
                volumeMounts:
                  - name: dbt-manifest-gz
                    mountPath: /dbt-manifest-gz
                  - name: dbt-manifest-decompressed
                    mountPath: /dbt-manifest
            containers:
              - name: airflow
                volumeMounts:
                  - name: uwv-ca
                    mountPath: /etc/uwv-ca
                    readOnly: true
                  - name: cosmos-pkgs
                    mountPath: /cosmos-pkgs
                    readOnly: true
                  - name: airflow-include
                    mountPath: /opt/uwv/airflow/include
                    readOnly: true
                  - name: airflow-sources
                    mountPath: /opt/uwv/airflow/sources
                    readOnly: true
                  - name: dbt-manifest-decompressed
                    mountPath: /opt/uwv/dbt
                    readOnly: true
                  - name: airflow-dags
                    mountPath: /stackable/airflow/dags
                    readOnly: true
            volumes:
              - name: uwv-ca
                configMap:
                  name: uwv-ca-bundle
              - name: cosmos-pkgs
                emptyDir: {}
              - name: airflow-dags
                configMap:
                  name: airflow-dags
              - name: airflow-include
                configMap:
                  name: airflow-include
              - name: airflow-sources
                configMap:
                  name: airflow-sources
              - name: dbt-manifest-gz
                configMap:
                  name: dbt-manifest
                  optional: true
              - name: dbt-manifest-decompressed
                emptyDir: {}

  # Stackable Airflow 26.3: gebruik kubernetesExecutors-blok voor K8s-executor.
  # Tasks krijgen dan elk een eigen Pod (geen Celery workers nodig).
  # We mounten dezelfde cosmos-init + dbt-manifest + sources/include op het
  # task-pod-template zodat Cosmos's per-model tasks correct worden gedeserialiseerd.
  kubernetesExecutors:
    config:
      logging:
        enableVectorAgent: false
      resources:
        cpu:
          min: "100m"
          max: "1000m"
        memory:
          limit: "1Gi"
    envOverrides:
      REQUESTS_CA_BUNDLE: "/etc/uwv-ca/ca.crt"
      SSL_CERT_FILE: "/etc/uwv-ca/ca.crt"
      PYTHONPATH: "/opt/uwv/airflow/include:/cosmos-pkgs:/stackable/app/log_config:/stackable/airflow/dags"
      UWV_SOURCES_DIR: "/opt/uwv/airflow/sources"
      UWV_DBT_MANIFEST_PATH: "/opt/uwv/dbt/manifest.json"
    podOverrides:
      spec:
        initContainers:
          - name: cosmos-init
            image: python:3.9-slim
            command:
              - bash
              - -euo
              - pipefail
              - -c
              - |
                pip install --disable-pip-version-check \
                  --target=/cosmos-pkgs --no-deps \
                  "astronomer-cosmos==1.6.0"
                pip install --disable-pip-version-check \
                  --target=/cosmos-pkgs \
                  "PyYAML==6.0.2" \
                  "msgpack==1.0.8" \
                  "aenum>=3.1"
                cd /cosmos-pkgs
                for pkg in airflow apache_airflow* airflow_providers_* \
                           sqlalchemy SQLAlchemy* alembic flask werkzeug \
                           jinja2 markupsafe attrs attr deprecated requests \
                           urllib3 certifi charset_normalizer idna; do
                  rm -rf "$pkg" "${pkg}-"*.dist-info "${pkg}.py" 2>/dev/null || true
                done
                touch /cosmos-pkgs/.ready
            volumeMounts:
              - name: cosmos-pkgs
                mountPath: /cosmos-pkgs
          - name: manifest-decompress
            image: busybox:1.36
            command:
              - sh
              - -c
              - |
                if [ -f /dbt-manifest-gz/dbt-project.tar.gz ]; then
                  tar xzf /dbt-manifest-gz/dbt-project.tar.gz -C /dbt-manifest/
                fi
                if [ -f /dbt-manifest-gz/manifest.json.gz ]; then
                  gunzip -c /dbt-manifest-gz/manifest.json.gz > /dbt-manifest/manifest.json
                else
                  echo '{"nodes":{},"sources":{}}' > /dbt-manifest/manifest.json
                fi
            volumeMounts:
              - name: dbt-manifest-gz
                mountPath: /dbt-manifest-gz
              - name: dbt-manifest-decompressed
                mountPath: /dbt-manifest
        containers:
          - name: base
            volumeMounts:
              - name: uwv-ca
                mountPath: /etc/uwv-ca
                readOnly: true
              - name: cosmos-pkgs
                mountPath: /cosmos-pkgs
                readOnly: true
              - name: airflow-dags
                mountPath: /stackable/airflow/dags
                readOnly: true
              - name: airflow-include
                mountPath: /opt/uwv/airflow/include
                readOnly: true
              - name: airflow-sources
                mountPath: /opt/uwv/airflow/sources
                readOnly: true
              - name: dbt-manifest-decompressed
                mountPath: /opt/uwv/dbt
                readOnly: true
        volumes:
          - name: uwv-ca
            configMap:
              name: uwv-ca-bundle
          - name: cosmos-pkgs
            emptyDir: {}
          - name: airflow-dags
            configMap:
              name: airflow-dags
          - name: airflow-include
            configMap:
              name: airflow-include
          - name: airflow-sources
            configMap:
              name: airflow-sources
          - name: dbt-manifest-gz
            configMap:
              name: dbt-manifest
              optional: true
          - name: dbt-manifest-decompressed
            emptyDir: {}
