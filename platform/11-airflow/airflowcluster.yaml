# AirflowCluster — orchestratie voor dbt-runs, lakehouse-maintenance, seed,
# en (fase 8) OpenMetadata-ingestie.
#
# DB: gedeelde Postgres `uwv-data/postgres-postgresql.uwv-data.svc.cluster.local`
#     database `airflow` (init-script in fase 1 maakt deze aan).
# Auth: OIDC via keycloak-uwv (productie). Voor dev is admin-flow ook open.
# DAGs: ConfigMap `airflow-dags` (zie kustomization configMapGenerator) gemount
#       via podOverrides op /stackable/airflow/dags. Productie zou dagsGitSync
#       gebruiken — zie README.
---
apiVersion: airflow.stackable.tech/v1alpha1
kind: AirflowCluster
metadata:
  name: uwv-airflow
  namespace: uwv-platform
spec:
  image:
    productVersion: "2.9.3"
  clusterConfig:
    # 26.3: database/executor/listenerClass uit clusterConfig.
    # Database-config zit in credentialsSecret (zie secret).
    # Executor is nu top-level kubernetesExecutors block.
    loadExamples: false
    exposeConfig: false
    credentialsSecret: airflow-postgres-credentials
    authentication:
      - authenticationClass: keycloak-uwv
        oidc:
          clientCredentialsSecret: airflow-oidc-client

  webservers:
    roleConfig:
      listenerClass: cluster-internal
    # Cert-manager CA mount voor OAuth token-exchange via
    # https://keycloak.uwv-platform.local:8443. Zie supersetcluster.yaml.
    # In Airflow CRD zit envOverrides onder de role, niet top-level.
    envOverrides:
      REQUESTS_CA_BUNDLE: "/etc/uwv-ca/ca.crt"
      SSL_CERT_FILE: "/etc/uwv-ca/ca.crt"
      # Airflow draait achter TLS-terminating ingress-nginx. Zonder deze
      # twee bouwt Flask de OAuth redirect_uri als http://...:8443 →
      # nginx 400 "plain HTTP request was sent to HTTPS port".
      AIRFLOW__WEBSERVER__BASE_URL: "https://airflow.uwv-platform.local:8443"
      AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX: "True"
      AIRFLOW__WEBSERVER__PROXY_FIX_X_PROTO: "1"
      AIRFLOW__WEBSERVER__PROXY_FIX_X_HOST: "1"
      AIRFLOW__WEBSERVER__PROXY_FIX_X_PORT: "1"
      AIRFLOW__WEBSERVER__PROXY_FIX_X_PREFIX: "1"
    config:
      logging:
        enableVectorAgent: false
      resources:
        cpu:
          min: "100m"
          max: "500m"
        memory:
          limit: "1Gi"
    roleGroups:
      default:
        replicas: 1
        podOverrides:
          spec:
            containers:
              - name: airflow
                volumeMounts:
                  - name: uwv-ca
                    mountPath: /etc/uwv-ca
                    readOnly: true
            volumes:
              - name: uwv-ca
                configMap:
                  name: uwv-ca-bundle

  schedulers:
    envOverrides:
      REQUESTS_CA_BUNDLE: "/etc/uwv-ca/ca.crt"
      SSL_CERT_FILE: "/etc/uwv-ca/ca.crt"
      # Airflow draait achter TLS-terminating ingress-nginx. Zonder deze
      # twee bouwt Flask de OAuth redirect_uri als http://...:8443 →
      # nginx 400 "plain HTTP request was sent to HTTPS port".
      AIRFLOW__WEBSERVER__BASE_URL: "https://airflow.uwv-platform.local:8443"
      AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX: "True"
      AIRFLOW__WEBSERVER__PROXY_FIX_X_PROTO: "1"
      AIRFLOW__WEBSERVER__PROXY_FIX_X_HOST: "1"
      AIRFLOW__WEBSERVER__PROXY_FIX_X_PORT: "1"
      AIRFLOW__WEBSERVER__PROXY_FIX_X_PREFIX: "1"
    config:
      logging:
        enableVectorAgent: false
      resources:
        cpu:
          min: "100m"
          max: "1000m"
        memory:
          limit: "1Gi"
    roleGroups:
      default:
        replicas: 1
        podOverrides:
          spec:
            containers:
              - name: airflow
                volumeMounts:
                  - name: uwv-ca
                    mountPath: /etc/uwv-ca
                    readOnly: true
            volumes:
              - name: uwv-ca
                configMap:
                  name: uwv-ca-bundle

  celeryExecutors:
    # Niet gebruikt — we draaien KubernetesExecutor (zie executor.kubernetes)
    config: {}
    roleGroups:
      default:
        replicas: 0
