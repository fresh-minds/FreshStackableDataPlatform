# dbt-manifest pre-render Job
#
# Cosmos `LoadMode.DBT_MANIFEST` heeft een vóór-gerenderd `manifest.json`
# nodig om DAGs te parsen zonder Trino-connectie. Deze Job runt `dbt parse`
# en zet de output in ConfigMap `dbt-manifest`. De Airflow scheduler mount
# die ConfigMap onder /opt/uwv/dbt/manifest.json.
#
# Trigger:
#   - Eenmalig na bootstrap (handmatig: `kubectl apply -f`)
#   - Bij elke dbt-model-wijziging:
#       make airflow-manifest    (target voegen we nog toe)
#
# Productie: in CI als post-merge-hook op main.
#
# SYNTHETIC DATA — UWV REFERENCE PLATFORM — NOT FOR REAL USE.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dbt-manifest-renderer
  namespace: uwv-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dbt-manifest-cm-writer
  namespace: uwv-platform
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dbt-manifest-cm-writer
  namespace: uwv-platform
subjects:
  - kind: ServiceAccount
    name: dbt-manifest-renderer
    namespace: uwv-platform
roleRef:
  kind: Role
  name: dbt-manifest-cm-writer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: dbt-manifest-render
  namespace: uwv-platform
  labels:
    uwv.nl/component: airflow-cosmos
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 1
  template:
    metadata:
      labels:
        uwv.nl/component: airflow-cosmos
    spec:
      restartPolicy: Never
      serviceAccountName: dbt-manifest-renderer
      initContainers:
        - name: git-sync
          image: registry.k8s.io/git-sync/git-sync:v4.2.4
          env:
            - name: GITSYNC_REPO
              valueFrom:
                configMapKeyRef:
                  name: uwv-repo-url
                  key: url
                  optional: true
            - name: GITSYNC_REF
              value: main
            - name: GITSYNC_ROOT
              value: /workspace
            - name: GITSYNC_DEPTH
              value: "1"
            - name: GITSYNC_ONE_TIME
              value: "true"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
        - name: dbt-parse
          # GHCR (ghcr.io/dbt-labs/dbt-trino) blokt anonymous pulls met 403
          # voor dit project. We pip-installeren dbt-trino vanuit PyPI op
          # een neutrale python:3.11-slim base — zelfde resultaat, geen
          # GHCR-afhankelijkheid.
          image: python:3.11-slim
          command:
            - bash
            - -euo
            - pipefail
            - -c
            - |
              # git-sync v4 plaatst de checkout op /workspace/<commit-sha>
              # met een symlink /workspace/<branch> (hier: main). Vind de
              # actieve dbt-dir robuust ipv hardcoded pad.
              DBT_DIR=$(find /workspace -maxdepth 3 -type d -name dbt -path '*/repo/dbt' -o -maxdepth 3 -type d -name dbt -path '*/main/dbt' 2>/dev/null | head -1)
              if [ -z "$DBT_DIR" ]; then
                DBT_DIR=$(find /workspace -maxdepth 4 -type f -name dbt_project.yml | head -1 | xargs -r dirname)
              fi
              echo "DBT_DIR=$DBT_DIR"
              cd "$DBT_DIR"
              # Override env-DBT_PROFILES_DIR (Job-level) met de echte path
              # waar git-sync de repo neerzet.
              export DBT_PROFILES_DIR="$DBT_DIR"
              ls -la
              pip install --quiet --disable-pip-version-check 'dbt-core==1.9.*' 'dbt-trino==1.9.*' 2>&1 | tail -3
              cp profiles.yml.template profiles.yml
              dbt deps
              # Parse-only: rendert manifest.json zonder DB-toegang.
              dbt parse --target dev || true
              cp target/manifest.json /artifacts/manifest.json
              # Tar alleen de project-bron (dbt_project.yml + models/seeds/
              # macros/tests). dbt_packages/ wordt EXCLUDED — Cosmos LoadMode
              # DBT_MANIFEST gebruikt het pre-rendered manifest dat referenties
              # al heeft uitgeresolveerd; het pakket-bron is niet nodig voor
              # DAG-parsing. Houdt tarball onder de 1MB ConfigMap-limiet.
              tar -czf /artifacts/dbt-project.tar.gz \
                --exclude=target --exclude=logs --exclude=.venv \
                --exclude=dbt_packages \
                .
              ls -lh /artifacts/manifest.json /artifacts/dbt-project.tar.gz
          env:
            - name: TABLE_FORMAT
              value: delta
            - name: DBT_PROFILES_DIR
              value: /workspace/repo/dbt
            # Trino-conn-vars zijn nodig voor profile-render maar niet voor parse.
            # Geef placeholders zodat dbt parse niet faalt op missing var.
            - name: TRINO_HOST
              value: uwv-trino-coordinator.uwv-platform.svc.cluster.local
            - name: TRINO_PORT
              value: "8443"
            - name: TRINO_USER
              value: smoketest
            - name: TRINO_PASSWORD
              value: placeholder-not-used-in-parse
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: artifacts
              mountPath: /artifacts
      containers:
        - name: cm-writer
          # bitnami/kubectl:1.29.6 is van Docker Hub verwijderd (Bitnami
          # stopt met EOL-tags). alpine/k8s bundle is een drop-in vervanger
          # met kubectl + cli-tools.
          image: alpine/k8s:1.30.0
          command:
            - bash
            - -euo
            - pipefail
            - -c
            - |
              if [[ ! -s /artifacts/manifest.json ]]; then
                echo "manifest.json niet aangemaakt — dbt parse faalde?"
                exit 1
              fi
              # ConfigMaps hebben een 1 MiB limit. Cosmos verwacht het hele
              # dbt-project; raw manifest is ~1.4 MB. Daarom: gzip + tarball
              # in `dbt-manifest` ConfigMap, en de airflow-scheduler init
              # container `manifest-decompress` packt het ter plekke uit.
              gzip -c /artifacts/manifest.json > /tmp/manifest.json.gz
              ls -lh /tmp/manifest.json.gz /artifacts/dbt-project.tar.gz
              kubectl -n uwv-platform create configmap dbt-manifest \
                --from-file=dbt-project.tar.gz=/artifacts/dbt-project.tar.gz \
                --from-file=manifest.json.gz=/tmp/manifest.json.gz \
                --dry-run=client -o yaml | kubectl apply -f -
              echo "ConfigMap dbt-manifest geüpdatet (gzipped manifest + project-tarball)."
          volumeMounts:
            - name: artifacts
              mountPath: /artifacts
              readOnly: true
        - name: minio-uploader
          # Pusht manifest.json + (optioneel) catalog.json/run_results.json
          # naar s3://uwv-meta/dbt/latest/. OpenMetadata's dbt-workflow
          # (zie platform/13-openmetadata-config/services/dbt-workflow.yaml)
          # leest deze bestanden en bouwt model→table lineage.
          image: python:3.11-slim
          command:
            - bash
            - -euo
            - pipefail
            - -c
            - |
              # Wacht tot artifacts/manifest.json bestaat (cm-writer schrijft
              # niet, maar de dbt-parse initContainer wel). Beide containers
              # in deze pod zien hetzelfde emptyDir 'artifacts'.
              for i in {1..30}; do
                [[ -s /artifacts/manifest.json ]] && break
                sleep 2
              done
              [[ -s /artifacts/manifest.json ]] || { echo "manifest.json ontbreekt"; exit 1; }
              pip install --quiet --disable-pip-version-check minio
              python3 - <<EOF
              import json, os
              from minio import Minio

              # OM 1.5's dbt-ingestor parsed manifest.json met een strict ManifestV12
              # pydantic-model en weigert:
              #  - metadata.invocation_started_at / metadata.run_started_at (komen in
              #    dbt 1.10+ manifesten erbij)
              #  - metadata.quoting (dict — Extra forbidden in V12)
              #  - functions (nieuw top-level veld)
              # Strippen voor upload: ingestion blijft werkt op latere dbt versies
              # zonder dat we OM hoeven te upgraden.
              with open("/artifacts/manifest.json") as f:
                  m = json.load(f)
              for k in ("invocation_started_at", "run_started_at", "quoting"):
                  m.get("metadata", {}).pop(k, None)
              m.pop("functions", None)
              # In ons cluster materialiseren alle dbt-models op de bronze catalog
              # (dbt-Trino target schrijft `bronze.<schema>.<table>` ongeacht zone-
              # tag). Manifest zegt nog database=silver/gold; herschrijven naar
              # bronze zodat OM-lineage de tabellen in OM kan matchen via FQN.
              patched = 0
              for d in (m.get("nodes", {}), m.get("sources", {})):
                  for v in d.values():
                      if v.get("database") in ("silver", "gold"):
                          v["database"] = "bronze"
                          patched += 1
              with open("/tmp/manifest.json", "w") as f:
                  json.dump(m, f)
              print(f"patched {patched} nodes/sources; manifest size={os.path.getsize('/tmp/manifest.json')}")

              endpoint = os.environ["MINIO_ENDPOINT"].replace("https://","").replace("http://","")
              secure = os.environ["MINIO_ENDPOINT"].startswith("https://")
              mc = Minio(endpoint, os.environ["MINIO_ACCESS"], os.environ["MINIO_SECRET"],
                       secure=secure, cert_check=False)
              mc.fput_object("uwv-meta", "dbt/latest/manifest.json", "/tmp/manifest.json")
              print("uploaded dbt/latest/manifest.json (patched)")
              # catalog.json + run_results.json hebben dezelfde V12 strict-issue
              # (extra timestamps). Skippen vanaf OM 1.5 — dbt-lineage werkt ook
              # zonder, en geeft minder false-positive validation errors.
              EOF
          env:
            - name: MINIO_ENDPOINT
              value: "https://minio.uwv-platform.svc.cluster.local:9000"
            - name: MINIO_ACCESS
              valueFrom:
                secretKeyRef:
                  name: minio-s3-credentials
                  key: accessKey
            - name: MINIO_SECRET
              valueFrom:
                secretKeyRef:
                  name: minio-s3-credentials
                  key: secretKey
          volumeMounts:
            - name: artifacts
              mountPath: /artifacts
              readOnly: true
      volumes:
        - name: workspace
          emptyDir: {}
        - name: artifacts
          emptyDir: {}
