# Ingress voor Airflow webserver. Service uwv-airflow-webserver bestaat
# al via Stackable-operator (ClusterIP op 8080).
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: airflow
  namespace: uwv-platform
  annotations:
    cert-manager.io/cluster-issuer: uwv-platform-issuer
    # Zie superset/ingress.yaml — :8443 in OAuth redirect_uri.
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-Forwarded-Port 8443;
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["airflow.uwv-platform.local"]
      secretName: airflow-tls
  rules:
    - host: airflow.uwv-platform.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: uwv-airflow-webserver
                port:
                  number: 8080
