# RBAC voor uc11_full_setup DAG.
#
# Het uc11_full_setup DAG-pad heeft tasks die K8s-resources lezen/schrijven:
#   - ensure_streaming_bronze: read/create SparkApplication
#   - ensure_seed             : read/create/delete Jobs
#   - rebuild_superset_dashboard: read/create/delete Jobs
#
# We binden deze tasks aan ServiceAccount `uc11-orchestrator` ipv de
# default-SA in uwv-platform (die heeft alleen configmap-leesrechten).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: uc11-orchestrator
  namespace: uwv-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: uc11-orchestrator
  namespace: uwv-platform
rules:
  # Jobs: read + manage (rebuild_superset_dashboard, ensure_seed).
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete", "patch", "watch"]
  # SparkApplications: read + create (ensure_streaming_bronze).
  - apiGroups: ["spark.stackable.tech"]
    resources: ["sparkapplications"]
    verbs: ["get", "list", "create", "watch"]
  # Hulp: pods listen voor diagnose (geen exec/log nodig).
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: uc11-orchestrator
  namespace: uwv-platform
subjects:
  - kind: ServiceAccount
    name: uc11-orchestrator
    namespace: uwv-platform
roleRef:
  kind: Role
  name: uc11-orchestrator
  apiGroup: rbac.authorization.k8s.io
---
# KubernetesPodOperator (uc11_fabric.fabric_dbt_gold) heeft `events:list,watch`
# in de legacy core API-group ("") nodig om de pod-status van de child-pod
# te tracken. Zonder dit faalt KPO in <10s met ApiException(403) op
# get_events() en exit, terwijl de inner pod orphan blijft draaien.
#
# Stackable's airflow-clusterrole geeft alleen events.k8s.io/events:create,
# wat niet voldoende is voor de KPO event-watcher.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: airflow-kpo-events
  namespace: uwv-platform
rules:
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: airflow-kpo-events
  namespace: uwv-platform
subjects:
  - kind: ServiceAccount
    name: uwv-airflow-serviceaccount
    namespace: uwv-platform
roleRef:
  kind: Role
  name: airflow-kpo-events
  apiGroup: rbac.authorization.k8s.io
