# Source registry — FOCUS billing (FinOps Open Cost and Usage Specification).
#
# CSV-upload bron voor UC-12 (cloud-cost FinOps). 49 kolommen totaal:
#   - 39 FOCUS-core kolommen (provider-onafhankelijk)
#   - 10 oci_* vendor-extensies (alleen aanwezig in OCI-export; optioneel)
#
# Een typische upload bevat één factuurmaand (10k-1M rijen). csv_to_bronze.py
# schrijft alles native naar bronze.uwv.focus_billing (Delta, partitioned by
# event_date = upload-datum). Maand-/service-aggregatie gebeurt in silver+gold.
schema_version: 1

name: focus_billing
domain: finops

# Geen kafka-blok — handmatige CSV-upload via portal.

ingest:
  kind: csv
  staging:
    bucket: uwv-staging
    prefix: incoming/focus
    processed_prefix: processed/focus
  csv:
    delimiter: ","
    has_header: true
    encoding: utf-8
  # FOCUS-schema. Kolomnamen blijven exact zoals in de spec (PascalCase) —
  # snake_case-rename gebeurt in de dbt silver-laag.
  schema:
    # ─── FOCUS 1.x core (39 kolommen) ───
    - { name: BillingAccountId,           type: varchar,   required: true }
    - { name: BillingAccountName,         type: varchar,   required: false }
    - { name: BillingCurrency,            type: varchar,   required: true }
    - { name: BillingPeriodStart,         type: timestamp, required: true }
    - { name: BillingPeriodEnd,           type: timestamp, required: true }
    - { name: ChargePeriodStart,          type: timestamp, required: true }
    - { name: ChargePeriodEnd,            type: timestamp, required: true }
    - { name: ChargeCategory,             type: varchar,   required: true }   # Usage|Purchase|Tax|Credit|Adjustment
    - { name: ChargeSubcategory,          type: varchar,   required: false }
    - { name: ChargeDescription,          type: varchar,   required: false }
    - { name: ChargeFrequency,            type: varchar,   required: false }  # OneTime|Recurring|Usage-Based
    - { name: BilledCost,                 type: decimal,   required: true,  precision: 18, scale: 6 }
    - { name: EffectiveCost,              type: decimal,   required: true,  precision: 18, scale: 6 }
    - { name: ListCost,                   type: decimal,   required: false, precision: 18, scale: 6 }
    - { name: ListUnitPrice,              type: decimal,   required: false, precision: 18, scale: 8 }
    - { name: PricingCategory,            type: varchar,   required: false }  # Standard|Dynamic|Committed
    - { name: PricingQuantity,            type: decimal,   required: false, precision: 24, scale: 8 }
    - { name: PricingUnit,                type: varchar,   required: false }
    - { name: UsageQuantity,              type: decimal,   required: false, precision: 24, scale: 8 }
    - { name: UsageUnit,                  type: varchar,   required: false }
    - { name: CommitmentDiscountCategory, type: varchar,   required: false }
    - { name: CommitmentDiscountId,       type: varchar,   required: false }
    - { name: CommitmentDiscountName,     type: varchar,   required: false }
    - { name: CommitmentDiscountType,     type: varchar,   required: false }
    - { name: Provider,                   type: varchar,   required: true }   # OCI|AWS|Azure|GCP
    - { name: Publisher,                  type: varchar,   required: false }
    - { name: InvoiceIssuer,              type: varchar,   required: false }
    - { name: ServiceCategory,            type: varchar,   required: false }
    - { name: ServiceName,                type: varchar,   required: true }
    - { name: ResourceId,                 type: varchar,   required: false }
    - { name: ResourceName,               type: varchar,   required: false }
    - { name: ResourceType,               type: varchar,   required: false }
    - { name: Region,                     type: varchar,   required: false }
    - { name: AvailabilityZone,           type: varchar,   required: false }
    - { name: SkuId,                      type: varchar,   required: false }
    - { name: SkuPriceId,                 type: varchar,   required: false }
    - { name: SubAccountId,               type: varchar,   required: false }
    - { name: SubAccountName,             type: varchar,   required: false }
    - { name: Tags,                       type: varchar,   required: false }  # JSON-string; geparseerd in silver
    # ─── OCI vendor-extensies (optioneel — alleen bij OCI-export aanwezig) ───
    - { name: oci_ReferenceNumber,        type: varchar,   required: false }
    - { name: oci_CompartmentId,          type: varchar,   required: false }
    - { name: oci_CompartmentName,        type: varchar,   required: false }
    - { name: oci_OverageFlag,            type: varchar,   required: false }
    - { name: oci_UnitPriceOverage,       type: decimal,   required: false, precision: 18, scale: 8 }
    - { name: oci_BilledQuantityOverage,  type: decimal,   required: false, precision: 24, scale: 8 }
    - { name: oci_CostOverage,            type: decimal,   required: false, precision: 18, scale: 6 }
    - { name: oci_AttributedUsage,        type: decimal,   required: false, precision: 24, scale: 8 }
    - { name: oci_AttributedCost,         type: decimal,   required: false, precision: 18, scale: 6 }
    - { name: oci_BackReferenceNumber,    type: varchar,   required: false }

bronze:
  catalog: bronze
  schema: uwv
  table: focus_billing
  partition_by: event_date          # = upload-datum; maand-bucketing in silver

silver:
  catalog: silver
  schema: finops
  staging_model: stg_focus_billing
  dbt_tag: finops

governance:
  legal_basis: AVG_art_6_1_f        # gerechtvaardigd belang — intern kostenbeheer
  doelbinding: [finops, kostenbeheersing, capaciteitsplanning]
  bio_classificatie: intern
  bewaartermijn_jaren: 7            # fiscaal/administratief
  eigenaar: divisie_finance
  pii_kolommen: []                  # FOCUS bevat geen persoonsgegevens
  risk_tier: laag

sla:
  mode: csv_batch
  expected_event_freq: monthly
  max_acceptable_lag_seconds: 2592000   # 30 dagen — maandelijkse upload
  alert_threshold_seconds: 5184000      # 60 dagen — alarmeer na 2 ontbrekende maanden

used_by_use_cases: [uc12]
anchor: false
