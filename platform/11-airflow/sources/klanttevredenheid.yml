# Source registry — klanttevredenheid (CSV-upload demo).
#
# Afwijkend t.o.v. Kafka-bronnen:
#   - geen `kafka:` blok (mode = csv_batch)
#   - `ingest:` blok beschrijft staging-bucket en CSV-schema
#   - bronze-tabel krijgt native kolommen i.p.v. JSON-envelope
schema_version: 1

name: klanttevredenheid
domain: klantcontact

# Geen kafka-blok — deze bron komt via handmatige CSV-upload.

ingest:
  kind: csv
  staging:
    bucket: uwv-staging
    prefix: incoming/klanttevredenheid
    processed_prefix: processed/klanttevredenheid
  csv:
    delimiter: ","
    has_header: true
    encoding: utf-8
  # Verwacht CSV-schema. Wordt door csv_to_bronze.py afgedwongen
  # (kolommen mogen niet ontbreken; types worden gecast).
  schema:
    - { name: meting_datum,    type: date,    required: true }
    - { name: kanaal,          type: varchar, required: true }
    - { name: doelgroep,       type: varchar, required: true }
    - { name: score,           type: integer, required: true, min: 1, max: 5 }
    - { name: n_respondenten,  type: integer, required: true, min: 1 }
    - { name: opmerking,       type: varchar, required: false }

bronze:
  catalog: bronze
  schema: uwv
  table: klanttevredenheid
  partition_by: event_date

silver:
  catalog: silver
  schema: klantcontact
  staging_model: stg_klanttevredenheid
  dbt_tag: klantcontact

governance:
  legal_basis: AVG_art_6_1_e        # publieke taak — interne sturing
  doelbinding: [sturingsinfo, klantonderzoek]
  bio_classificatie: intern
  bewaartermijn_jaren: 5
  eigenaar: divisie_klantcontact
  pii_kolommen: []                  # geen PII; aggregaten + vrije opmerking
  risk_tier: laag

sla:
  mode: csv_batch
  expected_event_freq: ad_hoc
  max_acceptable_lag_seconds: 86400      # 1 dag — bij CSV-upload niet relevant
  alert_threshold_seconds: 2592000       # 30 dagen — ruime drempel voor manuele bron

used_by_use_cases: [uc_klant_tev]
anchor: false
