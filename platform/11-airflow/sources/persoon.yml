# Source registry — persoon (anchor-domein).
#
# Wijziging hier propageert naar:
#   - bronze-watch DAG (sensor + dataset publicatie)
#   - silver_per_domain DAG (Cosmos run op tag:persoon staging)
#   - gold_per_usecase DAG (schedule-deps voor UCs die persoon nodig hebben)
#   - dbt schema.yml meta — moet matchen (test_sources_consistency.py)
#
# Schema-versie: bump bij niet-backward-compatibele wijziging.
schema_version: 1

name: persoon
domain: persoon

# Stream — JSONL-bestanden geproduceerd door data-generation/load_to_s3.py
stream:
  name: uwv.persona.created
  key: bsn

# Bronze — Spark Structured Streaming (file source) schrijft hier
bronze:
  catalog: bronze
  schema: uwv
  table: persona_created
  partition_by: event_date

# Silver — dbt staging
silver:
  catalog: silver
  schema: persoon
  staging_model: stg_persona
  dbt_tag: persoon

# Compliance / governance
governance:
  legal_basis: Wet_SUWI_art_56
  doelbinding: [primair_proces]
  bio_classificatie: vertrouwelijk
  bewaartermijn_jaren: 7
  eigenaar: data_office_uwv
  pii_kolommen: [bsn, voornaam, achternaam, geboortedatum, straat, huisnummer, postcode]
  risk_tier: laag

# SLA — bron-typering
sla:
  mode: streaming           # streaming | batch
  expected_event_freq: continuous
  max_acceptable_lag_seconds: 120
  alert_threshold_seconds: 300

# Cross-references — welke UCs hebben deze bron nodig?
# Wordt door gold_factory gelezen om schedule-deps te bouwen.
used_by_use_cases: [uc04, uc05, uc09, uc11]

# Anchor — alle andere domeinen leunen op deze BSN-set.
# bronze-watch DAG gebruikt dit om persoon eerst te bevestigen.
anchor: true
