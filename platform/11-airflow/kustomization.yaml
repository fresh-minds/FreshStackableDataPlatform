apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: uwv-platform

resources:
  - airflowcluster.yaml

# DAGs worden via een ConfigMap gemount op /stackable/airflow/dags.
# Productie zou Stackable's `dagsGitSync` gebruiken.
configMapGenerator:
  - name: airflow-dags
    files:
      - dags/__init__.py
      - dags/dbt_run_per_domain.py
      - dags/lakehouse_maintenance.py
      - dags/synthetic_data_load.py
      - dags/om_ingest_trino.py
      - dags/om_ingest_dbt.py

generatorOptions:
  disableNameSuffixHash: true
