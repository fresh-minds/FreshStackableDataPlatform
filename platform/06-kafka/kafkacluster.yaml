# KafkaCluster — event backbone voor het UWV-platform.
#
# Topics worden in fase 4 (NiFi flows) automatisch aangemaakt of via
# een KafkaTopic CRD; hier alleen de cluster zelf.
#
# Scaled-down: 1 broker (geen replicatie). Productie: ≥ 3 brokers.
---
apiVersion: kafka.stackable.tech/v1alpha1
kind: KafkaCluster
metadata:
  name: uwv-kafka
  namespace: uwv-platform
spec:
  image:
    productVersion: "3.7.1"
  clusterConfig:
    zookeeperConfigMapName: uwv-zookeeper-znode-kafka
  brokers:
    # 26.3: listener-classes verplaatst naar brokers.config
    config:
      brokerListenerClass: cluster-internal
      bootstrapListenerClass: cluster-internal
      logging:
        enableVectorAgent: false
    configOverrides:
      server.properties:
        # Topic auto-creatie UIT — declaratief via kafkatopics-job.yaml.
        # Was "true" voor demo-doelen tot improvements #2.
        auto.create.topics.enable: "false"
        # Compactie + retentie defaults (per-topic overrideable)
        log.retention.hours: "168"   # 7 dagen
        # Single broker → moet replication-factor 1 toestaan
        offsets.topic.replication.factor: "1"
        transaction.state.log.replication.factor: "1"
        transaction.state.log.min.isr: "1"
        min.insync.replicas: "1"
    roleGroups:
      default:
        replicas: 1
        config:
          resources:
            cpu:
              min: "200m"
              max: "1000m"
            memory:
              limit: "1Gi"
            storage:
              logDirs:
                capacity: "5Gi"
