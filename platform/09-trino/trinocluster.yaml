# TrinoCluster — centrale SQL query-engine.
#
# Authenticatie:
#   - keycloak-uwv (OIDC) — primaire flow voor users/UI's
#   - trino-static-uwv (static) — voor smoke-tests + break-glass
#
# Authorisatie:
#   - OPA (Stackable OpaCluster `uwv-opa`), package `trino`
#
# Catalogs: alle TrinoCatalog-resources met label `trino: uwv-trino` worden
# automatisch opgepikt. Zie `catalogs/`.
#
# Schaal: 1 coordinator + 1 worker (k3d scaled-down). Productie: meerdere
# workers + fault-tolerant execution.
---
apiVersion: trino.stackable.tech/v1alpha1
kind: TrinoCluster
metadata:
  name: uwv-trino
  namespace: uwv-platform
spec:
  image:
    productVersion: "477"
  clusterConfig:
    catalogLabelSelector:
      matchLabels:
        trino: uwv-trino
    # Authentication uitgeschakeld voor demo:
    # - trino-static-uwv: password-file-updater sidecar crashloop
    # - keycloak-uwv OIDC: issuer-mismatch tussen interne discovery-URL
    #   en externe issuer-claim die Keycloak adverteert (KC_HOSTNAME=:8443).
    # Productie: of Keycloak issuer in-cluster resolvable maken (CoreDNS
    # rewrite + 443:443 port-mapping in k3d), of mTLS via SecretClass tls.
    authentication: []
    authorization:
      opa:
        configMapName: uwv-opa
        package: trino
  coordinators:
    # 26.3: listenerClass per role
    roleConfig:
      listenerClass: cluster-internal
    config:
      logging:
        enableVectorAgent: false
    # Reverse-proxy aware: ingress-nginx stuurt X-Forwarded-* headers door.
    # Trino's Jetty (airlift) wijst die default af → HTTP 406
    # "Server configuration does not allow processing of the X-Forwarded-For
    # header". process-forwarded=true laat Trino de proto/host/port uit de
    # X-Forwarded-* headers gebruiken voor o.a. UI redirects en OAuth
    # callback-URLs.
    configOverrides:
      config.properties:
        http-server.process-forwarded: "true"
    roleGroups:
      default:
        replicas: 1
        config:
          resources:
            cpu:
              min: "200m"
              max: "1000m"
            memory:
              limit: "2Gi"
  workers:
    config:
      logging:
        enableVectorAgent: false
    roleGroups:
      default:
        replicas: 1
        config:
          resources:
            cpu:
              min: "200m"
              max: "2000m"
            memory:
              limit: "2Gi"
