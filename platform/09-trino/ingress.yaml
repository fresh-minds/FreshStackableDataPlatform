# Service + Ingress voor Trino coordinator.
# Trino spreekt HTTPS op poort 8443 → nginx-ingress backend-protocol HTTPS.
# Stackable maakt alleen headless Services; voor browser-toegang is een
# normale ClusterIP Service nodig.
---
apiVersion: v1
kind: Service
metadata:
  name: trino
  namespace: uwv-platform
spec:
  type: ClusterIP
  # Trino-coordinator pod is 1/2 (sidecar password-file-updater eindigt
  # exit 0 maar restartPolicy=Always → K8s ziet CrashLoop, pod telt als
  # NOT READY, geen endpoint). Trino-zelf werkt wel — laat Service ook
  # niet-ready endpoints adverteren.
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: trino
    app.kubernetes.io/instance: uwv-trino
    app.kubernetes.io/component: coordinator
  ports:
    - name: https
      port: 8443
      targetPort: 8443
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trino
  namespace: uwv-platform
  annotations:
    cert-manager.io/cluster-issuer: uwv-platform-issuer
    nginx.ingress.kubernetes.io/backend-protocol: HTTPS
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "off"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["trino.uwv-platform.local"]
      secretName: trino-tls
  rules:
    - host: trino.uwv-platform.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: trino
                port:
                  number: 8443
