# =====================================================================
#  DEV-ONLY SECRETS — NIET VOOR PRODUCTIE
# =====================================================================
# Voor productie: vervang dit bestand door SealedSecrets/SOPS-of
# external-secrets-operator + Vault-injection. De `stringData` waardes hier
# zijn placeholders die overeenkomen met de Helm-values van fase 1.
#
# Bootstrap-warning print de wachtwoorden bij `make bootstrap`.
# =====================================================================
---
# MinIO S3-credentials. Pickup-label: secrets.stackable.tech/class: s3-credentials-minio
apiVersion: v1
kind: Secret
metadata:
  name: minio-s3-credentials
  namespace: uwv-platform
  labels:
    secrets.stackable.tech/class: s3-credentials-minio
    uwv.nl/dev-only: "true"
type: Opaque
stringData:
  accessKey: "uwvadmin"
  secretKey: "uwv-dev-only-CHANGE-ME-2026"
---
# Hive Metastore → Postgres credentials.
# Stackable Hive 26.3 verwacht beide username + password in dezelfde Secret
# (clusterConfig.database.user is verwijderd uit het 26.3 schema).
apiVersion: v1
kind: Secret
metadata:
  name: hive-postgres-credentials
  namespace: uwv-platform
  labels:
    uwv.nl/dev-only: "true"
type: Opaque
stringData:
  username: "uwvplatform"
  password: "uwv-dev-only-CHANGE-ME-2026"
---
# OIDC client-secrets per Stackable-service. Pickup-label maakt ze beschikbaar
# voor de oidc-client-credentials SecretClass.
apiVersion: v1
kind: Secret
metadata:
  name: trino-oidc-client
  namespace: uwv-platform
  labels:
    secrets.stackable.tech/class: oidc-client-credentials
    uwv.nl/oidc-service: trino
    uwv.nl/dev-only: "true"
type: Opaque
stringData:
  clientId: "trino"
  clientSecret: "uwv-dev-only-CHANGE-ME-trino-secret"
---
apiVersion: v1
kind: Secret
metadata:
  name: superset-oidc-client
  namespace: uwv-platform
  labels:
    secrets.stackable.tech/class: oidc-client-credentials
    uwv.nl/oidc-service: superset
    uwv.nl/dev-only: "true"
type: Opaque
stringData:
  clientId: "superset"
  clientSecret: "uwv-dev-only-CHANGE-ME-superset-secret"
---
apiVersion: v1
kind: Secret
metadata:
  name: airflow-oidc-client
  namespace: uwv-platform
  labels:
    secrets.stackable.tech/class: oidc-client-credentials
    uwv.nl/oidc-service: airflow
    uwv.nl/dev-only: "true"
type: Opaque
stringData:
  clientId: "airflow"
  clientSecret: "uwv-dev-only-CHANGE-ME-airflow-secret"
---
apiVersion: v1
kind: Secret
metadata:
  name: nifi-oidc-client
  namespace: uwv-platform
  labels:
    secrets.stackable.tech/class: oidc-client-credentials
    uwv.nl/oidc-service: nifi
    uwv.nl/dev-only: "true"
type: Opaque
stringData:
  clientId: "nifi"
  clientSecret: "uwv-dev-only-CHANGE-ME-nifi-secret"
---
# Database-credentials voor Airflow + Superset → Postgres (fase 6/7).
# Vooruit aanmaken zodat fase-flow ononderbroken is.
apiVersion: v1
kind: Secret
metadata:
  name: airflow-postgres-credentials
  namespace: uwv-platform
  labels:
    uwv.nl/dev-only: "true"
type: Opaque
stringData:
  # Stackable Airflow 26.3 verwacht zowel admin-user info als
  # connection-strings in dezelfde Secret.
  adminUser.username: "airflow"
  adminUser.firstname: "Air"
  adminUser.lastname: "Flow"
  adminUser.email: "airflow@uwv-platform.local"
  adminUser.password: "uwv-dev-only-CHANGE-ME-2026"
  connections.secretKey: "uwv-secret-key-32-bytes-min-len"
  connections.sqlalchemyDatabaseUri: "postgresql+psycopg2://uwvplatform:uwv-dev-only-CHANGE-ME-2026@postgres-postgresql.uwv-data.svc.cluster.local:5432/airflow"
  connections.celeryResultBackend: "db+postgresql://uwvplatform:uwv-dev-only-CHANGE-ME-2026@postgres-postgresql.uwv-data.svc.cluster.local:5432/airflow"
  connections.celeryBrokerUrl: "redis://localhost:6379/0"
---
apiVersion: v1
kind: Secret
metadata:
  name: superset-postgres-credentials
  namespace: uwv-platform
  labels:
    uwv.nl/dev-only: "true"
type: Opaque
stringData:
  # Stackable Superset 26.3 verwacht admin-user keys + connection-strings.
  adminUser.username: "admin"
  adminUser.firstname: "Super"
  adminUser.lastname: "Admin"
  adminUser.email: "superset@uwv-platform.local"
  adminUser.password: "uwv-dev-only-CHANGE-ME-2026"
  connections.secretKey: "uwv-secret-key-32-bytes-min-len"
  connections.sqlalchemyDatabaseUri: "postgresql+psycopg2://uwvplatform:uwv-dev-only-CHANGE-ME-2026@postgres-postgresql.uwv-data.svc.cluster.local:5432/superset"
---
# OpenMetadata admin + JWT-secret. JWT wordt door bootstrap-script gegenereerd
# (OM CLI: `metadata generate-token`), maar voor dev-seeding plaatsen we een
# placeholder — init-Job kan ook met basic-auth tegen /api/v1/users/login.
apiVersion: v1
kind: Secret
metadata:
  name: openmetadata-admin
  namespace: uwv-meta
  labels:
    uwv.nl/dev-only: "true"
type: Opaque
stringData:
  adminEmail: "admin@uwv-platform.local"
  adminPassword: "uwv-dev-only-CHANGE-ME-OmAdmin2026"
  jwtToken: "REPLACE_VIA_metadata_generate_token_AT_BOOTSTRAP"
---
# OIDC client-secret voor OpenMetadata → Keycloak SSO.
# Komt overeen met de `openmetadata` client in realm-uwv.json (zie ook
# infrastructure/helm/keycloak/realm-uwv.json regel ~458). De Helm-chart
# (infrastructure/helm/openmetadata/values.yaml) refereert naar deze Secret
# via openmetadata.config.authentication.oidcConfiguration.secret.secretRef.
apiVersion: v1
kind: Secret
metadata:
  name: openmetadata-oidc-client
  namespace: uwv-meta
  labels:
    uwv.nl/oidc-service: openmetadata
    uwv.nl/dev-only: "true"
type: Opaque
stringData:
  clientId: "openmetadata"
  clientSecret: "uwv-dev-only-CHANGE-ME-openmetadata-secret"
---
# Chart 1.12 hardcodes een env-var `AIRFLOW_PASSWORD` die uit het
# Secret `airflow-secrets` (key `openmetadata-airflow-password`) komt,
# ook als pipelineServiceClientConfig.enabled=false (in onze setup
# rijden we ingest-workflows via Airflow's KubernetesPodOperator,
# niet via OM's eigen Airflow-client). Zonder dit Secret crasht het
# run-db-migrations initContainer met
# `secret "airflow-secrets" not found`. Dummy-waarde volstaat.
apiVersion: v1
kind: Secret
metadata:
  name: airflow-secrets
  namespace: uwv-meta
  labels:
    uwv.nl/dev-only: "true"
type: Opaque
stringData:
  openmetadata-airflow-password: "dummy-not-used-pipelineserviceclient-disabled"
