# Stackable SecretClasses voor het UWV-platform.
#
# Een SecretClass is een cluster-scoped resource die Stackable-operators
# verbindt met onderliggende K8s Secrets. De backend `k8sSearch` zoekt naar
# Secrets met label `secrets.stackable.tech/class: <secretclass-name>`.
#
# Documentatie:
#   https://docs.stackable.tech/home/stable/concepts/secret-class/
---
# S3 credentials voor MinIO. Gebruikt door Hive Metastore, Trino, Spark, NiFi.
apiVersion: secrets.stackable.tech/v1alpha1
kind: SecretClass
metadata:
  name: s3-credentials-minio
spec:
  backend:
    k8sSearch:
      searchNamespace:
        pod: {}   # zoek in dezelfde namespace als de pod die de secret consumeert
---
# OIDC client-credentials voor Keycloak. Gebruikt door Trino, Superset,
# Airflow, NiFi (en in fase 8 OpenMetadata).
apiVersion: secrets.stackable.tech/v1alpha1
kind: SecretClass
metadata:
  name: oidc-client-credentials
spec:
  backend:
    k8sSearch:
      searchNamespace:
        pod: {}
