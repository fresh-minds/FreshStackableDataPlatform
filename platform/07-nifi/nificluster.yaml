# NiFiCluster — flow-based ingestion.
#
# In fase 4 is NiFi gedeployed maar geen flows automatisch geladen. De
# referentie-implementatie gebruikt `data-generation/load_to_kafka.py` als
# producer; NiFi-flows komen in fase 5+ via UI-import (zie
# `nifi-flows/templates/delta/README.md`).
#
# Reden: NiFi 2.x flow-definition JSON met de hand schrijven is foutgevoelig
# en levert geen extra waarde voor de smoke-test. De `streaming_kafka_to_lakehouse.py`
# Spark-job sluit aan op dezelfde Kafka-topics, ongeacht of de producer
# NiFi of Python is.
---
apiVersion: nifi.stackable.tech/v1alpha1
kind: NifiCluster
metadata:
  name: uwv-nifi
  namespace: uwv-platform
spec:
  image:
    productVersion: "1.28.1"
  clusterConfig:
    sensitiveProperties:
      keySecret: nifi-sensitive-key
      autoGenerate: true
    zookeeperConfigMapName: uwv-zookeeper-znode-nifi
    authentication:
      - authenticationClass: keycloak-uwv
        oidc:
          clientCredentialsSecret: nifi-oidc-client
    # Reverse-proxy aware: ingress-nginx stuurt X-Forwarded-Port 8443
    # mee (zie ingress.yaml), maar default `allowAll: true` zet
    # `nifi.web.proxy.host=*`. Met die wildcard kiest NiFi zelf welke
    # host:port hij in absolute redirect-URL's zet, en in k3d (waar
    # ingress intern op :443 draait) verliest hij de :8443. Door de
    # externe host expliciet op de whitelist te zetten gebruikt NiFi
    # die als publieke URL → /nifi-api/.../authorization/<id> blijft
    # netjes :8443 houden.
    hostHeaderCheck:
      allowAll: false
      additionalAllowedHosts:
        - "nifi.uwv-platform.local:8443"
  nodes:
    roleConfig:
      listenerClass: cluster-internal
    config:
      logging:
        enableVectorAgent: false
    # NiFi's Spring-Security backport doet de OAuth2 token-exchange
    # server-side naar https://keycloak.uwv-platform.local:8443/.../token.
    # Die cert is door cert-manager (uwv-platform-issuer) ondertekend en
    # zit niet in de JDK-default truststore → PKIX-fout. JAVA_TOOL_OPTIONS
    # wijst Java naar een cacerts die door de init-container is gebouwd
    # (JDK-default + uwv-platform-CA). NiFi's eigen mTLS-clustering
    # gebruikt nifi.security.truststore (separate file), dus dit raakt
    # die niet.
    envOverrides:
      JAVA_TOOL_OPTIONS: "-Djavax.net.ssl.trustStore=/etc/uwv-truststore/cacerts -Djavax.net.ssl.trustStorePassword=changeit"
    roleGroups:
      default:
        replicas: 1
        # NiFi 1.x heeft 3-5 min boot-tijd. Default Stackable tcpSocket
        # probe wordt overschreven met dezelfde tcpSocket maar ruimere
        # thresholds. NIET httpGet erin — dan merged K8s twee probe-types
        # ("more than 1 handler" error) en STS kan geen pod maken.
        podOverrides:
          spec:
            initContainers:
              - name: import-uwv-ca
                image: oci.stackable.tech/sdp/nifi:1.28.1-stackable26.3.0
                command: ["/bin/bash", "-c"]
                args:
                  - |
                    set -e
                    cp /etc/pki/ca-trust/extracted/java/cacerts /shared/cacerts
                    chmod 644 /shared/cacerts
                    keytool -import -noprompt -alias uwv-platform-ca \
                      -keystore /shared/cacerts -storepass changeit \
                      -file /uwv-ca/ca.crt
                    echo "imported uwv-platform-ca"
                volumeMounts:
                  - name: uwv-ca-source
                    mountPath: /uwv-ca
                    readOnly: true
                  - name: uwv-truststore
                    mountPath: /shared
            containers:
              - name: nifi
                startupProbe:
                  tcpSocket:
                    port: 8443
                  initialDelaySeconds: 60
                  periodSeconds: 10
                  failureThreshold: 60
                livenessProbe:
                  tcpSocket:
                    port: 8443
                  periodSeconds: 30
                  failureThreshold: 6
                volumeMounts:
                  - name: uwv-truststore
                    mountPath: /etc/uwv-truststore
                    readOnly: true
            volumes:
              - name: uwv-ca-source
                configMap:
                  name: uwv-ca-bundle
              - name: uwv-truststore
                emptyDir: {}
        config:
          resources:
            cpu:
              min: "200m"
              max: "1000m"
            memory:
              limit: "2Gi"
