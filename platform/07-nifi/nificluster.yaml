# NiFiCluster — flow-based ingestion.
#
# In fase 4 is NiFi gedeployed maar geen flows automatisch geladen. De
# referentie-implementatie gebruikt `data-generation/load_to_kafka.py` als
# producer; NiFi-flows komen in fase 5+ via UI-import (zie
# `nifi-flows/templates/delta/README.md`).
#
# Reden: NiFi 2.x flow-definition JSON met de hand schrijven is foutgevoelig
# en levert geen extra waarde voor de smoke-test. De `streaming_kafka_to_lakehouse.py`
# Spark-job sluit aan op dezelfde Kafka-topics, ongeacht of de producer
# NiFi of Python is.
---
apiVersion: nifi.stackable.tech/v1alpha1
kind: NifiCluster
metadata:
  name: uwv-nifi
  namespace: uwv-platform
spec:
  image:
    productVersion: "1.28.1"
  clusterConfig:
    sensitiveProperties:
      keySecret: nifi-sensitive-key
      autoGenerate: true
    zookeeperConfigMapName: uwv-zookeeper-znode-nifi
    authentication:
      - authenticationClass: keycloak-uwv
        oidc:
          clientCredentialsSecret: nifi-oidc-client
  nodes:
    roleConfig:
      listenerClass: cluster-internal
    config:
      logging:
        enableVectorAgent: false
    roleGroups:
      default:
        replicas: 1
        # NiFi 1.x heeft 3-5 min boot-tijd; default liveness probe (3 failures
        # à 10s) killt 'm voortijdig. Override met ruimere thresholds.
        podOverrides:
          spec:
            containers:
              - name: nifi
                startupProbe:
                  httpGet:
                    path: /nifi
                    port: 8443
                    scheme: HTTPS
                  initialDelaySeconds: 60
                  periodSeconds: 10
                  failureThreshold: 60   # 10 min totaal voor startup
                livenessProbe:
                  httpGet:
                    path: /nifi
                    port: 8443
                    scheme: HTTPS
                  periodSeconds: 30
                  failureThreshold: 6
        config:
          resources:
            cpu:
              min: "200m"
              max: "1000m"
            memory:
              limit: "2Gi"
