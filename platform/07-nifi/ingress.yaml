# Service + Ingress voor NiFi node. NiFi spreekt HTTPS op 8443.
# Stackable maakt alleen headless Services.
---
apiVersion: v1
kind: Service
metadata:
  name: nifi
  namespace: uwv-platform
spec:
  type: ClusterIP
  # NiFi 1.x heeft langzame boot, pod kan tijdelijk NOT READY zijn.
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: nifi
    app.kubernetes.io/instance: uwv-nifi
  ports:
    - name: https
      port: 8443
      targetPort: 8443
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nifi
  namespace: uwv-platform
  annotations:
    cert-manager.io/cluster-issuer: uwv-platform-issuer
    nginx.ingress.kubernetes.io/backend-protocol: HTTPS
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "off"
    # Zie superset/ingress.yaml — :8443 in OAuth redirect_uri.
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-Forwarded-Port 8443;
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["nifi.uwv-platform.local"]
      secretName: nifi-tls
  rules:
    - host: nifi.uwv-platform.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nifi
                port:
                  number: 8443
