apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: uwv-platform

resources:
  - configmap.yaml
  # NOTE: secret.yaml is intentionally NOT in this list. Kustomize-applying
  # it would overwrite the real key with the placeholder. Create the
  # Secret out-of-band (see README) — kustomize only owns config that's
  # safe to round-trip from disk.
  - deployment.yaml
  - service.yaml
  - ingress.yaml

commonLabels:
  app.kubernetes.io/part-of: uwv-platform
  app.kubernetes.io/component: nanitics-observatory
