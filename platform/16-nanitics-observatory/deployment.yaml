apiVersion: apps/v1
kind: Deployment
metadata:
  name: nanitics-observatory
  namespace: uwv-platform
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: nanitics-observatory
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nanitics-observatory
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: uwv-platform/nanitics-observatory:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8001
          envFrom:
            - configMapRef:
                name: nanitics-observatory-config
            - secretRef:
                name: nanitics-azure-foundry
            # Watcher's Multica bearer token. `optional: true` keeps the
            # pod startable while MULTICA_DRY_RUN=true and the real token
            # has not yet been provisioned. See secret-multica.yaml.
            - secretRef:
                name: nanitics-multica-token
                optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests: { cpu: 50m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 1Gi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            # uvicorn writes a small pid/access log here on some setups;
            # easier to grant a writable tmpfs than fight it.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
