# TEMPLATE ONLY — NOT a kustomize resource.
#
# This file documents the expected shape of the Secret. It is
# DELIBERATELY OMITTED from kustomization.yaml's resources list, so
# that running `kubectl apply -k .` cannot overwrite a real key with
# the placeholder below.
#
# To populate the real Secret on the cluster, run (out-of-band):
#
#   kubectl -n uwv-platform create secret generic nanitics-azure-foundry \
#     --from-literal=AZURE_AI_FOUNDRY_API_KEY='<paste-your-key>' \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Production: replace this with External Secrets / Vault / Workload
# Identity. Never commit a real key.
apiVersion: v1
kind: Secret
metadata:
  name: nanitics-azure-foundry
  namespace: uwv-platform
type: Opaque
stringData:
  AZURE_AI_FOUNDRY_API_KEY: "CHANGE-ME-paste-your-azure-foundry-key"
