# TEMPLATE ONLY — NOT a kustomize resource.
#
# Documents the expected shape of the Secret that holds OpenSearch
# basic-auth credentials for the platform watcher's
# search_opensearch_logs tool. DELIBERATELY OMITTED from
# kustomization.yaml's resources list so that running `kubectl apply -k .`
# cannot overwrite real credentials with the placeholder below.
#
# Anonymous reads work today against the in-cluster OpenSearch
# (`opensearch-uwv.uwv-meta`) because the security plugin is permissive
# in dev. Once the security plugin is tightened, provision real creds:
#
#   kubectl -n uwv-platform create secret generic nanitics-opensearch \
#     --from-literal=OPENSEARCH_USERNAME='watcher' \
#     --from-literal=OPENSEARCH_PASSWORD='<paste-password>' \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# The deployment references this Secret with `optional: true`, so the
# pod still starts when the Secret is absent (empty username → anonymous
# request).
apiVersion: v1
kind: Secret
metadata:
  name: nanitics-opensearch
  namespace: uwv-platform
type: Opaque
stringData:
  OPENSEARCH_USERNAME: "CHANGE-ME-watcher-username"
  OPENSEARCH_PASSWORD: "CHANGE-ME-watcher-password"
