# S3Connection naar de in-cluster MinIO instance.
#
# Stackable-operators (Hive, Trino, Spark, NiFi) refereren deze connection
# via `spec.clusterConfig.s3.reference: s3-minio` (of vergelijkbaar).
#
# Host: in-cluster service-DNS van MinIO (uit Helm-chart).
# Voor productie zou TLS aanstaan en de bucket-policy strakker zijn.
---
apiVersion: s3.stackable.tech/v1alpha1
kind: S3Connection
metadata:
  name: s3-minio
  namespace: uwv-platform
spec:
  host: minio.uwv-platform.svc.cluster.local
  port: 9000
  accessStyle: Path   # MinIO/path-style; alternatief: VirtualHosted (AWS-style)
  credentials:
    secretClass: s3-credentials-minio
  # Trino 469+ vereist TLS for S3 én weigert verification:none.
  # CA komt uit cert-manager (Certificate `minio-tls-internal`) en wordt
  # via secret `minio-ca-bundle` (label secrets.stackable.tech/class=minio-ca)
  # door SecretClass `minio-ca` aan pods aangeleverd.
  tls:
    verification:
      server:
        caCert:
          secretClass: minio-ca
