# OpenMetadata-bootstrap Job — past classifications, glossary en service-
# definities toe via OM REST API. Idempotent.
#
# Het Python-script leest:
#   /config/classifications-uwv.yaml
#   /config/glossary-cgm.yaml
# en POSTet de classifications + glossary terms.
#
# Service-configs (services/*.yaml) komen ook mee in dezelfde ConfigMap;
# de daadwerkelijke ingestion-runs worden door Airflow-DAGs (om_ingest_*.py)
# getriggerd, niet door deze Job.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openmetadata-init-config
  namespace: uwv-meta
  labels:
    uwv.nl/component: openmetadata-init
data:
  init_openmetadata.py: |
    """Bootstrap OpenMetadata met UWV-specifieke classifications + glossary.

    Idempotent — bestaande items worden overgeslagen (200/409/422 → ok).
    """
    import os
    import sys
    import time
    import yaml
    import json
    from urllib.parse import urljoin

    import requests

    OM_URL = os.environ.get("OM_URL", "http://openmetadata.uwv-meta.svc.cluster.local:8585")
    OM_TOKEN = os.environ["OM_JWT_TOKEN"]
    HEADERS = {"Authorization": f"Bearer {OM_TOKEN}", "Content-Type": "application/json"}

    CLASSIFICATIONS_PATH = "/config/classifications-uwv.yaml"
    GLOSSARY_PATH = "/config/glossary-cgm.yaml"
    MAPPING_PATH = "/config/dbt-meta-mapping.yaml"
    TEST_SUITES_PATH = "/config/test-suites.yaml"


    def log(msg: str) -> None:
        print(f"[init] {msg}", flush=True)


    def wait_for_om(timeout_s: int = 600) -> None:
        log(f"Wachten op OpenMetadata health-endpoint {OM_URL}/api/v1/system/version")
        deadline = time.time() + timeout_s
        while time.time() < deadline:
            try:
                r = requests.get(f"{OM_URL}/api/v1/system/version", headers=HEADERS, timeout=5)
                if r.status_code == 200:
                    log(f"OM version: {r.json().get('version', '?')}")
                    return
            except requests.RequestException:
                pass
            time.sleep(5)
        sys.exit("FAIL: OpenMetadata bereikt /system/version niet binnen timeout")


    def post_or_skip(path: str, body: dict, label: str) -> None:
        url = urljoin(OM_URL, path)
        r = requests.post(url, headers=HEADERS, data=json.dumps(body), timeout=30)
        if r.status_code in (200, 201):
            log(f"  + {label}")
            return
        if r.status_code in (409, 422):
            # 409 conflict = bestaat al; 422 unprocessable = vaak duplicate constraint
            log(f"  = {label} (bestaat al)")
            return
        log(f"  ! {label}  status={r.status_code}  body={r.text[:200]}")


    def apply_classifications() -> None:
        log("Classifications toepassen")
        with open(CLASSIFICATIONS_PATH) as f:
            data = yaml.safe_load(f)
        for cls in data.get("classifications", []):
            post_or_skip(
                "/api/v1/classifications",
                {
                    "name": cls["name"],
                    "description": cls["description"],
                    "mutuallyExclusive": cls.get("mutuallyExclusive", False),
                },
                f"classification {cls['name']}",
            )
            for tag in cls.get("tags", []):
                post_or_skip(
                    "/api/v1/tags",
                    {
                        "classification": cls["name"],
                        "name": tag["name"],
                        "description": tag["description"],
                    },
                    f"tag {cls['name']}.{tag['name']}",
                )


    # OM 1.5+ verwacht in EntityReferences een UUID `id`; alleen `name` geeft
    # "query param id must not be null". Cache lookups om HTTP-round-trips te
    # beperken.
    _USER_ID_CACHE: dict[str, str] = {}


    def _lookup_user_id(username: str) -> str | None:
        if username in _USER_ID_CACHE:
            return _USER_ID_CACHE[username]
        r = requests.get(
            f"{OM_URL}/api/v1/users/name/{username}",
            headers=HEADERS,
            timeout=10,
        )
        if r.status_code == 200:
            uid = r.json().get("id")
            if uid:
                _USER_ID_CACHE[username] = uid
                return uid
        log(f"  ? user {username} niet vindbaar voor reference (status={r.status_code})")
        return None


    def _user_refs(usernames):
        refs = []
        for u in usernames or []:
            uid = _lookup_user_id(u)
            if uid:
                refs.append({"type": "user", "id": uid, "name": u})
        return refs


    def _collect_glossary_users(data: dict) -> set[str]:
        users: set[str] = set()
        g = data.get("glossary", {})
        users.update(g.get("reviewers", []) or [])
        if g.get("owner", {}).get("name"):
            users.add(g["owner"]["name"])
        for term in data.get("terms", []):
            users.update(term.get("reviewers", []) or [])
            if term.get("dataOwner"):
                users.add(term["dataOwner"])
        return users


    def apply_users(usernames) -> None:
        # Reviewer/Owner-refs in OM falen op 404 als de user niet bestaat. We
        # seeden minimale user-records (display-only); echte authenticatie blijft
        # via Keycloak SSO. Idempotent op 409/422.
        log("Users seeden voor reviewers/owners")
        for u in sorted(usernames):
            email_local = u.replace(".", "")
            post_or_skip(
                "/api/v1/users",
                {
                    "name": u,
                    "displayName": u.replace(".", " ").title(),
                    "email": f"{email_local}@uwv-platform.local",
                    "isBot": False,
                    "isAdmin": False,
                },
                f"user {u}",
            )


    def apply_glossary() -> None:
        log("Glossary CGM toepassen")
        with open(GLOSSARY_PATH) as f:
            data = yaml.safe_load(f)
        apply_users(_collect_glossary_users(data))
        g = data["glossary"]

        # OM 1.5+ gebruikt `owners` (lijst van EntityReference) ipv `owner`.
        glossary_reviewers = _user_refs(g.get("reviewers"))
        glossary_owners = []
        if g.get("owner"):
            glossary_owners = _user_refs([g["owner"]["name"]])

        glossary_body = {
            "name": g["name"],
            "displayName": g.get("displayName", g["name"]),
            "description": g["description"],
        }
        if glossary_reviewers:
            glossary_body["reviewers"] = glossary_reviewers
        if glossary_owners:
            glossary_body["owners"] = glossary_owners

        post_or_skip("/api/v1/glossaries", glossary_body, f"glossary {g['name']}")

        # Per-term: reviewers vallen terug op glossary-default als de term er
        # geen heeft. owners = dataOwner uit term (mag afwijken van glossary-default).
        for term in data.get("terms", []):
            # OM 1.5+: een term met reviewers/owners triggert automatisch een
            # approval-Task. Bots mogen geen Tasks aanmaken
            # ("Task cannot be created by bot only by user or teams").
            # Bootstrap seedt daarom minimal term-records (name + description);
            # reviewers/dataOwner zijn documentatie-metadata, kan later via UI
            # gezet worden door een echte user.
            term_body = {
                "glossary": g["name"],
                "name": term["name"],
                "displayName": term.get("displayName", term["name"]),
                "description": term["description"],
            }

            post_or_skip(
                "/api/v1/glossaryTerms",
                term_body,
                f"glossary-term CGM.{term['name']}",
            )


    def _load_mapping() -> dict:
        try:
            with open(MAPPING_PATH) as f:
                return yaml.safe_load(f) or {}
        except FileNotFoundError:
            log(f"  ? {MAPPING_PATH} ontbreekt — sla teams/domains/custom-props over")
            return {}


    def _load_test_suites() -> dict:
        try:
            with open(TEST_SUITES_PATH) as f:
                return yaml.safe_load(f) or {}
        except FileNotFoundError:
            log(f"  ? {TEST_SUITES_PATH} ontbreekt — sla test-suites/alerts over")
            return {}


    def apply_teams() -> None:
        mapping = _load_mapping()
        teams = mapping.get("teams", [])
        if not teams:
            return
        log("Teams seeden voor mart-eigenaarschap")
        for t in teams:
            post_or_skip(
                "/api/v1/teams",
                {
                    "name": t["name"],
                    "displayName": t.get("displayName", t["name"]),
                    "teamType": t.get("teamType", "Group"),
                },
                f"team {t['name']}",
            )


    def apply_custom_properties() -> None:
        """Registreer custom-properties op de Table-entiteit. OM 1.5 heeft
        geen `boolean` primitive — booleans worden gemodelleerd als enum met
        EnumConfig.values=['true','false']. Bestaande properties worden
        overgeslagen (idempotent op naam)."""
        mapping = _load_mapping()
        props = mapping.get("custom_properties", [])
        if not props:
            return
        log("Custom-properties registreren op Table-entiteit")

        r = requests.get(
            f"{OM_URL}/api/v1/metadata/types/name/table",
            headers=HEADERS,
            timeout=10,
        )
        if r.status_code != 200:
            log(f"  ! table-entity-type ophalen faalt: {r.status_code}")
            return
        table_type = r.json()
        existing = {
            p["name"] for p in (table_type.get("customProperties") or [])
        }

        type_refs: dict[str, dict] = {}
        for ptype in {p["propertyType"] for p in props}:
            r = requests.get(
                f"{OM_URL}/api/v1/metadata/types/name/{ptype}",
                headers=HEADERS,
                timeout=10,
            )
            if r.status_code != 200:
                log(f"  ! propertyType '{ptype}' niet vindbaar")
                continue
            data = r.json()
            type_refs[ptype] = {
                "id": data["id"],
                "name": ptype,
                "type": "type",
            }

        url = f"{OM_URL}/api/v1/metadata/types/{table_type['id']}"
        for p in props:
            if p["name"] in existing:
                log(f"  = customProperty {p['name']} (bestaat al)")
                continue
            ref = type_refs.get(p["propertyType"])
            if not ref:
                continue
            body = {
                "name": p["name"],
                "description": p["description"],
                "propertyType": ref,
            }
            if p["propertyType"] == "enum":
                body["customPropertyConfig"] = {
                    "config": {
                        "values": p.get("enumValues", ["true", "false"]),
                        "multiSelect": False,
                    }
                }
            r = requests.put(
                url, headers=HEADERS, data=json.dumps(body), timeout=15
            )
            if r.status_code in (200, 201):
                log(f"  + customProperty {p['name']}")
            else:
                log(
                    f"  ! customProperty {p['name']} "
                    f"status={r.status_code} body={r.text[:200]}"
                )


    def _team_ref(name: str) -> dict | None:
        r = requests.get(
            f"{OM_URL}/api/v1/teams/name/{name}", headers=HEADERS, timeout=10
        )
        if r.status_code == 200:
            return {"id": r.json()["id"], "type": "team", "name": name}
        return None


    def apply_domains() -> None:
        mapping = _load_mapping()
        domains = mapping.get("domains", [])
        if not domains:
            return
        log("Domains seeden")
        for d in domains:
            owners = []
            ref = _team_ref(d["owner"]) if d.get("owner") else None
            if ref:
                owners.append(ref)
            body = {
                "name": d["name"],
                "displayName": d.get("displayName", d["name"]),
                "description": d["description"],
                "domainType": d.get("domainType", "Source-aligned"),
            }
            if owners:
                body["owners"] = owners
            post_or_skip("/api/v1/domains", body, f"domain {d['name']}")


    def apply_data_products() -> None:
        """OM 1.5 CreateDataProduct verwacht singular `domain` (string-name),
        niet `domains` array (die switch zit in 1.7+)."""
        mapping = _load_mapping()
        products = mapping.get("data_products", [])
        if not products:
            return
        log("Data Products seeden")
        for p in products:
            # Check dat de domain bestaat (anders 404).
            rd = requests.get(
                f"{OM_URL}/api/v1/domains/name/{p['domain']}",
                headers=HEADERS,
                timeout=10,
            )
            if rd.status_code != 200:
                log(f"  ! domain '{p['domain']}' niet gevonden — sla product {p['name']} over")
                continue
            owners = []
            ref = _team_ref(p["owner"]) if p.get("owner") else None
            if ref:
                owners.append(ref)
            body = {
                "name": p["name"],
                "displayName": p.get("displayName", p["name"]),
                "description": p["description"],
                "domain": p["domain"],
            }
            if owners:
                body["owners"] = owners
            post_or_skip(
                "/api/v1/dataProducts", body, f"dataProduct {p['name']}"
            )


    def _table_exists(fqn: str) -> bool:
        r = requests.get(
            f"{OM_URL}/api/v1/tables/name/{fqn}", headers=HEADERS, timeout=10
        )
        return r.status_code == 200


    def apply_test_suites() -> None:
        """Maak DQ-TestSuites + TestCases op gold-marts. OM 1.5 hardcoded
        de executable-suite FQN naar `<entityFQN>.testSuite`; de `name` uit
        yaml leeft alleen als displayName."""
        cfg = _load_test_suites()
        suites = cfg.get("test_suites", [])
        if not suites:
            return
        log("DQ TestSuites + TestCases toepassen")
        for s in suites:
            entity_fqn = s["entityFQN"]
            if not _table_exists(entity_fqn):
                log(
                    f"  ? table {entity_fqn} niet in OM — sla testSuite "
                    f"{s['name']} over (wacht op dbt-ingest)"
                )
                continue

            suite_body = {
                "name": s["name"],
                "displayName": s.get("displayName", s["name"]),
                "description": s.get("description", ""),
                "executableEntityReference": entity_fqn,
            }
            post_or_skip(
                "/api/v1/dataQuality/testSuites/executable",
                suite_body,
                f"testSuite {s['name']}",
            )

            suite_fqn = f"{entity_fqn}.testSuite"

            for tc in s.get("test_cases", []):
                column = tc.get("column")
                if column:
                    entity_link = (
                        f"<#E::table::{entity_fqn}::columns::{column}>"
                    )
                else:
                    entity_link = f"<#E::table::{entity_fqn}>"
                tc_body = {
                    "name": tc["name"],
                    "displayName": tc.get("displayName", tc["name"]),
                    "description": tc.get("description", ""),
                    "entityLink": entity_link,
                    "testDefinition": tc["testDefinition"],
                    "testSuite": suite_fqn,
                    "parameterValues": tc.get("parameters", []),
                }
                post_or_skip(
                    "/api/v1/dataQuality/testCases",
                    tc_body,
                    f"testCase {s['name']}.{tc['name']}",
                )


    def apply_alerts() -> None:
        """OM 1.5 CreateEventSubscription gebruikt top-level `resources` +
        `destinations` (geen `filteringRules`-wrapper)."""
        cfg = _load_test_suites()
        alerts = cfg.get("alerts", [])
        if not alerts:
            return
        log("Alerts (event-subscriptions) toepassen")
        for a in alerts:
            dst = a.get("destination", {})
            body = {
                "name": a["name"],
                "displayName": a.get("displayName", a["name"]),
                "description": a.get("description", ""),
                "alertType": a.get("alertType", "Notification"),
                "enabled": True,
                "resources": [a.get("resource", "all")],
                "destinations": [
                    {
                        "category": "External",
                        "type": dst.get("type", "Webhook"),
                        "config": {
                            "endpoint": dst.get("endpoint", ""),
                        },
                    }
                ],
            }
            post_or_skip(
                "/api/v1/events/subscriptions",
                body,
                f"alert {a['name']}",
            )


    def promote_bot_to_admin() -> None:
        """De `ingestion-bot` heeft default IngestionBotRole, wat user-token-
        rotatie verbiedt (403 op /users/generateToken). Bots mogen zichzelf
        ook niet via de OM-API tot admin promoveren ("Principal is not admin").
        Workaround: direct in de Postgres-DB `isAdmin=true` zetten. Vereist
        psycopg2 + POSTGRES_PASSWORD env (uit mysql-secrets, chart-quirk-naam).
        """
        log("Promote ingestion-bot tot admin (via Postgres-direct)")
        pg_pw = os.environ.get("POSTGRES_PASSWORD")
        if not pg_pw:
            log("  ? POSTGRES_PASSWORD niet gezet — sla bot-promote over")
            return
        try:
            import psycopg2  # noqa: F401  - pip-installed by Job entrypoint
        except ImportError:
            log("  ? psycopg2 niet geïnstalleerd — sla bot-promote over")
            return
        try:
            conn = psycopg2.connect(
                host=os.environ.get(
                    "POSTGRES_HOST",
                    "postgres-postgresql.uwv-data.svc.cluster.local",
                ),
                port=int(os.environ.get("POSTGRES_PORT", "5432")),
                user=os.environ.get("POSTGRES_USER", "uwvplatform"),
                password=pg_pw,
                dbname="openmetadata",
                connect_timeout=10,
            )
        except Exception as e:
            log(f"  ! Postgres-connectie faalde: {e}")
            return
        try:
            with conn, conn.cursor() as cur:
                cur.execute(
                    "UPDATE user_entity SET json = "
                    "jsonb_set(json::jsonb, '{isAdmin}', 'true'::jsonb) "
                    "WHERE name='ingestion-bot' "
                    "AND (json->>'isAdmin' IS DISTINCT FROM 'true');"
                )
                if cur.rowcount > 0:
                    log("  + ingestion-bot.isAdmin = true (Postgres update)")
                else:
                    log("  = ingestion-bot is al admin")
        finally:
            conn.close()


    def main() -> int:
        wait_for_om()
        apply_classifications()
        apply_glossary()
        apply_teams()
        apply_custom_properties()
        apply_domains()
        apply_data_products()
        apply_test_suites()
        apply_alerts()
        promote_bot_to_admin()
        log("Init voltooid.")
        return 0


    if __name__ == "__main__":
        sys.exit(main())

---
apiVersion: batch/v1
kind: Job
metadata:
  name: openmetadata-init
  namespace: uwv-meta
  labels:
    uwv.nl/component: openmetadata-init
    uwv.nl/dev-only: "true"
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 2
  template:
    metadata:
      labels:
        uwv.nl/component: openmetadata-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: python:3.11-slim
          command: ["bash", "-euo", "pipefail", "-c"]
          args:
            - |
              pip install --quiet --disable-pip-version-check requests pyyaml psycopg2-binary
              python /scripts/init_openmetadata.py
          env:
            - name: OM_URL
              value: "http://openmetadata.uwv-meta.svc.cluster.local:8585"
            - name: OM_JWT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openmetadata-admin
                  key: jwtToken
            # Postgres-direct toegang voor bot-promote (chart-quirk: het
            # OM-DB-secret heet `mysql-secrets` zelfs bij Postgres, met
            # key `openmetadata-mysql-password`).
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secrets
                  key: openmetadata-mysql-password
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: config
              mountPath: /config
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: scripts
          configMap:
            name: openmetadata-init-config
            items:
              - key: init_openmetadata.py
                path: init_openmetadata.py
        - name: config
          configMap:
            name: openmetadata-uwv-config
