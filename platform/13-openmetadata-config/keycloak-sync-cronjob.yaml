# Dagelijkse Keycloak → OM user-sync (improvements 5 — SCIM-stub).
#
# OM 1.5 heeft geen SCIM-provisioner; nieuwe Keycloak-users verschijnen pas
# in OM zodra ze inloggen. Voor owner-toewijzing en reviewer-mailings
# moeten ze ook zonder login zichtbaar zijn. Deze CronJob roept
# /config/keycloak_user_sync.py aan dat de realm-users idempotent in OM POSTet.
#
# Image hergebruikt openmetadata/ingestion:1.5.7 (Python + requests).
# Bitnami Keycloak chart bootstrappet admin onder USERNAME `kcadmin`
# (verifieer met `kubectl -n uwv-auth exec sts/keycloak -- env | grep ADMIN`).
# Het admin-password secret zit in NS `uwv-auth` als `keycloak` →
# `admin-password`; bootstrap spiegelt het naar uwv-meta als
# `keycloak-admin-secret` zodat de CronJob het kan lezen.
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: keycloak-om-user-sync
  namespace: uwv-meta
  labels:
    uwv.nl/component: keycloak-om-sync
spec:
  schedule: "30 3 * * *"      # 03:30 UTC daily — low-traffic window
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      backoffLimit: 1
      template:
        metadata:
          labels:
            uwv.nl/component: keycloak-om-sync
        spec:
          restartPolicy: OnFailure
          containers:
            - name: sync
              image: openmetadata/ingestion:1.5.7
              command: ["bash", "-c"]
              args:
                - "python /config/keycloak_user_sync.py"
              env:
                - name: OM_URL
                  value: "http://openmetadata.uwv-meta.svc.cluster.local:8585"
                - name: OM_JWT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: openmetadata-admin
                      key: jwtToken
                # Cluster-internal Keycloak Service zit in uwv-auth (Helm-
                # release `keycloak`). HTTP (port 80) cluster-intern — geen
                # TLS-cert nodig binnen het cluster.
                - name: KEYCLOAK_URL
                  value: "http://keycloak.uwv-auth.svc.cluster.local"
                - name: KEYCLOAK_REALM
                  value: "uwv"
                - name: KEYCLOAK_ADMIN_USER
                  value: "kcadmin"
                - name: KEYCLOAK_ADMIN_PW
                  valueFrom:
                    secretKeyRef:
                      name: keycloak-admin-secret
                      key: admin-password
                - name: REQUESTS_CA_BUNDLE
                  value: /etc/uwv-ca/ca.crt
                - name: SSL_CERT_FILE
                  value: /etc/uwv-ca/ca.crt
              volumeMounts:
                - name: config
                  mountPath: /config
                  readOnly: true
                - name: uwv-ca
                  mountPath: /etc/uwv-ca
                  readOnly: true
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
          volumes:
            - name: config
              configMap:
                name: openmetadata-uwv-config
            - name: uwv-ca
              configMap:
                name: uwv-ca-bundle
