# Ingress voor OpenSearch Dashboards (poort 5601) — de browser-UI tegenover
# de single-node OpenSearch in uwv-meta. De REST-API zelf (port 9200) blijft
# alleen intern bereikbaar via opensearch-uwv.uwv-meta.svc.cluster.local
# (Vector, OpenMetadata en de ILM-job gebruiken die service-DNS direct).
# Geen auth — security is uit voor dev (zie infrastructure/helm/opensearch/values.yaml).
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opensearch
  namespace: uwv-meta
  annotations:
    cert-manager.io/cluster-issuer: uwv-platform-issuer
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["opensearch.uwv-platform.local"]
      secretName: opensearch-tls
  rules:
    - host: opensearch.uwv-platform.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: opensearch-dashboards-uwv
                port:
                  number: 5601
