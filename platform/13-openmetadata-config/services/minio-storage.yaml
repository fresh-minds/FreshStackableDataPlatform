# MinIO als OM StorageService (S3-compatible). Catalogiseert de UWV-buckets
# (uwv-bronze / uwv-silver / uwv-meta / uwv-staging) zodat ze browseable
# zijn vanuit OM en koppelbaar aan dbt-models en Spark-pipelines.
#
# OM 1.5+ ondersteunt het S3 connector-type; `containerFilterPattern.includes`
# beperkt de scope (anders ziet OM ook MinIO interne system-buckets).
# CloudWatch GetMetrics is optioneel en faalt op MinIO (geen STS) — OM
# negeert dat en gaat door.
---
source:
  type: s3
  serviceName: uwv-minio
  serviceConnection:
    config:
      type: S3
      awsConfig:
        awsAccessKeyId: uwvadmin
        awsSecretAccessKey: ${MINIO_SECRET_KEY}
        awsRegion: eu-nl-1
        endPointURL: https://minio.uwv-platform.svc.cluster.local:9000
  sourceConfig:
    config:
      type: StorageMetadata
      containerFilterPattern:
        includes:
          - uwv-bronze
          - uwv-silver
          - uwv-meta
          - uwv-staging
sink:
  type: metadata-rest
  config: {}
workflowConfig:
  loggerLevel: INFO
  openMetadataServerConfig:
    hostPort: http://openmetadata.uwv-meta.svc.cluster.local:8585/api
    authProvider: openmetadata
    securityConfig:
      jwtToken: ${OM_JWT_TOKEN}
