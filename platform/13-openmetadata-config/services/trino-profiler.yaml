# Trino profiler — kolom-statistieken (null-fractie, distinct count, value distribution).
# UC-07 anchor: bron voor datakwaliteits-dashboard.
---
source:
  type: trino
  serviceName: uwv-trino
  sourceConfig:
    config:
      type: Profiler
      # 5% sample i.p.v. 30%: profiler-runs van >5min crashen de Airflow
      # executor-pod (state mismatch op de Airflow 3 SDK heartbeat) en
      # zetten de shared Postgres onder druk. Voor een synthetic-data
      # reference-platform is een lichtere sample voldoende om
      # null-fractie + distinct-count + value-distribution te demonstreren.
      profileSample: 5
      # Auto-PII-classification is GEEN onderdeel meer van Profiler in
      # OM 1.5+ (incl. 1.12.8). `processPiiSensitive` faalt overal — zowel
      # onder sourceConfig.config als onder processor.config — met
      # "Extra parameter 'processPiiSensitive'". OM heeft het verplaatst
      # naar een eigen `AutoClassification` workflow (`metadata classify`).
      # Voor UWV-platform reference: zie roadmap voor losse AutoClassification-
      # DAG; nu valt PII-tagging op handmatige tag-assignment via dbt-meta-
      # mapping (zie 13-openmetadata-config/dbt-meta-mapping.yaml en de
      # enrich_om_from_dbt_meta.py-stap in deze DAG).
      # `generateSampleData` is verwijderd in OM 1.6+
      # Schema-filter beperkt tot de schemas die echt data hebben in de
      # synthetic-load — voorkomt verloren tijd op lege schemas en
      # houdt de OM-PATCH-volume binnen wat de shared Postgres trekt.
      schemaFilterPattern:
        includes:
          # Silver staging (anchor-domains met substantieel volume)
          - persoon
          - polisadm
          - intermediate
          # Gold UC marts (UC11 = primary klantreis-anchor; UC07 = DQ)
          - uc11_klantreis
          - uc07_dq_polisadm
processor:
  type: orm-profiler
  config: {}
sink:
  type: metadata-rest
  config: {}
workflowConfig:
  loggerLevel: INFO
  openMetadataServerConfig:
    hostPort: http://openmetadata.uwv-meta.svc.cluster.local:8585/api
    authProvider: openmetadata
    securityConfig:
      jwtToken: ${OM_JWT_TOKEN}
