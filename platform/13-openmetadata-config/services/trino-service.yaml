# OpenMetadata Trino service-connection + ingestion-workflow.
#
# Wordt door de init-Job toegepast via `metadata ingest -c trino-service.yaml`.
# Schema-filter dekt alle UWV-catalogs (bronze/silver/gold/sensitive).
#
# JWT-token komt uit Secret openmetadata-admin (env-substitutie in Job).
---
source:
  type: trino
  serviceName: uwv-trino
  serviceConnection:
    config:
      type: Trino
      hostPort: uwv-trino-coordinator.uwv-platform.svc.cluster.local:8443
      username: smoketest
      # Stackable's Trino draait met `authentication: []` — geen password-
      # authenticator. Auth komt via X-Trino-User header (impersonation),
      # autorisatie via OPA. Daarom GEEN authType.password hier; de DBAPI
      # gebruikt dan alleen de username-header.
      # `catalog:` bewust niet gezet — we willen alle medallion-zones zien;
      # de databaseFilterPattern hieronder beperkt het.
      verify: "False"
      connectionArguments:
        http_scheme: https
  sourceConfig:
    config:
      type: DatabaseMetadata
      databaseFilterPattern:
        includes:
          - bronze
          - silver
          - gold
          - sensitive
      schemaFilterPattern:
        includes:
          - uwv                       # bronze
          - persoon
          - polisadm
          - ww
          - wia
          - wajong
          - zw
          - crm
          - fez
          - klantcontact
          - intermediate              # silver
          - uc01_wia_funnel           # gold
          - uc04_tw_eligibility
          - uc05_client_360
          - uc06_lastprognose
          - uc07_dq_polisadm
          - uc09_reint_effect
          - uc11_klantreis
          - uc_klant_tev
          - dq_overview
          - seed
      includeTables: true
      includeViews: true
      markDeletedTables: true
sink:
  type: metadata-rest
  config: {}
workflowConfig:
  loggerLevel: INFO
  openMetadataServerConfig:
    hostPort: http://openmetadata.uwv-meta.svc.cluster.local:8585/api
    authProvider: openmetadata
    securityConfig:
      jwtToken: ${OM_JWT_TOKEN}
