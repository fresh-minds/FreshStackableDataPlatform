# dbt-workflow — leest manifest.json + catalog.json + run_results.json
# uit s3://uwv-meta/dbt/<run_id>/ en koppelt:
#   - dbt-models aan Trino-tables (lineage)
#   - dbt-tests aan OpenMetadata data-quality
#   - dbt-meta (legal_basis, doelbinding, ...) aan OpenMetadata-tags via auto-classification
#
# Productie: één run-id per dbt-run; airflow DAG `om_ingest_dbt.py` kiest de
# juiste prefix per scheduled run.
---
source:
  type: dbt
  serviceName: uwv-trino   # dbt-models worden gekoppeld aan deze Trino-service
  sourceConfig:
    config:
      type: DBT
      dbtConfigSource:
        dbtConfigType: s3
        dbtSecurityConfig:
          awsAccessKeyId: uwvadmin
          awsSecretAccessKey: ${MINIO_SECRET_KEY}
          awsRegion: eu-nl-1
          endPointURL: http://minio.uwv-platform.svc.cluster.local:9000
        dbtPrefixConfig:
          dbtBucketName: uwv-meta
          dbtObjectPrefix: dbt/latest/
sink:
  type: metadata-rest
  config: {}
workflowConfig:
  loggerLevel: INFO
  openMetadataServerConfig:
    hostPort: http://openmetadata.uwv-meta.svc.cluster.local:8585/api
    authProvider: openmetadata
    securityConfig:
      jwtToken: ${OM_JWT_TOKEN}
