# Superset dashboard-ingestion. Levert dashboards + charts + lineage naar
# Trino-tabellen.
---
source:
  type: superset
  serviceName: uwv-superset
  serviceConnection:
    config:
      type: Superset
      hostPort: http://uwv-superset-node.uwv-platform.svc.cluster.local:8088
      connection:
        provider: db
        # Superset application-admin (zie platform/01-secrets/dev-secrets.yaml
        # secret superset-postgres-credentials → adminUser.username/password).
        # NIET de Postgres-user 'uwvplatform' — die is voor de SQLAlchemy-DB.
        username: admin
        password: ${SUPERSET_ADMIN_PW}
  sourceConfig:
    config:
      type: DashboardMetadata
      dashboardFilterPattern:
        includes: [".*"]
      # Resolve Superset-datasets → echte Trino-tabellen zodat charts in OM
      # lineage krijgen naar `gold.uc11_klantreis.*` (en andere UC-marts).
      # In OM 1.5+ is dit een GENEST veld onder `lineageInformation` — niet
      # direct onder `config` (anders: "Extra parameter 'dbServiceNames'").
      lineageInformation:
        dbServiceNames:
          - uwv-trino
sink:
  type: metadata-rest
  config: {}
workflowConfig:
  loggerLevel: INFO
  openMetadataServerConfig:
    hostPort: http://openmetadata.uwv-meta.svc.cluster.local:8585/api
    authProvider: openmetadata
    securityConfig:
      jwtToken: ${OM_JWT_TOKEN}
