# Kafka topics-ingestion. Topics worden zichtbaar als "messaging-service".
---
source:
  type: kafka
  serviceName: uwv-kafka
  serviceConnection:
    config:
      type: Kafka
      # Stackable Kafka 26.3 service-naam is `uwv-kafka-broker-default-bootstrap`
      # (rolGroup `default` in de naam) — luistert SSL op 9093.
      bootstrapServers: uwv-kafka-broker-default-bootstrap.uwv-platform.svc.cluster.local:9093
      securityProtocol: SSL
      # Stackable secret-class `tls` heeft een eigen self-signed CA per cluster.
      # Schakel cert-verification uit voor dev (in productie: Stackable CA in
      # truststore mounten en `ssl.ca.location` zetten).
      consumerConfig:
        enable.ssl.certificate.verification: "false"
        ssl.endpoint.identification.algorithm: "none"
  sourceConfig:
    config:
      type: MessagingMetadata
      topicFilterPattern:
        includes:
          - "uwv\\..*"
sink:
  type: metadata-rest
  config: {}
workflowConfig:
  loggerLevel: INFO
  openMetadataServerConfig:
    hostPort: http://openmetadata.uwv-meta.svc.cluster.local:8585/api
    authProvider: openmetadata
    securityConfig:
      jwtToken: ${OM_JWT_TOKEN}
