# In-cluster route voor https://keycloak.uwv-platform.local:8443
#
# Pods (MinIO/Trino/Superset/Airflow/NiFi/OpenMetadata) doen OIDC-discovery
# tegen de externe URL die Keycloak adverteert
# (KC_HOSTNAME=https://keycloak.uwv-platform.local:8443). De host-port 8443
# is host-only — pods kunnen daar niet bij.
#
# Deze Service maakt `keycloak.uwv-platform.local:8443` in-cluster routeerbaar
# door port 8443 → 443 te mappen naar ingress-nginx-controller pods (via
# selector, dus auto-discovery, robuust tegen pod-restart).
#
# Hoort in `ingress-nginx` namespace omdat selectors alleen pods in dezelfde
# namespace matchen. Ingress-nginx routeert vervolgens de Host-header
# (keycloak.uwv-platform.local) naar de Keycloak Service in uwv-auth.
#
# CoreDNS hosts override pinnt `keycloak.uwv-platform.local` op deze ClusterIP
# (zie scripts/aks-deploy.sh of full-deploy.sh — runtime patch nodig omdat
# ClusterIP per cluster verschilt).
apiVersion: v1
kind: Service
metadata:
  name: keycloak-external
  namespace: ingress-nginx
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/component: controller
  ports:
    - name: https
      port: 8443
      targetPort: 443
      protocol: TCP
