# SecretClass voor de interne self-signed CA-bundle.
#
# Hostname-verification van Keycloak's OIDC-endpoint (vanaf Trino/Superset/etc.)
# vereist dat de pod het CA-cert kent. We laten cert-manager de CA tekenen en
# kopieren het CA-cert in een Secret die deze SecretClass leest.
#
# De feitelijke kopie gebeurt door een trust-manager (cert-manager) bundle of
# een eenvoudige Job; voor referentie: het cert-manager-CA-secret in
# `cert-manager` namespace bevat `ca.crt` als veld.
#
# In een schoner scenario: cert-manager's trust-manager Bundle distribueert
# de CA naar alle namespaces als een ConfigMap; we kunnen die dan via
# k8sSearch (configMap backend) ontsluiten. Voor referentie houden we het bij
# een handmatige Secret-kopie via bootstrap.
---
apiVersion: secrets.stackable.tech/v1alpha1
kind: SecretClass
metadata:
  name: tls-internal
spec:
  backend:
    # autoTls: secret-operator genereert self-signed CA + per-pod certs.
    # k8sSearch backend vereist een out-of-band proces dat secrets met het
    # juiste label kopieert — voor referentie-impl is autoTls voldoende.
    autoTls:
      ca:
        autoGenerate: true
        secret:
          name: tls-internal-ca
          namespace: uwv-platform
