# Stackable AuthenticationClass voor Keycloak OIDC.
#
# Wordt gerefereerd door TrinoCluster, SupersetCluster, AirflowCluster,
# NiFiCluster (en eventueel Druid). De provider-spec OIDC volgt ADR032
# in Stackable's design-docs.
#
# Hostname/poort komen overeen met Helm-deployed Keycloak + ingress-nginx
# (port 8443 op de host loopt naar ingress-nginx → Keycloak).
#
# Voor in-cluster service-discovery zou je `keycloak.uwv-auth.svc.cluster.local`
# kiezen, maar OIDC-redirects worden door de browser uitgevoerd; daarom is
# het externe DNS-pad nodig (hostname must match issuer URL in tokens).
#
# Productie: TLS verplicht, hier voor dev uitgeschakeld op de internal
# AuthenticationClass; ingress-nginx termineert de TLS aan de buitenkant.
---
apiVersion: authentication.stackable.tech/v1alpha1
kind: AuthenticationClass
metadata:
  name: keycloak-uwv
spec:
  provider:
    oidc:
      # In-cluster service-DNS voor server-side OIDC discovery.
      # Keycloak draait met proxy=edge + hostname=keycloak.uwv-platform.local
      # (zie helm/keycloak/values.yaml) zodat issuer-claim de externe URL
      # blijft — browser-redirects gaan dus naar de externe ingress.
      # Pod kan keycloak.uwv-platform.local niet resolveren (k3d /etc/hosts
      # zit alleen op de host) → daarom de svc.cluster.local-naam.
      hostname: keycloak.uwv-auth.svc.cluster.local
      port: 80
      rootPath: /realms/uwv
      principalClaim: preferred_username
      scopes:
        - openid
        - profile
        - email
        - roles
      providerHint: Keycloak
      # tls weggehaald: in-cluster naar Keycloak is HTTP. Productie zou via
      # service-mesh of een interne TLS-cert wel TLS aan kunnen zetten.
