# SupersetCluster — BI / dashboarding.
#
# Auth: OIDC via keycloak-uwv. UWV-rollen → Superset-rollen via syncRolesAt: Login.
# Database backend: gedeelde Postgres `superset` DB.
# Trino-registratie + datasets gebeuren via een post-deploy init-Job
# (zie init-job.yaml).
---
apiVersion: superset.stackable.tech/v1alpha1
kind: SupersetCluster
metadata:
  name: uwv-superset
  namespace: uwv-platform
spec:
  image:
    productVersion: "4.1.4"
  clusterConfig:
    # 26.3: listenerClass + loadExamplesOnInit uit clusterConfig.
    credentialsSecret: superset-postgres-credentials
    authentication:
      - authenticationClass: keycloak-uwv
        oidc:
          clientCredentialsSecret: superset-oidc-client
        userRegistration: true
        userRegistrationRole: Public
        syncRolesAt: Login
  nodes:
    roleConfig:
      listenerClass: cluster-internal
    config:
      logging:
        enableVectorAgent: false
      resources:
        cpu:
          min: "100m"
          max: "1000m"
        memory:
          limit: "1Gi"
    # ENABLE_PROXY_FIX laat Superset X-Forwarded-Proto/Host respecteren
    # (https i.p.v. http). WEBSERVER_BASE_URL hardcodet :8443 want
    # ingress-nginx propageert geen X-Forwarded-Port standaard, en k3d
    # mapt host:8443 → cluster:443. Zonder dit blijft :8443 weg uit
    # redirect_uri → browser landt op port 443 die niet luistert.
    configOverrides:
      superset_config.py:
        ENABLE_PROXY_FIX: "True"
        WEBSERVER_BASE_URL: '"https://superset.uwv-platform.local:8443"'
        # Custom SecurityManager: vangt None-user op (stale session cookie
        # na DB-reset) zodat Flask-Login naar /login redirect i.p.v. 500.
        # Module komt uit superset-extra-config ConfigMap, gemount op
        # /stackable/uwv-extras (zie podOverrides). We kunnen
        # /stackable/app/pythonpath niet gebruiken: een subPath-mount daar
        # zou Stackable's startup-cp van log_config.py blokkeren. In
        # plaats van een tweede statement (configOverrides accepteert
        # alleen KEY = VALUE per regel) gebruiken we een 1-expressie-
        # truc: list.insert() returnt None, en `None or X` evalueert
        # tot X — dus sys.path-mutatie als side-effect, daarna import.
        CUSTOM_SECURITY_MANAGER: "(__import__('sys').path.insert(0, '/stackable/uwv-extras') or __import__('uwv_security').UWVSecurityManager)"
    envOverrides:
      # Pad naar uwv-platform-CA bundle (zie podOverrides volume mount).
      # Python's requests-lib (gebruikt door Authlib voor OAuth token-
      # exchange) leest deze om de cert-manager self-signed CA te
      # vertrouwen voor https://keycloak.uwv-platform.local:8443.
      REQUESTS_CA_BUNDLE: "/etc/uwv-ca/ca.crt"
      SSL_CERT_FILE: "/etc/uwv-ca/ca.crt"
    roleGroups:
      default:
        replicas: 1
        podOverrides:
          spec:
            containers:
              - name: superset
                volumeMounts:
                  - name: uwv-ca
                    mountPath: /etc/uwv-ca
                    readOnly: true
                  - name: uwv-extra
                    mountPath: /stackable/uwv-extras
                    readOnly: true
            volumes:
              - name: uwv-ca
                configMap:
                  name: uwv-ca-bundle
              - name: uwv-extra
                configMap:
                  name: superset-extra-config
