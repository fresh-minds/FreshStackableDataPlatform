# Extra Python-module voor Superset, gemount op PYTHONPATH naast superset_config.py.
#
# Waarom: FAB's default load_user() crasht met
#   AttributeError: 'NoneType' object has no attribute 'is_active'
# wanneer een browser-session-cookie verwijst naar een user_id dat niet
# meer in de DB bestaat (bv. na een DB-reset / her-seed). Resultaat: 500
# Internal Server Error op /superset/welcome/ tot de gebruiker handmatig
# z'n cookies wist. Onze override geeft None terug → Flask-Login redirect
# netjes naar /login/.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: superset-extra-config
  namespace: uwv-platform
data:
  uwv_security.py: |
    import jwt as pyjwt

    from superset.security import SupersetSecurityManager


    class UWVSecurityManager(SupersetSecurityManager):
        # Stale-cookie veilig: FAB's default load_user() crasht met
        # AttributeError op user.is_active als de pk niet meer bestaat
        # (na DB-reset). Wij geven None terug → Flask-Login redirect
        # naar /login.
        def load_user(self, pk):
            user = self.get_user_by_id(int(pk))
            if user is not None and user.is_active:
                return user
            return None

        # Break-glass: hardcoded mapping voor de platform.admin user.
        # Geldt ook als realm_access.roles ontbreekt in het JWT (kan
        # gebeuren met bepaalde Keycloak client-scope configuraties).
        # Tezamen met AUTH_ROLES_SYNC_AT_LOGIN=True (uit Stackable's
        # syncRolesAt: Login) zorgt dit dat platform.admin bij ELKE login
        # opnieuw Admin-rechten in Superset krijgt — robuust voor zowel
        # eerste login als na cluster-shutdown/startup.
        BREAK_GLASS_USERS = {"platform.admin"}

        # Map Keycloak realm_access.roles → role_keys zodat
        # AUTH_ROLES_MAPPING de mapping naar Superset-rollen kan doen
        # (bv. platform_admin → Admin). Keycloak stopt realm-roles in
        # `realm_access.roles` in het access_token JWT; FAB pakt die
        # niet automatisch uit, dus doen we het hier.
        def get_oauth_user_info(self, provider, response):
            if provider != "keycloak":
                return super().get_oauth_user_info(provider, response)
            access_token = response.get("access_token") or ""
            try:
                claims = pyjwt.decode(
                    access_token, options={"verify_signature": False}
                )
            except Exception:
                claims = {}
            roles = (claims.get("realm_access") or {}).get("roles") or []
            username = claims.get("preferred_username", "")
            # Break-glass: forceer platform_admin rol voor de hardcoded
            # username, ongeacht wat in het JWT staat. Beschermt tegen
            # client-scope misconfiguraties die realm_access weglaten.
            if username in self.BREAK_GLASS_USERS and "platform_admin" not in roles:
                roles = roles + ["platform_admin"]
            return {
                "username": username,
                "email": claims.get("email", ""),
                "first_name": claims.get("given_name", ""),
                "last_name": claims.get("family_name", ""),
                "role_keys": roles,
            }
