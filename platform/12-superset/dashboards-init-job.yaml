# Improvements #13 — Superset WIA Funnel-dashboard via API.
#
# Volgt na de bestaande superset-init Job. Maakt 3 charts + 1 dashboard
# tegen de Trino-database via REST API. Idempotent: skipt als naam reeds
# bestaat.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: superset-dashboards-init-script
  namespace: uwv-platform
data:
  build_dashboards.py: |
    """Bouw WIA Funnel-dashboard programmatisch in Superset."""
    import json
    import os
    import sys
    import time
    from typing import List, Optional, Tuple
    from urllib.parse import urljoin

    import requests

    SUPERSET_URL = os.environ.get("SUPERSET_URL", "http://uwv-superset-node:8088")
    ADMIN_USER = os.environ.get("ADMIN_USER", "uwvplatform")
    ADMIN_PW   = os.environ["ADMIN_PASSWORD"]
    DATASET_NAME = os.environ.get("WIA_DATASET", "mart_uc01_wia_funnel_daily")


    def log(m): print(f"[dash] {m}", flush=True)


    def login() -> requests.Session:
        s = requests.Session()
        r = s.post(urljoin(SUPERSET_URL, "/api/v1/security/login"),
                   json={"username": ADMIN_USER, "password": ADMIN_PW,
                         "provider": "db", "refresh": True})
        r.raise_for_status()
        s.headers["Authorization"] = f"Bearer {r.json()['access_token']}"
        r = s.get(urljoin(SUPERSET_URL, "/api/v1/security/csrf_token/"))
        r.raise_for_status()
        s.headers["X-CSRFToken"] = r.json()["result"]
        return s


    def get_dataset_id(s, name: str) -> int:
        r = s.get(urljoin(SUPERSET_URL, "/api/v1/dataset/"),
                  params={"q": f"(filters:!((col:table_name,opr:eq,value:{name})))"})
        r.raise_for_status()
        results = r.json().get("result", [])
        if not results:
            sys.exit(f"FAIL: dataset {name} niet gevonden — run superset-init Job eerst.")
        return results[0]["id"]


    def find_chart_id(s, slice_name: str) -> Optional[int]:
        r = s.get(urljoin(SUPERSET_URL, "/api/v1/chart/"),
                  params={"q": f"(filters:!((col:slice_name,opr:eq,value:{slice_name})))"})
        if r.status_code == 200 and r.json().get("count", 0) > 0:
            return r.json()["result"][0]["id"]
        return None


    def build_query_context(dataset_id: int, viz_type: str, params: dict) -> str:
        """Genereer een query_context voor een chart.

        Superset 4.x weigert chart-data renderen als `query_context` leeg
        is ("Chart has no query context saved. Please save the chart
        again."). Normaal vult de UI dit bij elk save; bij API-creatie
        moeten we het zelf zetten. Eén query met de metrics/groupby/time
        uit `params` is genoeg voor line/pie/big_number_total.
        """
        # `metric` (single) en `metrics` (list) moeten allebei in de
        # query als list. big_number_total gebruikt `metric` (single).
        metrics = params.get("metrics", [])
        if not metrics and params.get("metric"):
            metrics = [params["metric"]]

        query = {
            "filters": [],
            "extras": {"having": "", "where": ""},
            "applied_time_extras": {},
            "columns": params.get("groupby", []),
            "metrics": metrics,
            "annotation_layers": [],
            "row_limit": params.get("row_limit", 1000),
            "series_limit": 0,
            "order_desc": True,
            "url_params": {},
            "custom_params": {},
            "custom_form_data": {},
        }
        if params.get("granularity_sqla"):
            query["granularity"] = params["granularity_sqla"]
            query["time_grain_sqla"] = params.get("time_grain_sqla", "P1D")
            # is_timeseries triggert tijd-buckets in de query; zonder dit
            # vouwt Superset alle rijen samen tot 1 totaal-meting (line
            # chart toont dan 1 punt). Tijdsbereik = "no filter" zodat de
            # historische data zichtbaar is in dit dev-dataset.
            query["is_timeseries"] = True
            query["time_range"] = "No filter"
            query["columns"] = [{
                "timeGrain": params.get("time_grain_sqla", "P1D"),
                "columnType": "BASE_AXIS",
                "sqlExpression": params["granularity_sqla"],
                "label": params["granularity_sqla"],
                "expressionType": "SQL",
            }]

        return json.dumps({
            "datasource": {"id": dataset_id, "type": "table"},
            "force": False,
            "queries": [query],
            "form_data": {**params, "datasource": f"{dataset_id}__table"},
            "result_format": "json",
            "result_type": "full",
        })


    def create_chart(s, dataset_id: int, slice_name: str, viz_type: str,
                     params: dict) -> int:
        existing = find_chart_id(s, slice_name)
        if existing:
            log(f"  = chart '{slice_name}' bestaat (id={existing})")
            return existing
        body = {
            "datasource_id": dataset_id,
            "datasource_type": "table",
            "viz_type": viz_type,
            "slice_name": slice_name,
            "params": json.dumps(params),
            "query_context": build_query_context(dataset_id, viz_type, params),
        }
        r = s.post(urljoin(SUPERSET_URL, "/api/v1/chart/"), json=body)
        if r.status_code not in (200, 201):
            log(f"  ! chart create failed: {r.status_code} {r.text[:200]}")
            r.raise_for_status()
        cid = r.json()["id"]
        log(f"  + chart '{slice_name}' (id={cid})")
        return cid


    def find_dashboard_id(s, slug: str) -> Optional[int]:
        # Zoek op slug (unique key, geen spaties → rison-safe).
        # Bug-historie: zoeken op `dashboard_title` met spaties in de
        # waarde liet de rison-filter falen → script vond bestaand
        # dashboard niet en POST'te opnieuw → 422 slug-conflict.
        r = s.get(urljoin(SUPERSET_URL, "/api/v1/dashboard/"),
                  params={"q": f"(filters:!((col:slug,opr:eq,value:{slug})))"})
        if r.status_code == 200 and r.json().get("count", 0) > 0:
            return r.json()["result"][0]["id"]
        return None


    def build_position_json(charts: List[Tuple[int, str]]) -> str:
        """Bouw een Superset dashboard layout-tree (12-kolom grid).

        Eén CHART per ROW, full-width (12 cols). Geeft een geldige tree
        met ROOT → GRID → ROW(s) → CHART(s). Zonder dit blijft de canvas
        leeg ook al staan de slices in de M2M-tabel, want het frontend
        leest position_json om de chart-componenten te plaatsen.
        """
        layout = {
            "DASHBOARD_VERSION_KEY": "v2",
            "ROOT_ID": {"type": "ROOT", "id": "ROOT_ID", "children": ["GRID_ID"]},
            "GRID_ID": {
                "type": "GRID", "id": "GRID_ID", "children": [],
                "parents": ["ROOT_ID"],
            },
        }
        for idx, (chart_id, slice_name) in enumerate(charts):
            row_id = f"ROW-{idx + 1}"
            chart_block_id = f"CHART-{idx + 1}"
            layout["GRID_ID"]["children"].append(row_id)
            layout[row_id] = {
                "type": "ROW", "id": row_id, "children": [chart_block_id],
                "parents": ["ROOT_ID", "GRID_ID"],
                "meta": {"background": "BACKGROUND_TRANSPARENT"},
            }
            layout[chart_block_id] = {
                "type": "CHART", "id": chart_block_id, "children": [],
                "parents": ["ROOT_ID", "GRID_ID", row_id],
                "meta": {
                    "chartId": chart_id,
                    "width": 12,
                    "height": 50,
                    "sliceName": slice_name,
                },
            }
        return json.dumps(layout)


    def upsert_dashboard(s, title: str, slug: str,
                         charts: List[Tuple[int, str]]) -> int:
        """Maak of update dashboard met slices + position_json.

        Idempotent: bestaand dashboard wordt ook ge-PUT zodat charts +
        layout altijd in sync zijn met dit script.
        """
        chart_ids = [c[0] for c in charts]
        position_json = build_position_json(charts)

        did = find_dashboard_id(s, slug)
        if did is None:
            r = s.post(urljoin(SUPERSET_URL, "/api/v1/dashboard/"),
                       json={"dashboard_title": title, "slug": slug, "published": True})
            r.raise_for_status()
            did = r.json()["id"]
            log(f"  + dashboard '{title}' (id={did})")
        else:
            log(f"  = dashboard '{title}' bestaat (id={did}); update layout")

        # 1. Koppel elke chart aan dit dashboard via chart-PUT.
        #    Dashboard-PUT accepteert geen `slices` (read-only); de M2M
        #    moet via /api/v1/chart/{id} met `dashboards: [...]`.
        for cid in chart_ids:
            r = s.put(urljoin(SUPERSET_URL, f"/api/v1/chart/{cid}"),
                      json={"dashboards": [did]})
            if r.status_code != 200:
                log(f"  ! chart {cid} → dashboard {did}: "
                    f"{r.status_code} {r.text[:200]}")
                r.raise_for_status()

        # 2. Zet de canvas-layout. Zonder position_json blijft de
        # dashboard-pagina leeg, ook al staan de slices in de M2M-tabel.
        r = s.put(urljoin(SUPERSET_URL, f"/api/v1/dashboard/{did}"),
                  json={"position_json": position_json})
        if r.status_code != 200:
            log(f"  ! dashboard {did} layout PUT: "
                f"{r.status_code} {r.text[:300]}")
            r.raise_for_status()
        log(f"  ✓ {len(chart_ids)} charts gekoppeld + layout gezet")
        return did


    def main() -> int:
        log(f"Wachten op Superset...")
        for _ in range(60):
            try:
                if requests.get(urljoin(SUPERSET_URL, "/health"), timeout=5).status_code == 200:
                    break
            except requests.RequestException:
                pass
            time.sleep(5)

        s = login()
        ds_id = get_dataset_id(s, DATASET_NAME)
        log(f"Dataset id: {ds_id}")

        # Chart 1: line — aanvragen per dag
        c1 = create_chart(s, ds_id, "WIA aanvragen per dag", "line", {
            "datasource": f"{ds_id}__table",
            "viz_type": "line",
            "granularity_sqla": "aanvraag_datum",
            "time_grain_sqla": "P1D",
            "metrics": [{
                "expressionType": "SIMPLE",
                "column": {"column_name": "n_aanvragen", "type": "INTEGER"},
                "aggregate": "SUM",
                "label": "Aanvragen",
            }],
            "groupby": [],
            "row_limit": 1000,
        })

        # Chart 2: pie — verdeling per status
        c2 = create_chart(s, ds_id, "WIA aanvragen per status", "pie", {
            "datasource": f"{ds_id}__table",
            "viz_type": "pie",
            "metrics": [{
                "expressionType": "SIMPLE",
                "column": {"column_name": "n_aanvragen", "type": "INTEGER"},
                "aggregate": "SUM",
                "label": "Aanvragen",
            }],
            "groupby": ["status"],
            "row_limit": 1000,
        })

        # Chart 3: big number — totaal aanvragen
        c3 = create_chart(s, ds_id, "Totaal WIA aanvragen", "big_number_total", {
            "datasource": f"{ds_id}__table",
            "viz_type": "big_number_total",
            "metric": {
                "expressionType": "SIMPLE",
                "column": {"column_name": "n_aanvragen", "type": "INTEGER"},
                "aggregate": "SUM",
                "label": "Totaal",
            },
        })

        # Volgorde bepaalt de visuele top-naar-onder layout in het dashboard.
        upsert_dashboard(s, "WIA Funnel", "wia-funnel", [
            (c3, "Totaal WIA aanvragen"),
            (c1, "WIA aanvragen per dag"),
            (c2, "WIA aanvragen per status"),
        ])
        log("Klaar.")
        return 0


    if __name__ == "__main__":
        sys.exit(main())

---
apiVersion: batch/v1
kind: Job
metadata:
  name: superset-dashboards-init
  namespace: uwv-platform
  labels:
    uwv.nl/component: superset-dashboards-init
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 2
  template:
    metadata:
      labels:
        uwv.nl/component: superset-dashboards-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: build-dashboards
          image: python:3.11-slim
          command: ["bash", "-euo", "pipefail", "-c"]
          args:
            - |
              pip install --quiet --disable-pip-version-check requests
              python /scripts/build_dashboards.py
          env:
            - name: SUPERSET_URL
              value: "http://uwv-superset-node:8088"
            - name: ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: superset-postgres-credentials
                  key: adminUser.username
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: superset-postgres-credentials
                  key: adminUser.password
            - name: WIA_DATASET
              value: "mart_uc01_wia_funnel_daily"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: scripts
          configMap:
            name: superset-dashboards-init-script
