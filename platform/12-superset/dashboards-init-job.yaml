                        "color_scheme": "preset_ui_1",
                        "show_legend": True,
                    }, {"width": 6, "height": 50}),
                    ("Nieuwe fases per maand", "line", {
                        "granularity_sqla": "fase_start_ts",
                        "time_grain_sqla": "P1M",
                        "metrics": [{"expressionType": "SIMPLE",
                                     "column": {"column_name": "bsn", "type": "VARCHAR"},
                                     "aggregate": "COUNT",
                                     "label": "Fase-starts"}],
                        "groupby": ["fase"],
                        "color_scheme": "preset_ui_1",
                        "show_legend": True,
                    }, {"dataset": "mart_uc11_klantreis_phases",
                        "width": 6, "height": 50}),

                    # ── Rij 3: Distributie ── (3 × width 4)
                    ("Events per domein", "pie", {
                        "metrics": [{"expressionType": "SIMPLE",
                                     "column": {"column_name": "event_seq", "type": "BIGINT"},
                                     "aggregate": "COUNT",
                                     "label": "Events"}],
                        "groupby": ["domein"],
                        "color_scheme": "preset_ui_1",
                        "show_legend": True,
                        "label_type": "key_percent",
                    }, {"width": 4, "height": 50}),
                    ("Fases per type", "pie", {
                        "metrics": [{"expressionType": "SIMPLE",
                                     "column": {"column_name": "bsn", "type": "VARCHAR"},
                                     "aggregate": "COUNT",
                                     "label": "Aantal"}],
                        "groupby": ["fase"],
                        "color_scheme": "preset_ui_1",
                        "show_legend": True,
                        "label_type": "key_percent",
                    }, {"dataset": "mart_uc11_klantreis_phases",
                        "width": 4, "height": 50}),
                    ("Events per regio (WIA)", "pie", {
                        "metrics": [{"expressionType": "SIMPLE",
                                     "column": {"column_name": "event_seq", "type": "BIGINT"},
                                     "aggregate": "COUNT",
                                     "label": "Events"}],
                        "groupby": ["regio_code"],
                        "adhoc_filters": [{
                            "expressionType": "SIMPLE",
                            "subject": "regio_code",
                            "operator": "IS NOT NULL",
                            "clause": "WHERE",
                        }],
                        "color_scheme": "preset_ui_1",
                        "show_legend": True,
                    }, {"width": 4, "height": 50}),

                    # ── Rij 4: Drill-downs ── (2 × width 6)
                    ("Top 10 event-types", "dist_bar", {
                        "metrics": [{"expressionType": "SIMPLE",
                                     "column": {"column_name": "event_seq", "type": "BIGINT"},
                                     "aggregate": "COUNT",
                                     "label": "Events"}],
                        "groupby": ["event_type"],
                        "row_limit": 10,
                        "order_desc": True,
                        "color_scheme": "preset_ui_1",
                    }, {"width": 6, "height": 55}),
                    ("Gem. duur per fase-type (dagen)", "dist_bar", {
                        "metrics": [metric("duur_dagen", "AVG", "BIGINT", "Avg dagen")],
                        "groupby": ["fase"],
                        "row_limit": 20,
                        "order_desc": True,
                        "color_scheme": "preset_ui_1",
                    }, {"dataset": "mart_uc11_klantreis_phases",
                        "width": 6, "height": 55}),

                    # ── Rij 5: Detail-tabel ── (1 × width 12)
                    ("Cliënten met meeste events (top 50)", "table", {
                        "metrics": [{"expressionType": "SIMPLE",
                                     "column": {"column_name": "event_seq", "type": "BIGINT"},
                                     "aggregate": "COUNT",
                                     "label": "Events"},
                                    {"expressionType": "SIMPLE",
                                     "column": {"column_name": "domein", "type": "VARCHAR"},
                                     "aggregate": "COUNT_DISTINCT",
                                     "label": "Domeinen"}],
                        "groupby": ["bsn"],
                        "row_limit": 50,
                        "order_desc": True,
                        "include_search": True,
                        "query_mode": "aggregate",
                    }, {"width": 12, "height": 60}),
                ],
            },
            # Detail-dashboard: 1 rij per (UC × check), gevoed door
            # mart_dq_violations. Apart dashboard zodat steward kan
            # drillen na het zien van een rood blok in het overzicht.
            {
                "slug": "dq-violations-detail",
                "title": "Datakwaliteit — violations per check",
                "dataset": "mart_dq_violations",
                "charts": [
                    ("Totaal checks gemonitord", "big_number_total", {
                        "metric": {"expressionType": "SIMPLE",
                                   "column": {"column_name": "check_name",
                                              "type": "VARCHAR"},
                                   "aggregate": "COUNT",
                                   "label": "Checks"},
                    }),
                    ("Violations per severity", "pie", {
                        "metrics": [metric("n_violations", "SUM", "BIGINT",
                                           "Violations")],
                        "groupby": ["severity"],
                    }),
                    ("Violations per check (top 20)", "dist_bar", {
                        "metrics": [metric("n_violations", "SUM", "BIGINT",
                                           "Violations")],
                        "groupby": ["check_name"],
                        "row_limit": 20,
                    }),
                    ("Alle checks (tabel)", "table", {
                        "metrics": [metric("n_violations", "SUM", "BIGINT",
                                           "Violations")],
                        "groupby": ["uc_name", "check_name", "severity"],
                        "row_limit": 1000,
                        "include_search": True,
                        "query_mode": "aggregate",
                    }),
                ],
            },
        ]

        # Bouw alle dashboards.
        # Chart-spec format (3-tuple legacy): (slice_name, viz_type, params)
        # Chart-spec format (4-tuple uitbreid): (slice_name, viz_type, params, extras)
        #   extras: {"dataset": "<override>", "width": 1..12, "height": 30..120}
        # Per-dashboard kan ook `dataset` overschreven worden per chart; default
        # is `dash["dataset"]`.
        for dash in DASHBOARDS:
            log(f"=== {dash['title']} ===")
            try:
                default_ds_id = get_dataset_id(s, dash["dataset"])
            except SystemExit:
                log(f"  SKIP — dataset {dash['dataset']!r} niet gevonden")
                continue
            log(f"  dataset id (default): {default_ds_id}")

            ds_cache: dict = {dash["dataset"]: default_ds_id}

            def resolve_ds(name: str) -> Optional[int]:
                if name in ds_cache:
                    return ds_cache[name]
                try:
                    did = get_dataset_id(s, name)
                except SystemExit:
                    return None
                ds_cache[name] = did
                return did

            chart_specs: List[Tuple[int, str]] = []
            widths: List[int] = []
            heights: List[int] = []
            for chart_spec in dash["charts"]:
                if len(chart_spec) == 4:
                    slice_name, viz_type, params, extras = chart_spec
                else:
                    slice_name, viz_type, params = chart_spec
                    extras = {}

                ds_name = extras.get("dataset", dash["dataset"])
                ds_id = resolve_ds(ds_name)
                if ds_id is None:
                    log(f"  SKIP chart '{slice_name}' — dataset {ds_name!r} niet gevonden")
                    continue

                full_params = {
                    "datasource": f"{ds_id}__table",
                    "viz_type": viz_type,
                    "row_limit": 1000,
                    **params,
                }
                cid = create_chart(s, ds_id, slice_name, viz_type, full_params)
                chart_specs.append((cid, slice_name))
                widths.append(int(extras.get("width", 12)))
                heights.append(int(extras.get("height", 50)))

            upsert_dashboard(
                s, dash["title"], dash["slug"], chart_specs,
                widths=widths, heights=heights,
            )

        log(f"Klaar — {len(DASHBOARDS)} dashboards gebouwd.")
        return 0


    if __name__ == "__main__":
        sys.exit(main())

---
apiVersion: batch/v1
kind: Job
metadata:
  name: superset-dashboards-init
  namespace: uwv-platform
  labels:
    uwv.nl/component: superset-dashboards-init
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 2
  template:
    metadata:
      labels:
        uwv.nl/component: superset-dashboards-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: build-dashboards
          image: python:3.11-slim
          command: ["bash", "-euo", "pipefail", "-c"]
          args:
            - |
              pip install --quiet --disable-pip-version-check requests
              python /scripts/build_dashboards.py
          env:
            - name: SUPERSET_URL
              value: "http://uwv-superset-node:8088"
            - name: ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: superset-postgres-credentials
                  key: adminUser.username
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: superset-postgres-credentials
                  key: adminUser.password
            - name: WIA_DATASET
              value: "mart_uc01_wia_funnel_daily"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: scripts
          configMap:
            name: superset-dashboards-init-script
