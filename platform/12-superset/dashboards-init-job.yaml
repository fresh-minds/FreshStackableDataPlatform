# Improvements #13 — Superset WIA Funnel-dashboard via API.
#
# Volgt na de bestaande superset-init Job. Maakt 3 charts + 1 dashboard
# tegen de Trino-database via REST API. Idempotent: skipt als naam reeds
# bestaat.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: superset-dashboards-init-script
  namespace: uwv-platform
data:
  build_dashboards.py: |
    """Bouw WIA Funnel-dashboard programmatisch in Superset."""
    import json
    import os
    import sys
    import time
    from typing import List, Optional, Tuple
    from urllib.parse import urljoin

    import requests

    SUPERSET_URL = os.environ.get("SUPERSET_URL", "http://uwv-superset-node:8088")
    ADMIN_USER = os.environ.get("ADMIN_USER", "uwvplatform")
    ADMIN_PW   = os.environ["ADMIN_PASSWORD"]
    DATASET_NAME = os.environ.get("WIA_DATASET", "mart_uc01_wia_funnel_daily")


    def log(m): print(f"[dash] {m}", flush=True)


    def login() -> requests.Session:
        s = requests.Session()
        r = s.post(urljoin(SUPERSET_URL, "/api/v1/security/login"),
                   json={"username": ADMIN_USER, "password": ADMIN_PW,
                         "provider": "db", "refresh": True})
        r.raise_for_status()
        s.headers["Authorization"] = f"Bearer {r.json()['access_token']}"
        r = s.get(urljoin(SUPERSET_URL, "/api/v1/security/csrf_token/"))
        r.raise_for_status()
        s.headers["X-CSRFToken"] = r.json()["result"]
        return s


    def get_dataset_id(s, name: str) -> int:
        r = s.get(urljoin(SUPERSET_URL, "/api/v1/dataset/"),
                  params={"q": f"(filters:!((col:table_name,opr:eq,value:{name})))"})
        r.raise_for_status()
        results = r.json().get("result", [])
        if not results:
            sys.exit(f"FAIL: dataset {name} niet gevonden — run superset-init Job eerst.")
        return results[0]["id"]


    def find_chart_id(s, slice_name: str) -> Optional[int]:
        r = s.get(urljoin(SUPERSET_URL, "/api/v1/chart/"),
                  params={"q": f"(filters:!((col:slice_name,opr:eq,value:{slice_name})))"})
        if r.status_code == 200 and r.json().get("count", 0) > 0:
            return r.json()["result"][0]["id"]
        return None


    def build_query_context(dataset_id: int, viz_type: str, params: dict) -> str:
        """Genereer een query_context voor een chart.

        Superset 4.x weigert chart-data renderen als `query_context` leeg
        is ("Chart has no query context saved. Please save the chart
        again."). Normaal vult de UI dit bij elk save; bij API-creatie
        moeten we het zelf zetten. Eén query met de metrics/groupby/time
        uit `params` is genoeg voor line/pie/big_number_total.
        """
        # `metric` (single) en `metrics` (list) moeten allebei in de
        # query als list. big_number_total gebruikt `metric` (single).
        metrics = params.get("metrics", [])
        if not metrics and params.get("metric"):
            metrics = [params["metric"]]

        query = {
            "filters": [],
            "extras": {"having": "", "where": ""},
            "applied_time_extras": {},
            "columns": params.get("groupby", []),
            "metrics": metrics,
            "annotation_layers": [],
            "row_limit": params.get("row_limit", 1000),
            "series_limit": 0,
            "order_desc": True,
            "url_params": {},
            "custom_params": {},
            "custom_form_data": {},
        }
        if params.get("granularity_sqla"):
            query["granularity"] = params["granularity_sqla"]
            query["time_grain_sqla"] = params.get("time_grain_sqla", "P1D")
            # is_timeseries triggert tijd-buckets in de query; zonder dit
            # vouwt Superset alle rijen samen tot 1 totaal-meting (line
            # chart toont dan 1 punt). Tijdsbereik = "no filter" zodat de
            # historische data zichtbaar is in dit dev-dataset.
            query["is_timeseries"] = True
            query["time_range"] = "No filter"
            query["columns"] = [{
                "timeGrain": params.get("time_grain_sqla", "P1D"),
                "columnType": "BASE_AXIS",
                "sqlExpression": params["granularity_sqla"],
                "label": params["granularity_sqla"],
                "expressionType": "SQL",
            }]

        return json.dumps({
            "datasource": {"id": dataset_id, "type": "table"},
            "force": False,
            "queries": [query],
            "form_data": {**params, "datasource": f"{dataset_id}__table"},
            "result_format": "json",
            "result_type": "full",
        })


    def create_chart(s, dataset_id: int, slice_name: str, viz_type: str,
                     params: dict) -> int:
        existing = find_chart_id(s, slice_name)
        if existing:
            log(f"  = chart '{slice_name}' bestaat (id={existing})")
            return existing
        body = {
            "datasource_id": dataset_id,
            "datasource_type": "table",
            "viz_type": viz_type,
            "slice_name": slice_name,
            "params": json.dumps(params),
            "query_context": build_query_context(dataset_id, viz_type, params),
        }
        r = s.post(urljoin(SUPERSET_URL, "/api/v1/chart/"), json=body)
        if r.status_code not in (200, 201):
            log(f"  ! chart create failed: {r.status_code} {r.text[:200]}")
            r.raise_for_status()
        cid = r.json()["id"]
        log(f"  + chart '{slice_name}' (id={cid})")
        return cid


    def find_dashboard_id(s, slug: str) -> Optional[int]:
        # Zoek op slug (unique key, geen spaties → rison-safe).
        # Bug-historie: zoeken op `dashboard_title` met spaties in de
        # waarde liet de rison-filter falen → script vond bestaand
        # dashboard niet en POST'te opnieuw → 422 slug-conflict.
        r = s.get(urljoin(SUPERSET_URL, "/api/v1/dashboard/"),
                  params={"q": f"(filters:!((col:slug,opr:eq,value:{slug})))"})
        if r.status_code == 200 and r.json().get("count", 0) > 0:
            return r.json()["result"][0]["id"]
        return None


    def build_position_json(charts: List[Tuple[int, str]]) -> str:
        """Bouw een Superset dashboard layout-tree (12-kolom grid).

        Eén CHART per ROW, full-width (12 cols). Geeft een geldige tree
        met ROOT → GRID → ROW(s) → CHART(s). Zonder dit blijft de canvas
        leeg ook al staan de slices in de M2M-tabel, want het frontend
        leest position_json om de chart-componenten te plaatsen.
        """
        layout = {
            "DASHBOARD_VERSION_KEY": "v2",
            "ROOT_ID": {"type": "ROOT", "id": "ROOT_ID", "children": ["GRID_ID"]},
            "GRID_ID": {
                "type": "GRID", "id": "GRID_ID", "children": [],
                "parents": ["ROOT_ID"],
            },
        }
        for idx, (chart_id, slice_name) in enumerate(charts):
            row_id = f"ROW-{idx + 1}"
            chart_block_id = f"CHART-{idx + 1}"
            layout["GRID_ID"]["children"].append(row_id)
            layout[row_id] = {
                "type": "ROW", "id": row_id, "children": [chart_block_id],
                "parents": ["ROOT_ID", "GRID_ID"],
                "meta": {"background": "BACKGROUND_TRANSPARENT"},
            }
            layout[chart_block_id] = {
                "type": "CHART", "id": chart_block_id, "children": [],
                "parents": ["ROOT_ID", "GRID_ID", row_id],
                "meta": {
                    "chartId": chart_id,
                    "width": 12,
                    "height": 50,
                    "sliceName": slice_name,
                },
            }
        return json.dumps(layout)


    def upsert_dashboard(s, title: str, slug: str,
                         charts: List[Tuple[int, str]]) -> int:
        """Maak of update dashboard met slices + position_json.

        Idempotent: bestaand dashboard wordt ook ge-PUT zodat charts +
        layout altijd in sync zijn met dit script.
        """
        chart_ids = [c[0] for c in charts]
        position_json = build_position_json(charts)

        did = find_dashboard_id(s, slug)
        if did is None:
            r = s.post(urljoin(SUPERSET_URL, "/api/v1/dashboard/"),
                       json={"dashboard_title": title, "slug": slug, "published": True})
            r.raise_for_status()
            did = r.json()["id"]
            log(f"  + dashboard '{title}' (id={did})")
        else:
            log(f"  = dashboard '{title}' bestaat (id={did}); update layout")

        # 1. Koppel elke chart aan dit dashboard via chart-PUT.
        #    Dashboard-PUT accepteert geen `slices` (read-only); de M2M
        #    moet via /api/v1/chart/{id} met `dashboards: [...]`.
        for cid in chart_ids:
            r = s.put(urljoin(SUPERSET_URL, f"/api/v1/chart/{cid}"),
                      json={"dashboards": [did]})
            if r.status_code != 200:
                log(f"  ! chart {cid} → dashboard {did}: "
                    f"{r.status_code} {r.text[:200]}")
                r.raise_for_status()

        # 2. Zet de canvas-layout. Zonder position_json blijft de
        # dashboard-pagina leeg, ook al staan de slices in de M2M-tabel.
        r = s.put(urljoin(SUPERSET_URL, f"/api/v1/dashboard/{did}"),
                  json={"position_json": position_json})
        if r.status_code != 200:
            log(f"  ! dashboard {did} layout PUT: "
                f"{r.status_code} {r.text[:300]}")
            r.raise_for_status()
        log(f"  ✓ {len(chart_ids)} charts gekoppeld + layout gezet")
        return did


    def main() -> int:
        log(f"Wachten op Superset...")
        for _ in range(60):
            try:
                if requests.get(urljoin(SUPERSET_URL, "/health"), timeout=5).status_code == 200:
                    break
            except requests.RequestException:
                pass
            time.sleep(5)

        s = login()

        # Helpers voor metric-spec — vermindert herhaling.
        def metric(col, agg="SUM", typ="INTEGER", label=None):
            return {
                "expressionType": "SIMPLE",
                "column": {"column_name": col, "type": typ},
                "aggregate": agg,
                "label": label or f"{agg} {col}",
            }

        # 6 dashboards, 1 per actieve use-case. Per dashboard:
        #   dataset (table_name in Superset)
        #   charts: list of (slice_name, viz_type, params)
        #   layout: chart-order top→down in dashboard
        DASHBOARDS = [
            # ─────────────── UC-01 WIA Funnel ───────────────
            {
                "slug": "wia-funnel",
                "title": "UC-01 — WIA Funnel",
                "dataset": "mart_uc01_wia_funnel_daily",
                "charts": [
                    ("Totaal WIA aanvragen", "big_number_total", {
                        "metric": metric("n_aanvragen", "SUM", "INTEGER", "Totaal"),
                    }),
                    ("WIA aanvragen per dag", "line", {
                        "granularity_sqla": "aanvraag_datum",
                        "time_grain_sqla": "P1D",
                        "metrics": [metric("n_aanvragen", "SUM", "INTEGER", "Aanvragen")],
                        "groupby": [],
                    }),
                    ("WIA aanvragen per status", "pie", {
                        "metrics": [metric("n_aanvragen", "SUM", "INTEGER", "Aanvragen")],
                        "groupby": ["status"],
                    }),
                ],
            },
            # ─────────────── UC-04 TW Eligibility ───────────────
            {
                "slug": "tw-eligibility",
                "title": "UC-04 — Toeslagenwet eligibility",
                "dataset": "mart_uc04_tw_eligibility",
                "charts": [
                    ("Cliënten met TW-recht", "big_number_total", {
                        "metric": {"expressionType": "SIMPLE",
                                   "column": {"column_name": "bsn", "type": "VARCHAR"},
                                   "aggregate": "COUNT", "label": "Cliënten"},
                    }),
                    ("Totaal maandelijks TW-tekort (EUR)", "big_number_total", {
                        "metric": metric("gat_per_maand", "SUM", "DECIMAL", "Tekort EUR/mnd"),
                    }),
                    ("Gemiddeld inkomen vs TW-norm", "big_number_total", {
                        "metric": metric("inkomen_maand_eur", "AVG", "DECIMAL", "Avg inkomen"),
                    }),
                ],
            },
            # ─────────────── UC-05 Client 360 ───────────────
            {
                "slug": "client-360",
                "title": "UC-05 — Cliënt 360",
                "dataset": "mart_uc05_client_360",
                "charts": [
                    ("Totaal cliënten in 360", "big_number_total", {
                        "metric": {"expressionType": "SIMPLE",
                                   "column": {"column_name": "bsn", "type": "VARCHAR"},
                                   "aggregate": "COUNT", "label": "Cliënten"},
                    }),
                    ("Cliënten per geslacht", "pie", {
                        "metrics": [{"expressionType": "SIMPLE",
                                     "column": {"column_name": "bsn", "type": "VARCHAR"},
                                     "aggregate": "COUNT", "label": "Cliënten"}],
                        "groupby": ["geslacht"],
                    }),
                    ("Cliënten met lopende WIA", "big_number_total", {
                        "metric": metric("n_lopende_wia", "SUM", "INTEGER", "Lopende WIA"),
                    }),
                ],
            },
            # ─────────────── UC-06 Lastprognose ───────────────
            {
                "slug": "lastprognose",
                "title": "UC-06 — Uitkeringslast 5-jaar prognose",
                "dataset": "mart_uc06_uitkeringslast_5y",
                "charts": [
                    ("Totaal uitkeringslast 5-jaar (EUR)", "big_number_total", {
                        "metric": metric("uitbetaald_bruto_eur_projection", "SUM",
                                         "DECIMAL", "Totaal EUR"),
                    }),
                    ("Uitkeringen per wet", "pie", {
                        "metrics": [metric("uitbetaald_bruto_eur_projection", "SUM",
                                           "DECIMAL", "EUR")],
                        "groupby": ["wet"],
                    }),
                    ("Aantal uitkeringen per regio", "dist_bar", {
                        "metrics": [metric("aantal_uitkeringen_projection", "SUM",
                                           "INTEGER", "Aantal")],
                        "groupby": ["regio_code"],
                    }),
                ],
            },
            # ─────────────── UC-07 DQ Polisadministratie ───────────────
            {
                "slug": "dq-polisadm",
                "title": "UC-07 — Datakwaliteit polisadministratie",
                "dataset": "mart_uc07_dq_dagrapport",
                "charts": [
                    ("Totaal IKVs gevalideerd", "big_number_total", {
                        "metric": metric("n_ikvs", "SUM", "INTEGER", "IKVs"),
                    }),
                    ("Unieke BSN's", "big_number_total", {
                        "metric": metric("n_unieke_bsns", "SUM", "INTEGER", "Unieke BSN"),
                    }),
                    ("DQ-fouten BSN buiten test-bereik", "big_number_total", {
                        "metric": metric("n_bsn_buiten_test_bereik", "SUM", "INTEGER",
                                         "Fouten"),
                    }),
                ],
            },
            # ─────────────── UC-09 Re-integratie effect (sandbox) ───────────────
            {
                "slug": "reint-effect",
                "title": "UC-09 — Re-integratie effect (sandbox)",
                "dataset": "mart_uc09_effect_panel",
                "charts": [
                    ("Panel-deelnemers", "big_number_total", {
                        "metric": {"expressionType": "SIMPLE",
                                   "column": {"column_name": "bsn_pseudo",
                                              "type": "VARCHAR"},
                                   "aggregate": "COUNT", "label": "Deelnemers"},
                    }),
                    ("Verdeling huidige status", "pie", {
                        "metrics": [{"expressionType": "SIMPLE",
                                     "column": {"column_name": "bsn_pseudo",
                                                "type": "VARCHAR"},
                                     "aggregate": "COUNT", "label": "Aantal"}],
                        "groupby": ["huidige_status"],
                    }),
                    ("Verdeling per geslacht", "pie", {
                        "metrics": [{"expressionType": "SIMPLE",
                                     "column": {"column_name": "bsn_pseudo",
                                                "type": "VARCHAR"},
                                     "aggregate": "COUNT", "label": "Aantal"}],
                        "groupby": ["geslacht"],
                    }),
                ],
            },
            # ─────────────── Cross-UC Datakwaliteit ───────────────
            # Eén-stop overzicht voor de DQ-steward: per UC totaal-records,
            # violations per severity, en een tabel met alle individuele
            # checks. Bron: mart_dq_overview + mart_dq_violations (live
            # geteld op de gold-marts; geen test-runner-output nodig).
            {
                "slug": "dq-overview",
                "title": "Datakwaliteit — overzicht alle UCs",
                "dataset": "mart_dq_overview",
                "charts": [
                    ("Aantal use-cases gemonitord", "big_number_total", {
                        "metric": {"expressionType": "SIMPLE",
                                   "column": {"column_name": "uc_code",
                                              "type": "VARCHAR"},
                                   "aggregate": "COUNT_DISTINCT",
                                   "label": "Use-cases"},
                    }),
                    ("Totaal DQ-violations (alle UCs)", "big_number_total", {
                        "metric": metric("n_violations", "SUM", "BIGINT",
                                         "Violations"),
                    }),
                    ("Critical violations", "big_number_total", {
                        "metric": metric("n_violations_critical", "SUM",
                                         "BIGINT", "Critical"),
                    }),
                    ("Gemiddelde DQ-score (%)", "big_number_total", {
                        "metric": metric("dq_score_pct", "AVG", "DOUBLE",
                                         "Avg DQ-score %"),
                    }),
                    ("DQ-score per use-case", "dist_bar", {
                        "metrics": [metric("dq_score_pct", "AVG", "DOUBLE",
                                           "DQ-score %")],
                        "groupby": ["uc_name"],
                    }),
                    ("Violations per use-case", "dist_bar", {
                        "metrics": [metric("n_violations", "SUM", "BIGINT",
                                           "Violations")],
                        "groupby": ["uc_name"],
                    }),
                    ("DQ-status verdeling", "pie", {
                        "metrics": [{"expressionType": "SIMPLE",
                                     "column": {"column_name": "uc_code",
                                                "type": "VARCHAR"},
                                     "aggregate": "COUNT",
                                     "label": "Use-cases"}],
                        "groupby": ["dq_status"],
                    }),
                ],
            },
            # Detail-dashboard: 1 rij per (UC × check), gevoed door
            # mart_dq_violations. Apart dashboard zodat steward kan
            # drillen na het zien van een rood blok in het overzicht.
            {
                "slug": "dq-violations-detail",
                "title": "Datakwaliteit — violations per check",
                "dataset": "mart_dq_violations",
                "charts": [
                    ("Totaal checks gemonitord", "big_number_total", {
                        "metric": {"expressionType": "SIMPLE",
                                   "column": {"column_name": "check_name",
                                              "type": "VARCHAR"},
                                   "aggregate": "COUNT",
                                   "label": "Checks"},
                    }),
                    ("Violations per severity", "pie", {
                        "metrics": [metric("n_violations", "SUM", "BIGINT",
                                           "Violations")],
                        "groupby": ["severity"],
                    }),
                    ("Violations per check (top 20)", "dist_bar", {
                        "metrics": [metric("n_violations", "SUM", "BIGINT",
                                           "Violations")],
                        "groupby": ["check_name"],
                        "row_limit": 20,
                    }),
                    ("Alle checks (tabel)", "table", {
                        "metrics": [metric("n_violations", "SUM", "BIGINT",
                                           "Violations")],
                        "groupby": ["uc_name", "check_name", "severity"],
                        "row_limit": 1000,
                        "include_search": True,
                        "query_mode": "aggregate",
                    }),
                ],
            },
        ]

        # Bouw alle dashboards.
        for dash in DASHBOARDS:
            log(f"=== {dash['title']} ===")
            try:
                ds_id = get_dataset_id(s, dash["dataset"])
            except SystemExit:
                log(f"  SKIP — dataset {dash['dataset']!r} niet gevonden")
                continue
            log(f"  dataset id: {ds_id}")
            chart_specs = []
            for slice_name, viz_type, params in dash["charts"]:
                full_params = {
                    "datasource": f"{ds_id}__table",
                    "viz_type": viz_type,
                    "row_limit": 1000,
                    **params,
                }
                cid = create_chart(s, ds_id, slice_name, viz_type, full_params)
                chart_specs.append((cid, slice_name))
            upsert_dashboard(s, dash["title"], dash["slug"], chart_specs)

        log(f"Klaar — {len(DASHBOARDS)} dashboards gebouwd.")
        return 0


    if __name__ == "__main__":
        sys.exit(main())

---
apiVersion: batch/v1
kind: Job
metadata:
  name: superset-dashboards-init
  namespace: uwv-platform
  labels:
    uwv.nl/component: superset-dashboards-init
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 2
  template:
    metadata:
      labels:
        uwv.nl/component: superset-dashboards-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: build-dashboards
          image: python:3.11-slim
          command: ["bash", "-euo", "pipefail", "-c"]
          args:
            - |
              pip install --quiet --disable-pip-version-check requests
              python /scripts/build_dashboards.py
          env:
            - name: SUPERSET_URL
              value: "http://uwv-superset-node:8088"
            - name: ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: superset-postgres-credentials
                  key: adminUser.username
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: superset-postgres-credentials
                  key: adminUser.password
            - name: WIA_DATASET
              value: "mart_uc01_wia_funnel_daily"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: scripts
          configMap:
            name: superset-dashboards-init-script
