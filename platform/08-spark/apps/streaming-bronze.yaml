# SparkApplication: streaming JSONL files in s3a://uwv-raw/ → Delta/Iceberg bronze.
#
# De PySpark-code wordt via een ConfigMap (gegenereerd door kustomize) gemount
# op /stackable/spark/jobs. `mainApplicationFile` verwijst naar de gemounte
# entry-point.
#
# TABLE_FORMAT env stuurt format-keuze. Defaults op delta (zie kustomization).
---
apiVersion: spark.stackable.tech/v1alpha1
kind: SparkApplication
metadata:
  name: streaming-bronze
  namespace: uwv-platform
spec:
  sparkImage:
    productVersion: "3.5.8"
  mode: cluster
  mainApplicationFile: "local:///stackable/spark/jobs/streaming_files_to_lakehouse.py"
  s3connection:
    reference: s3-minio
  deps:
    requirements: []
    packages:
      # Delta Lake voor Spark 3.5
      - io.delta:delta-spark_2.12:3.2.1
      # AWS S3A — meestal in Stackable image; expliciet voor zekerheid
      - org.apache.hadoop:hadoop-aws:3.3.6
  sparkConf:
    spark.sql.streaming.checkpointLocation.deleteOnStop: "false"
    spark.sql.shuffle.partitions: "8"
    # Tijdelijk false voor debug — anders zijn driver-logs onbereikbaar.
    # TODO: terug naar true zodra streaming stabiel is.
    spark.kubernetes.driver.deleteOnTermination: "false"
    spark.kubernetes.executor.deleteOnTermination: "false"
  driver:
    config:
      logging:
        enableVectorAgent: true
      resources:
        cpu:
          min: "200m"
          max: "1000m"
        memory:
          limit: "1Gi"
    podOverrides:
      spec:
        containers:
          - name: spark
            env:
              - name: TABLE_FORMAT
                value: "delta"
              - name: HIVE_METASTORE_URI
                value: "thrift://uwv-hive-metastore:9083"
              - name: RAW_PATH
                value: "s3a://uwv-raw/"
              - name: S3_ACCESS_KEY
                valueFrom:
                  secretKeyRef:
                    name: minio-s3-credentials
                    key: accessKey
              - name: S3_SECRET_KEY
                valueFrom:
                  secretKeyRef:
                    name: minio-s3-credentials
                    key: secretKey
            volumeMounts:
              - name: spark-jobs
                mountPath: /stackable/spark/jobs
        volumes:
          - name: spark-jobs
            configMap:
              name: spark-streaming-jobs
  executor:
    replicas: 1
    config:
      logging:
        enableVectorAgent: true
      resources:
        cpu:
          min: "200m"
          max: "1500m"
        memory:
          limit: "1Gi"
    podOverrides:
      spec:
        containers:
          - name: spark
            env:
              - name: TABLE_FORMAT
                value: "delta"
              - name: HIVE_METASTORE_URI
                value: "thrift://uwv-hive-metastore:9083"
              - name: S3_ACCESS_KEY
                valueFrom:
                  secretKeyRef:
                    name: minio-s3-credentials
                    key: accessKey
              - name: S3_SECRET_KEY
                valueFrom:
                  secretKeyRef:
                    name: minio-s3-credentials
                    key: secretKey
            volumeMounts:
              - name: spark-jobs
                mountPath: /stackable/spark/jobs
        volumes:
          - name: spark-jobs
            configMap:
              name: spark-streaming-jobs
