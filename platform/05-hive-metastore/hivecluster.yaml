# HiveCluster — Hive Metastore service.
#
# Werkt voor Iceberg én Delta als catalog backend (beide gebruiken
# Hive-style metadata). Postgres-backed (gedeelde instance in uwv-data).
# S3 connectie naar MinIO voor warehouse-locaties.
#
# Image-versie: 4.0.1 (HMS standalone). Stackable bouwt eigen image bovenop.
---
apiVersion: hive.stackable.tech/v1alpha1
kind: HiveCluster
metadata:
  name: uwv-hive
  namespace: uwv-platform
spec:
  image:
    productVersion: "3.1.3"
  clusterConfig:
    database:
      # 26.3: 'user' veld weg, komt uit credentialsSecret
      connString: jdbc:postgresql://postgres-postgresql.uwv-data.svc.cluster.local:5432/hivemetastore
      credentialsSecret: hive-postgres-credentials
      dbType: postgres
    s3:
      reference: s3-minio
  metastore:
    # listenerClass verplaatst naar roleConfig in 26.3
    roleConfig:
      listenerClass: cluster-internal
    config:
      logging:
        enableVectorAgent: false
    roleGroups:
      default:
        replicas: 1
        config:
          resources:
            cpu:
              min: "200m"
              max: "1000m"
            memory:
              limit: "1Gi"
