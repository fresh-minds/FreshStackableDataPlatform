# PodDisruptionBudgets — voorkomt dat node-drain meerdere replicas tegelijk
# omlegt. Voor een single-replica scaled-down setup is dit weinig zinvol; we
# zetten desondanks PDB's zodat productie-overlay alleen de replicas hoeft op
# te schalen.
#
# NB: De Stackable-operatoren genereren zelf PDB's voor de producten die ze
# beheren (hive-metastore, trino-coordinator, trino-worker, airflow-scheduler,
# airflow-webserver, superset-node). Eigen PDB's daarvoor leveren
# `MultiplePodDisruptionBudgets`-waarschuwingen op (incident 2026-05-15).
# Hier alleen PDB's voor componenten die de operatoren NIET zelf afdekken.
#
# Convention: minAvailable: 1 voor alle workloads die data hebben.
---
# OPA — Stackable-OPA-operator levert geen eigen PDB.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: uwv-opa-pdb
  namespace: uwv-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opa
---
# Postgres (gedeeld)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: postgres-pdb
  namespace: uwv-data
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql
---
# OpenSearch
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: opensearch-pdb
  namespace: uwv-meta
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opensearch
