# HorizontalPodAutoscaler — Trino-workers schalen op CPU-load (improvements #3).
#
# Vereist metrics-server actief. K3d heeft 'm uit (we disabled in cluster-config);
# productie heeft 'm aan, of gebruik prometheus-adapter.
#
# Productie-overlay zou ook scale targetRef vergroten naar 10+ replicas.
# Dev-instelling: 1-3 replicas, scale-up op > 70% CPU.
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: uwv-trino-worker-hpa
  namespace: uwv-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: uwv-trino-worker-default
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
