# Ingress voor Prometheus UI (op poort 9090).
# Service prometheus-kube-prometheus-prometheus wordt door kube-prometheus-stack
# gemaakt. Geen auth — voor demo/dev OK; productie zou oauth2-proxy ervoor zetten.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus
  namespace: uwv-monitoring
  annotations:
    cert-manager.io/cluster-issuer: uwv-platform-issuer
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["prometheus.uwv-platform.local"]
      secretName: prometheus-tls
  rules:
    - host: prometheus.uwv-platform.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus-kube-prometheus-prometheus
                port:
                  number: 9090
