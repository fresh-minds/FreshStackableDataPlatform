apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: openmetadata
  namespace: uwv-meta
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: openmetadata
  endpoints:
    - port: http-admin
      path: /prometheus
      interval: 30s
      relabelings:
        - replacement: openmetadata
          targetLabel: job
