# MailHog — dev-only SMTP-sink voor Alertmanager (improvements #5.9).
#
# MailHog accepteert SMTP op poort 1025 zonder auth/TLS en serveert een
# web-UI op 8025 waar je alle alerts ziet die Alertmanager zou versturen.
# In productie (AKS) wordt deze namespace-resource verwijderd door de
# platform-overlays/aks/14-monitoring/ overlay en wijst Alertmanager
# naar de echte UWV-SMTP-relay.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailhog
  namespace: uwv-monitoring
  labels:
    app.kubernetes.io/name: mailhog
    app.kubernetes.io/component: dev-smtp-sink
    uwv.nl/dev-only: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mailhog
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mailhog
        app.kubernetes.io/component: dev-smtp-sink
        uwv.nl/dev-only: "true"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: mailhog
          image: mailhog/mailhog:v1.0.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: smtp
              containerPort: 1025
              protocol: TCP
            - name: http
              containerPort: 8025
              protocol: TCP
          env:
            # Bewaar alleen de laatste 200 mails (geheugen) — geen storage
            # nodig in dev.
            - name: MH_STORAGE
              value: memory
            - name: MH_MAILDIR_PATH
              value: /tmp
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          readinessProbe:
            tcpSocket:
              port: smtp
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: smtp
            initialDelaySeconds: 10
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: mailhog
  namespace: uwv-monitoring
  labels:
    app.kubernetes.io/name: mailhog
    uwv.nl/dev-only: "true"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mailhog
  ports:
    - name: smtp
      port: 1025
      targetPort: smtp
      protocol: TCP
    - name: http
      port: 8025
      targetPort: http
      protocol: TCP
---
# Web-UI op https://mailhog.uwv-platform.local:8443/ — devs kunnen daar
# alle alerts inspecteren die Alertmanager zou versturen.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mailhog
  namespace: uwv-monitoring
  annotations:
    cert-manager.io/cluster-issuer: uwv-platform-issuer
  labels:
    uwv.nl/dev-only: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["mailhog.uwv-platform.local"]
      secretName: mailhog-tls
  rules:
    - host: mailhog.uwv-platform.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mailhog
                port:
                  number: 8025
