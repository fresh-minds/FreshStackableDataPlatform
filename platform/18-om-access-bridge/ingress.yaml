# Exposes de access-request-API onder hetzelfde origin als de portal
# (https://platform.uwv-platform.local) zodat browser-form-POSTs same-origin
# zijn (geen CORS-preflight nodig). Webhook + replay-endpoints blijven
# *intern* — alleen /api/request wordt extern bereikbaar.
#
# Pad-design:
#   /access-request-api/api/request → bridge /api/request
#   /access-request-api/health      → bridge /health
#
# Rewrite knippt de prefix er af en stuurt de rest naar de bridge.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: om-access-bridge
  namespace: uwv-platform
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-body-size: 64k
    nginx.ingress.kubernetes.io/proxy-buffer-size: 16k
spec:
  ingressClassName: nginx
  rules:
    - host: platform.uwv-platform.local
      http:
        paths:
          - path: /access-request-api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: om-access-bridge
                port:
                  number: 80
  tls:
    - hosts:
        - platform.uwv-platform.local
      secretName: portal-tls
