# Non-secret runtime config voor de OM access-bridge.
#
# `OM_WEBHOOK_SECRET` en `KEYCLOAK_CLIENT_SECRET` zitten in de aparte
# Secret `om-access-bridge-secret` (zie README.md voor bootstrap).
apiVersion: v1
kind: ConfigMap
metadata:
  name: om-access-bridge-config
  namespace: uwv-platform
data:
  KEYCLOAK_URL: "http://keycloak.uwv-auth.svc.cluster.local:8080"
  KEYCLOAK_REALM: "uwv"
  KEYCLOAK_CLIENT_ID: "om-access-bridge"
  REPLAY_WINDOW_SECONDS: "300"
  LOG_LEVEL: "INFO"
  OM_BASE_URL: "http://openmetadata.uwv-meta.svc.cluster.local:8585"
  # Browser-origin van het portal-formulier dat POST naar /api/request.
  # In dev: same-origin via ingress-route, dus alleen platform.* whitelist.
  CORS_ALLOWED_ORIGINS: "https://platform.uwv-platform.local:8443,https://platform.uwv-platform.local"
