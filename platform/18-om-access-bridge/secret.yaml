# TEMPLATE ONLY — NOT a kustomize resource.
#
# Documenteert de verwachte vorm van de Secret. Bewust NIET in
# kustomization.yaml, zodat een `kubectl apply -k .` de echte secret-
# waarden niet overschrijft met de placeholders hieronder.
#
# Bootstrap op het cluster (out-of-band):
#
#   kubectl -n uwv-platform create secret generic om-access-bridge-secret \
#     --from-literal=KEYCLOAK_CLIENT_SECRET='<keycloak-om-access-bridge-secret>' \
#     --from-literal=OM_WEBHOOK_SECRET='<random-32-bytes-base64>' \
#     --from-literal=OM_ADMIN_TOKEN='<jwt-from-openmetadata-admin-secret>' \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# - KEYCLOAK_CLIENT_SECRET komt uit de `om-access-bridge`-client in het
#   Keycloak `uwv`-realm (zie realm-uwv.json).
# - OM_WEBHOOK_SECRET wordt óók in OpenMetadata geconfigureerd op de
#   EventSubscription die de bridge target (zelfde geheim aan beide kanten).
# - OM_ADMIN_TOKEN is een long-lived JWT (ingestion-bot of admin) voor het
#   POST /api/request endpoint. Pak 'm uit secret openmetadata-admin
#   (key=jwtToken) in namespace uwv-meta.
#
# Productie: External Secrets / Vault / Workload Identity. Nooit een echt
# secret in git.
apiVersion: v1
kind: Secret
metadata:
  name: om-access-bridge-secret
  namespace: uwv-platform
type: Opaque
stringData:
  KEYCLOAK_CLIENT_SECRET: "uwv-dev-only-CHANGE-ME-om-access-bridge-secret"
  OM_WEBHOOK_SECRET: "uwv-dev-only-CHANGE-ME-om-webhook-secret"
  OM_ADMIN_TOKEN: "REPLACE-WITH-JWT-FROM-openmetadata-admin-SECRET"
