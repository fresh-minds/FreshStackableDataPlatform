apiVersion: apps/v1
kind: Deployment
metadata:
  name: om-access-bridge
  namespace: uwv-platform
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: om-access-bridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: om-access-bridge
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: uwv-platform/om-access-bridge:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8002
          envFrom:
            - configMapRef:
                name: om-access-bridge-config
            - secretRef:
                name: om-access-bridge-secret
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests: { cpu: 25m, memory: 96Mi }
            limits:   { cpu: 250m, memory: 256Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
