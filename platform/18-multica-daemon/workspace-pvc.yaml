apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: multica-daemon-workspace
  namespace: uwv-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # Generous — codex per-task scratch can be hundreds of MB if it
      # clones a repo. Tighten once you have empirical sizing.
      storage: 10Gi
