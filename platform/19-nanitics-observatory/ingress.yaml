# Ingress for the Nanitics Observatory.
#
# Hostname follows the existing platform convention (*.uwv-platform.local),
# served on the same nginx-ingress + cert-manager + uwv-platform-issuer
# chain as the portal. Add the host to /etc/hosts:
#
#   127.0.0.1 nanitics.uwv-platform.local
#
# SSE note: the Observatory uses Server-Sent Events on
# /api/observatory/runs/{id}/stream. The annotations below tell nginx
# not to buffer that endpoint and to allow long-lived connections.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nanitics-observatory
  namespace: uwv-platform
  annotations:
    cert-manager.io/cluster-issuer: uwv-platform-issuer
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["nanitics.uwv-platform.local"]
      secretName: nanitics-observatory-tls
  rules:
    - host: nanitics.uwv-platform.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nanitics-observatory
                port:
                  number: 80
