# TEMPLATE ONLY — NOT a kustomize resource.
#
# Documents the expected shape of the Secret that holds the Multica
# bearer token used by the platform watcher. DELIBERATELY OMITTED from
# kustomization.yaml's resources list, so that running `kubectl apply -k .`
# cannot overwrite a real token with the placeholder below.
#
# To populate the real Secret on the cluster:
#
#   # 1. In Multica's UI, create a user `platform-watcher@uwv` and add
#   #    it to the `platform-ops` workspace.
#   # 2. Generate a long-lived API token for that user via Multica's
#   #    settings page.
#   # 3. Provision it as a K8s Secret:
#
#   kubectl -n uwv-platform create secret generic nanitics-multica-token \
#     --from-literal=MULTICA_API_TOKEN='<paste-token>' \
#     --dry-run=client -o yaml | kubectl apply -f -
#
#   # 4. Flip MULTICA_DRY_RUN to "false" in configmap.yaml and roll the
#   #    deployment.
#
# Production: replace with External Secrets / Vault. Never commit a real
# token.
apiVersion: v1
kind: Secret
metadata:
  name: nanitics-multica-token
  namespace: uwv-platform
type: Opaque
stringData:
  MULTICA_API_TOKEN: "CHANGE-ME-paste-multica-platform-watcher-token"
