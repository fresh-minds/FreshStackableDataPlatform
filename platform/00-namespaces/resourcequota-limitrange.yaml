spec:
  hard:
    requests.cpu: "2"
    requests.memory: 4Gi
    limits.cpu: "4"
    limits.memory: 8Gi
    requests.storage: 20Gi
    pods: "20"
    persistentvolumeclaims: "5"

# ─── uwv-auth — Keycloak ───────────────────────────────────────────────
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: uwv-auth-quota
  namespace: uwv-auth
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 2Gi
    limits.cpu: "2"
    limits.memory: 4Gi
    pods: "5"
