# ResourceQuota + LimitRange per namespace (improvements #4).
#
# Voorkomt dat één namespace alle cluster-resources opgebruikt en geeft
# elke pod een sane default-limit als geen requests/limits zijn opgegeven.
#
# Quota's zijn **conservatief voor scaled-down k3d**. Productie-overlay
# verhoogt deze waarden 5-10x.

# ─── uwv-platform — Stackable workloads (zwaarst) ────────────────────
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: uwv-platform-quota
  namespace: uwv-platform
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    requests.storage: 50Gi
    pods: "100"
    persistentvolumeclaims: "30"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: uwv-platform-limits
  namespace: uwv-platform
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: 512Mi
      defaultRequest:
        cpu: "100m"
        memory: 128Mi
      max:
        cpu: "2"
        memory: 4Gi
      min:
        cpu: "10m"
        memory: 32Mi

# ─── uwv-data — gedeelde Postgres ──────────────────────────────────────
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: uwv-data-quota
  namespace: uwv-data
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 4Gi
    limits.cpu: "4"
    limits.memory: 8Gi
    requests.storage: 20Gi
    pods: "10"
    persistentvolumeclaims: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: uwv-data-limits
  namespace: uwv-data
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: 512Mi
      defaultRequest:
        cpu: "100m"
        memory: 256Mi

# ─── uwv-meta — OpenMetadata + OpenSearch ──────────────────────────────
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: uwv-meta-quota
  namespace: uwv-meta
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    requests.storage: 30Gi
    pods: "20"
    persistentvolumeclaims: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: uwv-meta-limits
  namespace: uwv-meta
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: 1Gi
      defaultRequest:
        cpu: "100m"
        memory: 256Mi

