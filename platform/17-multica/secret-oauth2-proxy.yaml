# DEV-ONLY secrets voor de Multica oauth2-proxy.
#
# - cookie-secret: 32 willekeurige bytes (oauth2-proxy eis: 16, 24 of 32).
#   Wordt gebruikt om sessiecookies te tekenen.
# - client-secret: matcht clients[].secret in
#   infrastructure/helm/keycloak/realm-uwv.json (clientId=multica).
#
# Dezelfde "dev-only-CHANGE-ME"-conventie als platform/15-portal/secret.yaml.
# Bestandsnaam `secret-oauth2-proxy.yaml` zodat de repo-`.gitignore`-regel
# `*-secret.yaml` 'm NIET vangt — anders zou de placeholder bij elke
# bootstrap weg zijn.
#
# Productie: vervang beide met External Secrets / Vault / een
# Workload-Identity-binding.
apiVersion: v1
kind: Secret
metadata:
  name: multica-oauth2-proxy
  namespace: uwv-platform
type: Opaque
stringData:
  # Exact 32 bytes
  cookie-secret: "uwvDevOnlyChangeMeMulticaCook32X"
  client-secret: "uwv-dev-only-CHANGE-ME-multica-secret"
