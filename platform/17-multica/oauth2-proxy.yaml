# oauth2-proxy als aparte Deployment — niet als sidecar in de frontend-pod
# zoals 15-portal — omdat Multica DRIE upstreams heeft (backend, frontend,
# en straks evt. /metrics). oauth2-proxy's longest-prefix-routing kan dat
# in één proces. De ingress wijst alleen op deze Service; oauth2-proxy
# fan-out doet de rest.

apiVersion: v1
kind: Service
metadata:
  name: multica-oauth2-proxy
  namespace: uwv-platform
spec:
  selector:
    app.kubernetes.io/name: multica-oauth2-proxy
  ports:
    - name: http
      port: 80
      targetPort: 4180
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: multica-oauth2-proxy
  namespace: uwv-platform
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: multica-oauth2-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: multica-oauth2-proxy
      annotations:
        # Force restart on config change.
        checksum/oauth2-proxy: "see ConfigMap multica-oauth2-proxy-config"
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
          imagePullPolicy: IfNotPresent
          args:
            - --config=/etc/oauth2-proxy/oauth2-proxy.cfg
          env:
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef: { name: multica-oauth2-proxy, key: client-secret }
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef: { name: multica-oauth2-proxy, key: cookie-secret }
          ports:
            - name: oauth
              containerPort: 4180
          readinessProbe:
            httpGet: { path: /ping, port: oauth }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /ping, port: oauth }
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits:   { cpu: 200m, memory: 256Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - name: oauth2-proxy-config
              mountPath: /etc/oauth2-proxy
              readOnly: true
      volumes:
        - name: oauth2-proxy-config
          configMap:
            name: multica-oauth2-proxy-config
