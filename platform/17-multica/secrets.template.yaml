# TEMPLATE — these Secrets must exist in the cluster but are NOT applied
# via kustomize. The repo `.gitignore` excludes `*-secret.yaml`, so we name
# the file `secrets.template.yaml` to keep this scaffold under version
# control without leaking real values.
#
# Apply real values out-of-band:
#
#   PG_PW=$(openssl rand -hex 24)
#
#   kubectl -n uwv-platform create secret generic multica-postgres \
#     --from-literal=POSTGRES_PASSWORD="$PG_PW" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
#   kubectl -n uwv-platform create secret generic multica-backend \
#     --from-literal=JWT_SECRET=$(openssl rand -hex 32) \
#     --from-literal=DATABASE_URL="postgres://multica:${PG_PW}@multica-postgres:5432/multica?sslmode=disable" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Same anti-clobber pattern as 16-nanitics-observatory/secret.yaml.

---
apiVersion: v1
kind: Secret
metadata:
  name: multica-postgres
  namespace: uwv-platform
type: Opaque
stringData:
  POSTGRES_PASSWORD: "REPLACE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: multica-backend
  namespace: uwv-platform
type: Opaque
stringData:
  JWT_SECRET: "REPLACE_ME"
  DATABASE_URL: "postgres://multica:REPLACE_ME@multica-postgres:5432/multica?sslmode=disable"
