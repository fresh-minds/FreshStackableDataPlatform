apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: uwv-platform

# Note on secrets:
#   postgres-secret.yaml and backend-secret.yaml are TEMPLATES showing the
#   expected keys. They are deliberately NOT listed below — same pattern as
#   16-nanitics-observatory. Apply real values out-of-band:
#
#     kubectl -n uwv-platform create secret generic multica-postgres \
#       --from-literal=POSTGRES_PASSWORD=$(openssl rand -hex 24) \
#       --dry-run=client -o yaml | kubectl apply -f -
#
#     kubectl -n uwv-platform create secret generic multica-backend \
#       --from-literal=JWT_SECRET=$(openssl rand -hex 32) \
#       --from-literal=DATABASE_URL='postgres://multica:<pw>@multica-postgres:5432/multica?sslmode=disable' \
#       --dry-run=client -o yaml | kubectl apply -f -
#
# Listing them here would overwrite the real keys with the placeholders on
# every `kubectl apply -k .`.

resources:
  - uploads-pvc.yaml
  - postgres.yaml
  - backend-config.yaml
  - backend.yaml
  - frontend.yaml
  - ingress.yaml

commonLabels:
  app.kubernetes.io/part-of: uwv-platform
  app.kubernetes.io/component: multica
