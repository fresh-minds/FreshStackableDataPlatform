# Codex configuration for the UWV in-cluster Multica daemon.
#
# This file is shipped inside the image at /etc/codex/config.toml.template
# and copied to ~/.codex/config.toml by entrypoint.sh on container start
# (codex writes per-task scratch under ~/.codex, so that directory must
# live on the writable workspace volume — not on the read-only image
# layer).
#
# The `azure` provider here points at the same Foundry resource the
# Nanitics watcher uses (see platform/19-nanitics-observatory/configmap.yaml).
# Codex picks up AZURE_OPENAI_API_KEY from the process env, which the
# Deployment populates from a Secret.

model_provider = "azure"
model = "gpt-5.4-nano"

# Bypass codex' bubblewrap sandbox.
#
# Codex normally wraps its shell tool in bubblewrap (bwrap). bwrap needs
# the kernel to allow unprivileged user namespaces — k3d's node-container
# kernel doesn't (sysctl kernel.unprivileged_userns_clone unset, and
# elevating that would require running the pod privileged: true).
# Result: every codex shell command inside this pod fails with
# "bwrap: No permissions to create a new namespace".
#
# Skipping codex' sandbox here is safe because the POD is the sandbox:
# - runAsNonRoot=true, runAsUser=1001 (no root inside)
# - capabilities: drop ALL (no SYS_ADMIN, no CAP_NET_ADMIN, etc.)
# - automountServiceAccountToken=false (no K8s API access)
# - workspace volume is the only writable mount; image FS is RO-ish
# - egress is whatever the cluster NetworkPolicy says (today: open)
#
# `danger-full-access` is codex' label for "no sandbox" — equivalent to
# the `--dangerously-bypass-approvals-and-sandbox` CLI flag.
sandbox_mode = "danger-full-access"
approval_policy = "never"

# Disable reasoning request/summary params globally. The project-form
# Foundry /v1/responses surface rejects requests whose `reasoning` field
# is `null` ("invalid_payload param=/reasoning"). Setting both to "none"
# makes codex omit the field from the wire payload entirely.
model_reasoning_effort = "none"
model_reasoning_summary = "none"

[model_providers.azure]
name = "Azure AI Foundry (UWV)"
# Project-form URL — the same endpoint the watcher uses successfully
# against gpt-5.4-nano. Switched from the openai.azure.com URL form
# because gpt-5.4-nano is deployed on this specific project endpoint
# (per the Foundry portal Deployment info: GlobalStandard, version
# 2026-03-17, model name gpt-5.4-nano).
base_url = "https://devfreshmindsaifoundry.services.ai.azure.com/api/projects/proj-default/openai/v1"
env_key = "AZURE_OPENAI_API_KEY"
# wire_api = "responses" is the only supported value in codex >= 0.130.
# (See https://github.com/openai/codex/discussions/7782 — `chat` was removed.)
wire_api = "responses"
# No `query_params = { api-version = ... }` — this URL form REJECTS
# api-version with "api-version query parameter is not allowed when
# using /v1 path". The openai.azure.com form is the opposite (it
# REQUIRES api-version), so the two URL forms have inverse query
# requirements.

# KNOWN UPSTREAM ISSUE — codex app-server ↔ Foundry /v1/responses streaming:
#
# `codex exec` against this same endpoint+model returns clean output
# (verified for both short and long prompts), but the codex app-server
# mode that Multica's daemon uses receives a `response.failed` event
# mid-stream after ~10-15s on every long task, with no decoded error
# body. Disabling reasoning (model_reasoning_effort/summary = "none")
# doesn't help; the app-server's wire payload differs from exec's
# enough to trigger this. wire_api = "chat" is removed in codex 0.130
# (github.com/openai/codex/discussions/7782), so the chat fallback is
# gone.
#
# Net effect: the watcher → multica → daemon-claim → codex-spawn loop
# runs end-to-end, codex's failure message is posted back as a comment
# on the Multica issue (loop is closed), but the task itself can't
# complete its work. Wait for an upstream fix or migrate to a different
# coding-agent CLI (Claude Code via Anthropic API — separate provider).
