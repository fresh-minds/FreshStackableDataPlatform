apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: uwv-platform

resources:
  - workspace-pvc.yaml
  - deployment.yaml
  # NOTE: secret-token.yaml is intentionally NOT listed. Kustomize-applying
  # it would overwrite the real token with the placeholder. Create the
  # Secret out-of-band — see secret-token.yaml for the recipe.

commonLabels:
  app.kubernetes.io/part-of: uwv-platform
  app.kubernetes.io/component: multica-daemon
