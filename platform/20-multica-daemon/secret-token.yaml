# TEMPLATE ONLY — NOT a kustomize resource.
#
# Documents the expected shape of the Secret that holds the bootstrap
# Personal Access Token used by the multica-daemon container to call
# `multica login --token` on first boot.
#
# DELIBERATELY OMITTED from kustomization.yaml's resources list, so that
# running `kubectl apply -k .` cannot overwrite a real token with the
# placeholder below.
#
# To populate the real Secret on the cluster:
#
#   # 1. In Multica's UI (https://multica.uwv-platform.local:8443/),
#   #    log in as the user the daemon should act as.
#   # 2. Settings → Personal Access Tokens → Create. Token format is
#   #    'mul_...'. Copy it to your clipboard.
#   # 3. Provision the Secret:
#
#   kubectl -n uwv-platform create secret generic multica-daemon-auth \
#     --from-literal=MULTICA_API_TOKEN='mul_<paste>' \
#     --dry-run=client -o yaml | kubectl apply -f -
#
#   # 4. Restart the daemon if it was already running on a placeholder:
#
#   kubectl -n uwv-platform rollout restart deploy/multica-daemon
#
# Production: replace with External Secrets / Vault. Never commit a real
# token. The daemon writes ~/.multica/auth.json into the workspace PVC
# on successful login; subsequent restarts skip `multica login` and
# reuse that file, so rotating MULTICA_API_TOKEN does NOT propagate
# until you also delete the PVC or call `multica auth logout` first.
apiVersion: v1
kind: Secret
metadata:
  name: multica-daemon-auth
  namespace: uwv-platform
type: Opaque
stringData:
  MULTICA_API_TOKEN: "CHANGE-ME-paste-multica-daemon-PAT-here"
