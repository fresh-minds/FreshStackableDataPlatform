# NetworkPolicy hardening for UWV Lab.
#
# Hub:
#   - Ingress from `ingress-nginx` (port 8000) for the browser path.
#   - Ingress from singleuser pods (port 8081) for the Hub API.
# Singleuser pods:
#   - Egress to Trino, MinIO, HMS, Kafka, OpenMetadata, Keycloak inside the
#     cluster. We allow any pod in `uwv-platform` and `uwv-meta` + the
#     in-cluster DNS namespace.
#   - Egress to internet (e.g. PyPI, GitHub) — for the demo we let this open
#     because k3d users will install ad-hoc packages and push to GitHub.
#     Production overlay should tighten this with an explicit allowlist.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: jupyterhub-hub
  namespace: uwv-platform
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: jupyterhub
      app.kubernetes.io/component: hub
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: jupyterhub
              app.kubernetes.io/component: singleuser
      ports:
        - protocol: TCP
          port: 8081
  egress:
    # Everything — Hub talks to k8s API, Keycloak, single-user pods.
    - {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: jupyterhub-singleuser
  namespace: uwv-platform
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: jupyterhub
      app.kubernetes.io/component: singleuser
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: jupyterhub
              app.kubernetes.io/component: hub
      ports:
        - protocol: TCP
          port: 8888
  egress:
    # Open egress — see header comment.
    - {}
