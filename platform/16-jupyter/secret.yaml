# Dev-only secrets for the JupyterHub Deployment.
#
# In production: managed by ExternalSecrets / Vault / SOPS. Here we keep the
# same `uwv-dev-only-CHANGE-ME-*` prefix as the rest of the platform.
#
# Keys:
#   client-secret        — Keycloak `jupyter` OIDC client secret (matches
#                           realm-uwv.json). Must equal that value or the
#                           token-exchange fails.
#   configproxy-token    — shared secret between the Hub and
#                           configurable-http-proxy (we run them in the same
#                           pod; the token can be any random string).
#   crypt-key            — JUPYTERHUB_CRYPT_KEY: Fernet-style 32-byte hex
#                           key used to encrypt OAuthenticator auth_state
#                           (the per-user OIDC access token we stash so the
#                           spawner can hand it to single-user pods). Must
#                           be 64 hex chars. Rotate by updating this value
#                           and restarting the Hub Deployment — auth_state
#                           for active users will need re-login afterwards.
---
apiVersion: v1
kind: Secret
metadata:
  name: jupyterhub-oidc
  namespace: uwv-platform
  labels:
    uwv.nl/dev-only: "true"
    uwv.nl/oidc-service: jupyter
type: Opaque
stringData:
  client-id: "jupyter"
  client-secret: "uwv-dev-only-CHANGE-ME-jupyter-secret"
  configproxy-token: "uwv-dev-only-CHANGE-ME-jupyter-proxy-token"
  # 64 hex chars = 32 bytes. Fixed dev value so re-applying the manifest
  # doesn't wipe it; production must rotate via SealedSecret/SOPS/Vault.
  crypt-key: "d1e0d2bf6f4c41e58a2f9b5c6a3e8d4b7c8a9d0e1f2a3b4c5d6e7f8091a2b3c4"
