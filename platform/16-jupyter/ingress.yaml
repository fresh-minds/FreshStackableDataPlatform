# Ingress for UWV Lab.
#
# Hostname follows the platform convention: <component>.uwv-platform.local on
# port 8443 (via k3d port-mapping → ingress-nginx → Service `jupyter`).
#
# WebSocket support is required for the kernel-message channel between the
# browser and the notebook pod; ingress-nginx handles WS upgrades by default.
# We bump the proxy buffers because notebook output can be large.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jupyter
  namespace: uwv-platform
  annotations:
    cert-manager.io/cluster-issuer: uwv-platform-issuer
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "32k"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["jupyter.uwv-platform.local"]
      secretName: jupyter-tls
  rules:
    - host: jupyter.uwv-platform.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jupyter
                port:
                  number: 80
