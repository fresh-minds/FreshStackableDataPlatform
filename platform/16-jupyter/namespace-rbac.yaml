# RBAC for JupyterHub + KubeSpawner.
#
# JupyterHub itself runs as ServiceAccount `jupyterhub` in `uwv-platform`.
# KubeSpawner needs to:
#   - create/delete Pod, Service, PVC, Secret (per-user notebook resources)
#   - read events for spawn status surfacing
#
# Each spawned notebook pod runs as ServiceAccount `jupyterhub-singleuser` so
# notebook code itself has *no* Kubernetes API rights — only the Hub does.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jupyterhub
  namespace: uwv-platform
  labels:
    app.kubernetes.io/name: jupyterhub
    app.kubernetes.io/component: hub
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jupyterhub-singleuser
  namespace: uwv-platform
  labels:
    app.kubernetes.io/name: jupyterhub
    app.kubernetes.io/component: singleuser
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jupyterhub
  namespace: uwv-platform
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/status", "services", "persistentvolumeclaims", "secrets", "events"]
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jupyterhub
  namespace: uwv-platform
subjects:
  - kind: ServiceAccount
    name: jupyterhub
    namespace: uwv-platform
roleRef:
  kind: Role
  name: jupyterhub
  apiGroup: rbac.authorization.k8s.io
