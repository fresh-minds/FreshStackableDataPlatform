# Services for JupyterHub.
#
# `jupyter`  (port 80 → proxy:8000)  is the external entrypoint via Ingress.
# `hub`      (port 8081)             is the internal API the spawned single-
#                                    user notebooks talk to. KubeSpawner reads
#                                    `c.JupyterHub.hub_connect_url` from the
#                                    ConfigMap and connects via this Service.
---
apiVersion: v1
kind: Service
metadata:
  name: jupyter
  namespace: uwv-platform
  labels:
    app.kubernetes.io/name: jupyterhub
    app.kubernetes.io/component: proxy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: jupyterhub
    app.kubernetes.io/component: hub
  ports:
    - name: http
      port: 80
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: hub
  namespace: uwv-platform
  labels:
    app.kubernetes.io/name: jupyterhub
    app.kubernetes.io/component: hub
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: jupyterhub
    app.kubernetes.io/component: hub
  ports:
    - name: hub
      port: 8081
      targetPort: 8081
