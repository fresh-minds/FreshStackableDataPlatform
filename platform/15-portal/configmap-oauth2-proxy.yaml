# oauth2-proxy config — non-sensitive vlaggen.
# Geheimen (cookie-secret, client-secret) komen uit Secret 'portal-oauth2-proxy'.
#
# Het split-URL-patroon (issuer extern, token-endpoints intern) lost het
# k3d-probleem op dat 'keycloak.uwv-platform.local' alleen via /etc/hosts
# op de host resolveert; in-cluster pods kennen die hostname niet.
# Issuer-claim in tokens blijft de externe URL omdat Keycloak met
# `proxy: edge` + `hostname: keycloak.uwv-platform.local` is gestart.
apiVersion: v1
kind: ConfigMap
metadata:
  name: portal-oauth2-proxy-config
  namespace: uwv-platform
data:
  oauth2-proxy.cfg: |
    # Provider
    provider                = "keycloak-oidc"
    client_id               = "portal"
    oidc_issuer_url         = "https://keycloak.uwv-platform.local/realms/uwv"

    # Split discovery: server-side endpoints intern, browser-redirect extern.
    skip_oidc_discovery     = true
    login_url               = "https://keycloak.uwv-platform.local/realms/uwv/protocol/openid-connect/auth"
    redeem_url              = "http://keycloak.uwv-auth.svc.cluster.local/realms/uwv/protocol/openid-connect/token"
    profile_url             = "http://keycloak.uwv-auth.svc.cluster.local/realms/uwv/protocol/openid-connect/userinfo"
    validate_url            = "http://keycloak.uwv-auth.svc.cluster.local/realms/uwv/protocol/openid-connect/userinfo"
    oidc_jwks_url           = "http://keycloak.uwv-auth.svc.cluster.local/realms/uwv/protocol/openid-connect/certs"

    # Sessiebeleid
    cookie_name             = "_uwv_portal"
    cookie_secure           = true
    cookie_httponly         = true
    cookie_samesite         = "lax"
    cookie_expire           = "8h"
    cookie_refresh          = "30m"
    cookie_domains          = ["platform.uwv-platform.local"]
    whitelist_domains       = [".uwv-platform.local"]

    # Upstream = nginx in dezelfde pod
    http_address            = "0.0.0.0:4180"
    upstreams               = ["http://127.0.0.1:8080"]
    redirect_url            = "https://platform.uwv-platform.local/oauth2/callback"

    # Identity headers voor de browser (Layout.astro leest /oauth2/userinfo)
    pass_user_headers       = true
    pass_access_token       = true
    set_xauthrequest        = true
    set_authorization_header = false

    # Iedereen met een UWV-realm-account mag in
    email_domains           = ["*"]
    skip_provider_button    = true

    # Roles uit Keycloak realm-roles claim → groups
    oidc_groups_claim       = "roles"

    # Smoke-test endpoint mag bypassen
    skip_auth_routes        = ["^/api/health$"]

    # Logs
    standard_logging        = true
    request_logging         = true
    auth_logging            = true
    silence_ping_logging    = true
