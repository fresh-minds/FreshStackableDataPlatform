apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  namespace: uwv-platform
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: portal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: portal
      annotations:
        # Force restart on config change.
        checksum/oauth2-proxy: "see ConfigMap portal-oauth2-proxy-config"
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        # 1) De Astro static-build, geserveerd door nginx-unprivileged op :8080.
        #    Niet via Service blootgesteld — alleen via oauth2-proxy.
        - name: portal-web
          image: uwv-platform/portal:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits:   { cpu: 200m, memory: 128Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - name: nginx-tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx

        # 2) oauth2-proxy sidecar — luistert op :4180, bewaakt :8080 erachter.
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
          imagePullPolicy: IfNotPresent
          args:
            - --config=/etc/oauth2-proxy/oauth2-proxy.cfg
          env:
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef: { name: portal-oauth2-proxy, key: client-secret }
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef: { name: portal-oauth2-proxy, key: cookie-secret }
          ports:
            - name: oauth
              containerPort: 4180
          readinessProbe:
            httpGet: { path: /ping, port: oauth }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /ping, port: oauth }
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits:   { cpu: 200m, memory: 256Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - name: oauth2-proxy-config
              mountPath: /etc/oauth2-proxy
              readOnly: true
      volumes:
        - name: oauth2-proxy-config
          configMap:
            name: portal-oauth2-proxy-config
        - name: nginx-tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
