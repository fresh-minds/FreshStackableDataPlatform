# DEV-ONLY secrets voor de portal-pod.
# - cookie-secret: 32 willekeurige bytes (base64), wordt door oauth2-proxy gebruikt om sessiecookies te tekenen.
# - client-secret: matcht clients[].secret in infrastructure/helm/keycloak/realm-uwv.json (clientId=portal).
#
# Productie: replace beide met externe secret-store (External Secrets / Vault).
apiVersion: v1
kind: Secret
metadata:
  name: portal-oauth2-proxy
  namespace: uwv-platform
type: Opaque
stringData:
  # Exact 32 bytes voor AES-256 (oauth2-proxy eis: 16, 24 of 32 bytes).
  cookie-secret: "uwvDevOnlyChangeMePortalCookie32"
  client-secret: "uwv-dev-only-CHANGE-ME-portal-secret"
