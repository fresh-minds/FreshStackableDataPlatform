# Academy backend — sidecar voor het certificeringsplatform.
# Schrijft voortgang naar Keycloak user-attributes en draait auto-checks.
# De portal nginx proxy't /api/learn/* hierheen (zie portal/nginx.conf).
#
# Image: voor MVP gebruikt deze de portal-image en draait `uvicorn` op een
# tweede container in dezelfde pod (sidecar). Voor productie aparte image +
# deployment maken.

apiVersion: v1
kind: ConfigMap
metadata:
  name: udp-academy-backend
data:
  # KEYCLOAK_URL en realm worden geïnjecteerd via env (zie deployment).
  PYTHONUNBUFFERED: "1"
---
apiVersion: v1
kind: Secret
metadata:
  name: udp-academy-backend
type: Opaque
stringData:
  # Service-account secret van de Keycloak admin-client `portal-backend`.
  # In productie: extern beheerd via External Secrets Operator.
  KEYCLOAK_ADMIN_CLIENT_SEC: "REPLACE_VIA_OPERATOR"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: udp-academy-backend
  labels:
    app.kubernetes.io/name: udp-academy-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: udp-academy-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: udp-academy-backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: backend
          image: python:3.12-slim
          command:
            - /bin/sh
            - -c
            - |
              pip install --no-cache-dir fastapi uvicorn requests &&
              uvicorn portal.scripts.learn-backend:app --host 0.0.0.0 --port 8088
          ports:
            - containerPort: 8088
              name: http
          env:
            - name: KEYCLOAK_URL
              value: "https://keycloak.uwv-platform.svc.cluster.local:8443"
            - name: KEYCLOAK_REALM
              value: "uwv"
            - name: KEYCLOAK_ADMIN_CLIENT_ID
              value: "portal-backend"
          envFrom:
            - configMapRef:
                name: udp-academy-backend
            - secretRef:
                name: udp-academy-backend
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits:   { cpu: "200m", memory: "256Mi" }
          readinessProbe:
            httpGet: { path: /api/learn/check/_ping, port: http }
            failureThreshold: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: udp-academy-backend
spec:
  selector:
    app.kubernetes.io/name: udp-academy-backend
  ports:
    - name: http
      port: 8088
      targetPort: 8088
