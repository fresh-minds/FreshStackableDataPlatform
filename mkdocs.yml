# UWV Reference Data Platform — documentatie-site (MkDocs Material).
#
# Lokaal previewen:
#   pip install -r requirements-docs.txt
#   mkdocs serve            # http://127.0.0.1:8000
#
# CI bouwt en publiceert via .github/workflows/docs.yml naar GitHub Pages.

site_name: UWV Reference Data Platform
site_description: >-
  Documentatie van de UWV referentie-implementatie voor een compliant data-
  en analyticsplatform — architectuur, componenten, rollen, use-cases en
  beslissingen.
site_url: https://fresh-minds.github.io/FreshStackableDataPlatform/
site_author: UWV Reference Platform contributors

repo_name: fresh-minds/FreshStackableDataPlatform
repo_url: https://github.com/fresh-minds/FreshStackableDataPlatform
edit_uri: edit/main/docs/

# Hele content-tree leeft onder docs/ (bestaande indeling). De architectuur-
# en componenten-overzichtspagina's worden door scripts/docs_gen.py
# gegenereerd uit portal/src/data/components.ts en staan in docs/architectuur/
# en docs/componenten/.
docs_dir: docs

# docs/README.md blijft bestaan voor GitHub-browse-gebruikers, maar de
# gegenereerde docs/index.md is de site-landing. Mkdocs zou ze allebei
# als `/` willen renderen — sluit alleen de top-level README expliciet uit.
# (Sub-READMEs zoals handleidingen/README.md moeten WEL in de site.)
exclude_docs: |
  /README.md
  /README.md.bak

# Tekstinhoud is Nederlands; technische identifiers (paden, kolomnamen,
# tool-namen) blijven Engels (zie docs/README.md § Conventies).
theme:
  name: material
  language: nl
  font:
    text: Inter
    code: JetBrains Mono
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  palette:
    # Donker (default) — komt overeen met portal-amber accent.
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: amber
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Wissel naar licht thema
    # Licht
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: amber
      accent: amber
      toggle:
        icon: material/weather-night
        name: Wissel naar donker thema
  features:
    - navigation.instant       # SPA-style page transitions
    - navigation.instant.prefetch
    - navigation.tracking       # sync hash with current section
    - navigation.tabs           # top-level secties als tabs
    - navigation.tabs.sticky
    - navigation.sections       # sub-secties als bold headings
    - navigation.indexes        # README.md → section landing
    - navigation.top            # back-to-top knop
    - navigation.footer         # prev/next links
    - toc.follow                # rechter-TOC scrollt mee
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - content.action.edit       # "edit on GitHub" pencil
    - announce.dismiss

plugins:
  - search:
      lang:
        - nl
        - en
  - awesome-pages              # nav uit .pages files indien aanwezig; fallback op nav: hieronder
  - tags:
      tags_file: tags.md

# Rewrite ../../-links naar absolute GitHub URLs zodat verwijzingen naar
# bestanden BUITEN docs/ (dbt/, opa-policies-src/, scripts/, …) werken op
# de gepubliceerde site. Source-files blijven onveranderd.
hooks:
  - scripts/docs_hooks.py

markdown_extensions:
  # Standaard Python-markdown features
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Link naar deze sectie
      toc_depth: 3
  # PyMdown — rijkere syntax (admonitions, tabs, code highlighting, mermaid)
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details          # collapsible admonitions
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      check_paths: true
      base_path:
        - docs
        - .                    # ook bestanden buiten docs/ kunnen ingesnipped
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Top-level navigatie. README.md → 'index' rewrite zit in scripts/docs_gen.py
# omdat we wel docs/README.md (repo) én docs/index.md (landing) willen.
nav:
  - Home: index.md
  - Onboarding:
      - Overzicht: onboarding/index.md
  - Architectuur:
      - Overzicht: architectuur/index.md
      - Componenten: architectuur/componenten.md
      - Datazones: architectuur/datazones.md
      - Identiteit & autorisatie: architectuur/auth.md
      - Tabel-formaat abstractie: architectuur/tabel-formaat.md
      - Naming conventions: architectuur/naming.md
      - Originele referentie: architectuur/referentie.md
  - Voor wie:
      - Overzicht: rollen/index.md
      - WIA-beoordelaar: handleidingen/01-wia-beoordelaar.md
      - WW-handhaver: handleidingen/02-ww-handhaver.md
      - Wajong-arbeidsdeskundige: handleidingen/03-wajong-arbeidsdeskundige.md
      - CRM-medewerker: handleidingen/04-crm-medewerker.md
      - FEZ-analist: handleidingen/05-fez-analist.md
      - SMZ-planner: handleidingen/06-smz-planner.md
      - Proactief dienstverlener: handleidingen/07-proactief-dienstverlener.md
      - Researcher: handleidingen/08-researcher.md
      - Data-steward: handleidingen/09-data-steward.md
      - Data-engineer: handleidingen/10-data-engineer.md
      - Platform-admin: handleidingen/11-platform-admin.md
      - Smoketest (systeemrol): handleidingen/12-smoketest-systeem.md
      - CSV-upload (alle rollen): handleidingen/csv-upload.md
      - Toegang aanvragen: access-request-guide.md
  - Use cases:
      - Overzicht: use-cases/index.md
      - UC-01 · WIA-funnel: use-cases/uc01-wia-funnel.md
      - UC-02 · Wajong-AI: use-cases/uc02-wajong-ai.md
      - UC-03 · WW-risk: use-cases/uc03-ww-risk.md
      - UC-04 · Proactieve TW: use-cases/uc04-proactieve-tw.md
      - UC-05 · Klant-360: use-cases/uc05-client-360.md
      - UC-06 · Schadelast: use-cases/uc06-schadelast.md
      - UC-07 · DQ polisadministratie: use-cases/uc07-dq-polisadm.md
      - UC-08 · SMZ-planning: use-cases/uc08-smz-planning.md
      - UC-09 · Re-integratie-effect: use-cases/uc09-reint-effect.md
      - UC-10 · Gegevensdiensten-API: use-cases/uc10-gegevensdiensten.md
      - UC-11 · Integrale klantreis: use-cases/uc11-klantreis.md
      - UC-11 · Walkthrough: use-cases/uc11-klantreis-walkthrough.md
  - Beslissingen:
      - Overzicht: adr/index.md
      - ADR-0001 · Stackable als basis: adr/0001-stackable-as-base.md
      - ADR-0002 · Iceberg vs Delta: adr/0002-iceberg-vs-delta.md
      - ADR-0003 · OPA als Trino-authz: adr/0003-opa-as-trino-authz.md
      - ADR-0004 · OpenMetadata als catalog: adr/0004-openmetadata-as-catalog.md
      - ADR-0005 · dbt-trino als transformatielaag: adr/0005-dbt-trino-as-transform.md
      - ADR-0006 · Delta gekozen voor deze impl.: adr/0006-delta-chosen-for-this-implementation.md
      - ADR-0007 · Airflow pipeline-architectuur: adr/0007-airflow-pipeline-architecture.md
      - ADR-0008 · Self-service data-access: adr/0008-self-service-data-access.md
  - Compliance:
      - Compliance-mapping: compliance-mapping.md
      - Context (NORA/AVG/BIO/AI Act): context-summary.md
  - Operations:
      - Runbook: runbook.md
      - Security: security.md
      - Documentatie-gaps: documentation-gap-report.md
      - Roadmap & improvements: improvements.md
  - Audit & overig:
      - Architectuur (legacy stub): architecture.md
      - Redesign-inventaris: redesign-inventory.md
      - Handleidingen — index: handleidingen/README.md
      - Handboek (alle rollen gebundeld): handleidingen/00-handboek.md
      - Exploraties — Multica vs Nanitics: explorations/multica-vs-nanitics.md
      - Exploraties — Multica Foundry: explorations/multica-foundry.md
      - Exploraties — Wachter design: explorations/wachter-design.md
  - Tags: tags.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/fresh-minds/FreshStackableDataPlatform
      name: Repository op GitHub
  generator: false
  status:
    new: nieuw
    deprecated: vervallen

extra_css:
  - assets/extra.css

# Strikt bouwen: broken refs, missing nav-items en orphan files → failure.
# Voor de eerste publicatie zetten we 'warn' op nav om bestanden die nog
# niet bestaan (zoals security.md, gegenereerde architectuur-pagina's vóór
# eerste run) toe te staan; de generator-stap maakt ze aan.
strict: true
validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  nav:
    omitted_files: warn
    not_found: warn
    absolute_links: warn

